<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Inventaire</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 24px 16px;
    }

    .shell {
      max-width: 980px;
      margin: 0 auto;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      border: 1px solid #8897a5;
      background: #263541;
      color: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .stats {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .box {
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 10px 12px;
    }

    .box-title {
      color: #aac2d0;
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .box-value {
      font-size: 20px;
      font-weight: bold;
    }

    .list {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .fish {
      border: 1px solid #364a57;
      background: #192128;
      border-radius: 10px;
      padding: 10px 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .fish-title {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .fish-meta {
      color: #bed1dd;
      font-size: 14px;
    }

    .auto-sell-panel {
      margin-top: 14px;
      padding: 12px;
      border: 1px solid #3a5262;
      border-radius: 10px;
      background: #172028;
    }

    .turn-panel {
      margin-top: 14px;
      padding: 12px;
      border: 1px solid #4a455f;
      border-radius: 10px;
      background: #1a1622;
    }

    .auto-sell-title {
      font-size: 14px;
      color: #cfe0ea;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .turn-title {
      font-size: 14px;
      color: #e0d6ff;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .auto-sell-row {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .auto-sell-row input,
    .auto-sell-row select {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #536c7b;
      background: #0f1519;
      color: #fff;
    }

    .turn-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .turn-row input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #635b85;
      background: #0f1519;
      color: #fff;
    }

    .turn-note {
      margin-top: 8px;
      color: #a9a0c4;
      font-size: 13px;
    }

    .fish-left {
      display: grid;
      gap: 6px;
    }

    .fish-state {
      font-size: 13px;
      color: #d7e3ec;
    }

    .fish-value {
      font-size: 13px;
      color: #f7f0c4;
    }

    .fish-actions {
      display: grid;
      gap: 8px;
      justify-items: end;
      align-content: start;
    }

    .fish-turn-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      width: 100%;
    }

    .fish-turn-row input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #635b85;
      background: #0f1519;
      color: #fff;
    }

    .fish-actions .btn {
      min-width: 150px;
    }

    .spoiled {
      color: #ff8b8b;
    }

    .rarity-common { color: #d9d9d9; }
    .rarity-uncommon { color: #7ee787; }
    .rarity-rare { color: #58a6ff; }
    .rarity-epic { color: #d2a8ff; }
    .rarity-legendary { color: #ffa657; }

    .empty {
      margin-top: 16px;
      color: #9eb0bc;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="top">
      <h1>Inventaire</h1>
      <div>
        <a class="btn" href="../">Retour au jeu</a>
        <button id="sellAll" class="btn">Vendre tout</button>
      </div>
    </div>

    <div class="stats">
      <div class="box">
        <div class="box-title">Argent</div>
        <div class="box-value" id="money">0</div>
      </div>
      <div class="box">
        <div class="box-title">Poissons en stock</div>
        <div class="box-value" id="count">0</div>
      </div>
      <div class="box">
        <div class="box-title">Valeur totale</div>
        <div class="box-value" id="value">0</div>
      </div>
    </div>

    <div class="turn-panel">
      <div class="turn-title">Gestion du frigo</div>
      <div class="turn-row">
        <div>
          <div id="turnCountLabel">Tour actuel: 0</div>
          <div class="turn-note">Plus un poisson reste hors du frigo, plus sa valeur peut monter. S'il attend trop longtemps, il peut se périmer sans prévenir.</div>
        </div>
        <button id="advanceTurn" class="btn">Passer un tour</button>
      </div>
    </div>

    <div class="auto-sell-panel">
      <div class="auto-sell-title">Conditions auto-sell</div>
      <div class="auto-sell-row">
        <label>
          <input type="checkbox" id="autoSellEnabled">
          Activer l'auto-sell
        </label>
        <label>
          Prix max
          <input type="number" id="autoSellMaxPrice" min="0" step="1" value="25">
        </label>
        <label>
          Rareté max
          <select id="autoSellMaxRarity">
            <option value="common">Commune</option>
            <option value="uncommon">Peu commune</option>
            <option value="rare">Rare</option>
            <option value="epic">Épique</option>
            <option value="legendary">Légendaire</option>
          </select>
        </label>
        <button id="sellByFilter" class="btn">Vendre selon filtres</button>
      </div>
    </div>

    <div id="list" class="list"></div>
    <div id="empty" class="empty" style="display:none;">Inventaire vide.</div>
  </div>

  <script>
    const moneyDisplay = document.getElementById("money");
    const countDisplay = document.getElementById("count");
    const valueDisplay = document.getElementById("value");
    const list = document.getElementById("list");
    const empty = document.getElementById("empty");
    const sellAll = document.getElementById("sellAll");
    const autoSellEnabledInput = document.getElementById("autoSellEnabled");
    const autoSellMaxPriceInput = document.getElementById("autoSellMaxPrice");
    const autoSellMaxRaritySelect = document.getElementById("autoSellMaxRarity");
    const sellByFilter = document.getElementById("sellByFilter");
    const advanceTurn = document.getElementById("advanceTurn");
    const turnCountLabel = document.getElementById("turnCountLabel");

    let money = Number(localStorage.getItem("clicker_money")) || 0;
    let inventoryTurn = Number(localStorage.getItem("clicker_inventoryTurn")) || 0;
    let inventory = [];
    let autoSellEnabled = localStorage.getItem("clicker_autoSellEnabled") === "true";
    let autoSellMaxPrice = Number(localStorage.getItem("clicker_autoSellMaxPrice"));
    let autoSellMaxRarity = localStorage.getItem("clicker_autoSellMaxRarity") || "common";

    if (Number.isNaN(autoSellMaxPrice)) {
      autoSellMaxPrice = 25;
    }

    function loadInventory() {
      try {
        const stored = localStorage.getItem("clicker_inventory");
        inventory = stored ? JSON.parse(stored) : [];
        if (!Array.isArray(inventory)) {
          inventory = [];
        }
      } catch (error) {
        inventory = [];
      }

      inventory = inventory.map((fish) => normalizeFishState(fish));
    }

    function rarityLabel(rarity) {
      const labels = {
        common: "Commune",
        uncommon: "Peu commune",
        rare: "Rare",
        epic: "Épique",
        legendary: "Légendaire"
      };

      return labels[rarity] || rarity;
    }

    function fishDescriptors(fish) {
      const size = Number(fish.size) || 0;
      const weight = Number(fish.weight) || 0;
      const tags = [];

      if (size >= 180) {
        tags.push("immense");
      } else if (size >= 95) {
        tags.push("gros");
      } else if (size <= 28) {
        tags.push("petit");
      }

      if (weight >= 40) {
        tags.push("lourd");
      } else if (weight <= 1.2) {
        tags.push("leger");
      }

      if (tags.length === 0) {
        return "(moyen)";
      }

      return "(" + tags.join(", ") + ")";
    }

    function rarityRank(rarity) {
      const ranks = {
        common: 1,
        uncommon: 2,
        rare: 3,
        epic: 4,
        legendary: 5
      };

      return ranks[rarity] || 1;
    }

    function randomBetween(min, max, decimals) {
      const value = min + Math.random() * (max - min);
      return Number(value.toFixed(decimals));
    }

    function normalizeFishState(fish) {
      const price = Number(fish && fish.price) || 0;
      const basePrice = Number(fish && fish.basePrice) || price;
      const turnsOut = Number(fish && fish.turnsOut) || 0;
      const hiddenSpoilTurns = Number(fish && fish.hiddenSpoilTurns) || Math.max(3, Math.floor(randomBetween(4, 10, 0)));
      const hiddenResistance = Number(fish && fish.hiddenResistance) || randomBetween(1.08, 1.42, 3);
      const growthRate = Number(fish && fish.growthRate) || randomBetween(0.08, 0.18, 3);
      const spoiledValue = Number(fish && fish.spoiledValue) || Math.max(1, Math.round(basePrice * 0.08));
      const currentValue = Number(fish && fish.currentValue);

      return {
        type: fish && fish.type ? fish.type : "Poisson",
        rarity: fish && fish.rarity ? fish.rarity : "common",
        size: Number(fish && fish.size) || 0,
        weight: Number(fish && fish.weight) || 0,
        basePrice: basePrice,
        currentValue: Number.isNaN(currentValue) ? basePrice : currentValue,
        spoiledValue: spoiledValue,
        storageState: fish && fish.storageState ? fish.storageState : "fridge",
        turnsLeft: Math.max(0, Number(fish && fish.turnsLeft) || 0),
        turnsOut: Math.max(0, turnsOut),
        hiddenSpoilTurns: hiddenSpoilTurns,
        hiddenResistance: hiddenResistance,
        growthRate: growthRate,
        spoiled: Boolean(fish && fish.spoiled)
      };
    }

    function getFishValue(fish) {
      return Math.max(0, Math.round(Number(fish.currentValue) || Number(fish.basePrice) || Number(fish.price) || 0));
    }

    function getFishStateLabel(fish) {
      if (fish.spoiled) {
        return "Périmé";
      }

      if (fish.storageState === "out") {
        if (fish.turnsLeft > 0) {
          return "Sorti: " + fish.turnsLeft + " tour(s) restant(s)";
        }

        return "Sorti";
      }

      return "Au frigo";
    }

    function refreshFishValue(fish) {
      if (fish.spoiled) {
        fish.currentValue = fish.spoiledValue;
        return fish;
      }

      const bonusTurns = Math.max(0, Number(fish.turnsOut) || 0);
      const growthRate = Number(fish.growthRate) || 0;
      const resistance = Math.max(1, Number(fish.hiddenResistance) || 1);
      const boostedValue = Math.round((Number(fish.basePrice) || 0) * Math.pow(1 + growthRate * resistance, bonusTurns));
      fish.currentValue = Math.max(Number(fish.currentValue) || 0, boostedValue);
      return fish;
    }

    function takeFishOut(index, turns) {
      const fish = inventory[index];
      if (!fish || fish.spoiled) {
        return;
      }

      const duration = Math.max(1, Math.floor(Number(turns) || 0));
      fish.storageState = "out";
      fish.turnsLeft = duration;
      if (!Number.isFinite(fish.turnsOut)) {
        fish.turnsOut = 0;
      }
      if (!Number.isFinite(fish.hiddenSpoilTurns)) {
        fish.hiddenSpoilTurns = Math.max(3, Math.floor(randomBetween(4, 10, 0)));
      }
      if (!Number.isFinite(fish.hiddenResistance)) {
        fish.hiddenResistance = randomBetween(1.08, 1.42, 3);
      }
      refreshFishValue(fish);
      saveState();
      render();
    }

    function returnFishToFridge(index) {
      const fish = inventory[index];
      if (!fish || fish.spoiled) {
        return;
      }

      fish.storageState = "fridge";
      fish.turnsLeft = 0;
      refreshFishValue(fish);
      saveState();
      render();
    }

    function advanceOneTurn() {
      inventoryTurn += 1;

      for (const fish of inventory) {
        if (fish.spoiled) {
          fish.currentValue = fish.spoiledValue;
          continue;
        }

        if (fish.storageState !== "out") {
          refreshFishValue(fish);
          continue;
        }

        fish.turnsOut = (Number(fish.turnsOut) || 0) + 1;
        fish.turnsLeft = Math.max(0, (Number(fish.turnsLeft) || 0) - 1);

        const growthRate = Number(fish.growthRate) || 0;
        const basePrice = Number(fish.basePrice) || 0;
        const resistance = Math.max(1, Number(fish.hiddenResistance) || 1);
        const boostedValue = Math.round(basePrice * Math.pow(1 + growthRate * resistance, fish.turnsOut));
        fish.currentValue = Math.max(Number(fish.currentValue) || 0, boostedValue);

        if (fish.turnsOut >= (Number(fish.hiddenSpoilTurns) || 0)) {
          fish.spoiled = true;
          fish.storageState = "fridge";
          fish.turnsLeft = 0;
          fish.currentValue = fish.spoiledValue;
          continue;
        }

        if (fish.turnsLeft <= 0) {
          fish.storageState = "fridge";
        }
      }

      saveState();
      render();
    }

    function shouldAutoSell(fish) {
      if (!autoSellEnabled) {
        return false;
      }

      const price = getFishValue(fish);
      const isUnderPrice = price <= autoSellMaxPrice;
      const isUnderRarity = rarityRank(fish.rarity) <= rarityRank(autoSellMaxRarity);
      return isUnderPrice && isUnderRarity;
    }

    function saveState() {
      localStorage.setItem("clicker_money", String(money));
      localStorage.setItem("clicker_inventoryTurn", String(inventoryTurn));
      localStorage.setItem("clicker_inventory", JSON.stringify(inventory));
      localStorage.setItem("clicker_autoSellEnabled", String(autoSellEnabled));
      localStorage.setItem("clicker_autoSellMaxPrice", String(autoSellMaxPrice));
      localStorage.setItem("clicker_autoSellMaxRarity", autoSellMaxRarity);
    }

    function applyAutoSellToInventory() {
      let soldValue = 0;
      const kept = [];

      for (const fish of inventory) {
        if (shouldAutoSell(fish)) {
          soldValue += getFishValue(fish);
        } else {
          kept.push(fish);
        }
      }

      money += soldValue;
      inventory = kept;
      saveState();
      render();
    }

    function sellOne(index) {
      const fish = inventory[index];
      if (!fish) {
        return;
      }

      money += getFishValue(fish);
      inventory.splice(index, 1);
      saveState();
      render();
    }

    function render() {
      const totalValue = inventory.reduce((sum, fish) => sum + getFishValue(fish), 0);
      moneyDisplay.textContent = String(money);
      countDisplay.textContent = String(inventory.length);
      valueDisplay.textContent = String(totalValue);
      turnCountLabel.textContent = "Tour actuel: " + inventoryTurn;
      autoSellEnabledInput.checked = autoSellEnabled;
      autoSellMaxPriceInput.value = String(autoSellMaxPrice);
      autoSellMaxRaritySelect.value = autoSellMaxRarity;

      if (inventory.length === 0) {
        list.innerHTML = "";
        empty.style.display = "block";
        return;
      }

      empty.style.display = "none";
      list.innerHTML = "";

      inventory.forEach((fish, index) => {
        refreshFishValue(fish);
        const item = document.createElement("div");
        const descriptorText = fishDescriptors(fish);
        const fishValue = getFishValue(fish);
        const turnActionLabel = fish.storageState === "out" ? "Rentrer au frigo" : "Sortir du frigo";
        const turnAction = fish.storageState === "out" ? "return" : "out";
        item.className = "fish";
        item.innerHTML =
          "<div class='fish-left'>" +
            "<div class='fish-title rarity-" + (fish.rarity || "common") + "'>" + (fish.type || "Poisson") + " " + descriptorText + "</div>" +
            "<div class='fish-meta'>Rareté: <span class='rarity-" + (fish.rarity || "common") + "'>" + rarityLabel(fish.rarity || "common") + "</span> | Taille: " + (fish.size || 0) + " cm | Poids: " + (fish.weight || 0) + " kg</div>" +
            "<div class='fish-state'>État: <span class='" + (fish.spoiled ? 'spoiled' : '') + "'>" + getFishStateLabel(fish) + "</span></div>" +
            "<div class='fish-value'>Valeur actuelle: " + fishValue + "</div>" +
          "</div>" +
          "<div class='fish-actions'>" +
            "<div class='fish-turn-row'>" +
              "<input type='number' min='1' step='1' value='3' data-turns-for='" + index + "'>" +
              "<button class='btn' data-action='" + turnAction + "' data-index='" + index + "'>" + turnActionLabel + "</button>" +
            "</div>" +
            "<button class='btn' data-sell='" + index + "'>Vendre</button>" +
          "</div>";

        list.appendChild(item);
      });

      const sellButtons = list.querySelectorAll("button[data-sell]");
      sellButtons.forEach((button) => {
        button.addEventListener("click", () => {
          sellOne(Number(button.getAttribute("data-sell")));
        });
      });

      const turnButtons = list.querySelectorAll("button[data-action]");
      turnButtons.forEach((button) => {
        button.addEventListener("click", () => {
          const index = Number(button.getAttribute("data-index"));
          const action = button.getAttribute("data-action");
          const input = list.querySelector("input[data-turns-for='" + index + "']");
          const turns = input ? Number(input.value) : 1;

          if (action === "out") {
            takeFishOut(index, turns);
          } else {
            returnFishToFridge(index);
          }
        });
      });
    }

    sellAll.addEventListener("click", () => {
      const totalValue = inventory.reduce((sum, fish) => sum + getFishValue(fish), 0);
      money += totalValue;
      inventory = [];
      saveState();
      render();
    });

    sellByFilter.addEventListener("click", () => {
      applyAutoSellToInventory();
    });

    autoSellEnabledInput.addEventListener("change", () => {
      autoSellEnabled = autoSellEnabledInput.checked;
      saveState();
      render();
    });

    autoSellMaxPriceInput.addEventListener("input", () => {
      const value = Number(autoSellMaxPriceInput.value);
      autoSellMaxPrice = Number.isNaN(value) ? 0 : Math.max(0, Math.floor(value));
      saveState();
      render();
    });

    autoSellMaxRaritySelect.addEventListener("change", () => {
      autoSellMaxRarity = autoSellMaxRaritySelect.value;
      saveState();
      render();
    });

    advanceTurn.addEventListener("click", () => {
      advanceOneTurn();
    });

    loadInventory();
    render();
  </script>
</body>
</html>
