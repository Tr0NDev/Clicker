<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Settings</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #181818;
      color: white;
      margin: 0;
      padding: 30px;
    }

    .panel {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
      border: 1px solid #444;
      border-radius: 14px;
      background: #222;
    }

    button, a.button-link {
      display: inline-block;
      padding: 14px 18px;
      margin: 10px 6px;
      font-size: 16px;
      cursor: pointer;
      border: 1px solid #aaa;
      background: #555;
      color: white;
      text-decoration: none;
      border-radius: 10px;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      margin: 12px 0 20px;
      border-radius: 10px;
      border: 1px solid #666;
      background: #111;
      color: #fff;
      padding: 12px;
      box-sizing: border-box;
      resize: vertical;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      text-align: left;
    }

    h1, h2 {
      margin-top: 0;
    }

    .small {
      color: #bbb;
      font-size: 14px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Settings</h1>

    <a class="button-link" href="../">Back to Game</a>

    <div class="row">
      <section>
        <h2>Export Save</h2>
        <button id="generateSave">Generate Save TXT</button>
        <textarea id="saveOutput" readonly placeholder="Save text will appear here..."></textarea>
      </section>

      <section>
        <h2>Import Save</h2>
        <textarea id="saveInput" placeholder="Paste your save text here..."></textarea>
        <button id="loadSave">Load</button>
      </section>
    </div>
  </div>

  <script>
    const generateSave = document.getElementById("generateSave");
    const loadSave = document.getElementById("loadSave");
    const saveOutput = document.getElementById("saveOutput");
    const saveInput = document.getElementById("saveInput");

    function readGameState() {
      return {
        money: Number(localStorage.getItem("clicker_money")) || 0,
        caughtCount: Number(localStorage.getItem("clicker_caughtCount")) || 0,
        inventory: localStorage.getItem("clicker_inventory") || "[]",
        currentFish: localStorage.getItem("clicker_currentFish") || "",
        sizeBoostLevel: Number(localStorage.getItem("clicker_sizeBoostLevel")) || 0,
        autoFisherLevel: Number(localStorage.getItem("clicker_autoFisherLevel")) || 0,
        weightBoostLevel: Number(localStorage.getItem("clicker_weightBoostLevel")) || 0,
        autoWaitReductionLevel: Number(localStorage.getItem("clicker_autoWaitReductionLevel")) || 0,
        autoSellEnabled: localStorage.getItem("clicker_autoSellEnabled") || "false",
        autoSellMaxPrice: Number(localStorage.getItem("clicker_autoSellMaxPrice")) || 25,
        autoSellMaxRarity: localStorage.getItem("clicker_autoSellMaxRarity") || "common",
        saveTime: new Date().toISOString()
      };
    }

    function buildSaveText(state) {
      return [
        "money=" + state.money,
        "caughtCount=" + state.caughtCount,
        "inventory=" + state.inventory,
        "currentFish=" + state.currentFish,
        "sizeBoostLevel=" + state.sizeBoostLevel,
        "autoFisherLevel=" + state.autoFisherLevel,
        "weightBoostLevel=" + state.weightBoostLevel,
        "autoWaitReductionLevel=" + state.autoWaitReductionLevel,
        "autoSellEnabled=" + state.autoSellEnabled,
        "autoSellMaxPrice=" + state.autoSellMaxPrice,
        "autoSellMaxRarity=" + state.autoSellMaxRarity,
        "saveTime=" + state.saveTime
      ].join("\n");
    }

    function parseSaveText(text) {
      const state = {
        money: 0,
        caughtCount: 0,
        inventory: "[]",
        currentFish: "",
        sizeBoostLevel: 0,
        autoFisherLevel: 0,
        weightBoostLevel: 0,
        autoWaitReductionLevel: 0,
        autoSellEnabled: "false",
        autoSellMaxPrice: 25,
        autoSellMaxRarity: "common",
        saveTime: ""
      };

      const lines = text.split(/\r?\n/);
      for (const line of lines) {
        const parts = line.split("=");
        if (parts.length < 2) {
          continue;
        }

        const key = parts[0].trim();
        const rawValue = parts.slice(1).join("=").trim();
        const value = Number(rawValue);

        if (key === "money" && !Number.isNaN(value)) {
          state.money = value;
        }
        if (key === "caughtCount" && !Number.isNaN(value)) {
          state.caughtCount = value;
        }
        if (key === "inventory") {
          state.inventory = rawValue;
        }
        if (key === "currentFish") {
          state.currentFish = rawValue;
        }
        if (key === "sizeBoostLevel" && !Number.isNaN(value)) {
          state.sizeBoostLevel = value;
        }
        if (key === "autoFisherLevel" && !Number.isNaN(value)) {
          state.autoFisherLevel = value;
        }
        if (key === "weightBoostLevel" && !Number.isNaN(value)) {
          state.weightBoostLevel = value;
        }
        if (key === "autoWaitReductionLevel" && !Number.isNaN(value)) {
          state.autoWaitReductionLevel = value;
        }
        if (key === "autoSellEnabled") {
          state.autoSellEnabled = rawValue === "true" ? "true" : "false";
        }
        if (key === "autoSellMaxPrice" && !Number.isNaN(value)) {
          state.autoSellMaxPrice = value;
        }
        if (key === "autoSellMaxRarity") {
          state.autoSellMaxRarity = rawValue || "common";
        }
        if (key === "saveTime") {
          state.saveTime = rawValue;
        }
      }

      return state;
    }

    generateSave.addEventListener("click", () => {
      const saveText = buildSaveText(readGameState());
      saveOutput.value = saveText;
      saveOutput.focus();
      saveOutput.select();
    });

    loadSave.addEventListener("click", () => {
      const state = parseSaveText(saveInput.value);
      localStorage.setItem("clicker_money", String(state.money));
      localStorage.setItem("clicker_caughtCount", String(state.caughtCount));
      localStorage.setItem("clicker_inventory", state.inventory);
      localStorage.setItem("clicker_sizeBoostLevel", String(state.sizeBoostLevel));
      localStorage.setItem("clicker_autoFisherLevel", String(state.autoFisherLevel));
      localStorage.setItem("clicker_weightBoostLevel", String(state.weightBoostLevel));
      localStorage.setItem("clicker_autoWaitReductionLevel", String(state.autoWaitReductionLevel));
      localStorage.setItem("clicker_autoSellEnabled", state.autoSellEnabled);
      localStorage.setItem("clicker_autoSellMaxPrice", String(state.autoSellMaxPrice));
      localStorage.setItem("clicker_autoSellMaxRarity", state.autoSellMaxRarity);

      if (state.currentFish) {
        localStorage.setItem("clicker_currentFish", state.currentFish);
      }

      const loadedState = {
        money: state.money,
        caughtCount: state.caughtCount,
        inventory: state.inventory,
        currentFish: state.currentFish || localStorage.getItem("clicker_currentFish") || "",
        sizeBoostLevel: state.sizeBoostLevel,
        autoFisherLevel: state.autoFisherLevel,
        weightBoostLevel: state.weightBoostLevel,
        autoWaitReductionLevel: state.autoWaitReductionLevel,
        autoSellEnabled: state.autoSellEnabled,
        autoSellMaxPrice: state.autoSellMaxPrice,
        autoSellMaxRarity: state.autoSellMaxRarity,
        saveTime: new Date().toISOString()
      };

      saveOutput.value = buildSaveText(loadedState);
      alert("Save successfully loaded!");
    });

    saveOutput.value = buildSaveText(readGameState());
  </script>
</body>
</html>
