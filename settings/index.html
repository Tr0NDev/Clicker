<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Settings</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #181818;
      color: white;
      margin: 0;
      padding: 30px;
    }

    .panel {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
      border: 1px solid #444;
      border-radius: 14px;
      background: #222;
    }

    button, a.button-link {
      display: inline-block;
      padding: 14px 18px;
      margin: 10px 6px;
      font-size: 16px;
      cursor: pointer;
      border: 1px solid #aaa;
      background: #555;
      color: white;
      text-decoration: none;
      border-radius: 10px;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      margin: 12px 0 20px;
      border-radius: 10px;
      border: 1px solid #666;
      background: #111;
      color: #fff;
      padding: 12px;
      box-sizing: border-box;
      resize: vertical;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      text-align: left;
    }

    h1, h2 {
      margin-top: 0;
    }

    .small {
      color: #bbb;
      font-size: 14px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Settings</h1>

    <a class="button-link" href="../">Back to Game</a>

    <div class="row">
      <section>
        <h2>Export Save</h2>
        <button id="generateSave">Generate Save TXT</button>
        <textarea id="saveOutput" readonly placeholder="Save text will appear here..."></textarea>
      </section>

      <section>
        <h2>Import Save</h2>
        <textarea id="saveInput" placeholder="Paste your save text here..."></textarea>
        <button id="loadSave">Load</button>
      </section>
    </div>
  </div>

  <script>
    const generateSave = document.getElementById("generateSave");
    const loadSave = document.getElementById("loadSave");
    const saveOutput = document.getElementById("saveOutput");
    const saveInput = document.getElementById("saveInput");

    function readGameState() {
      return {
        money: Number(localStorage.getItem("clicker_money")) || 0,
        clickValue: Number(localStorage.getItem("clicker_clickValue")) || 1,
        autoIncome: Number(localStorage.getItem("clicker_autoIncome")) || 0,
        clickUpgradeLevel: Number(localStorage.getItem("clicker_clickUpgradeLevel")) || 0,
        autoUpgradeLevel: Number(localStorage.getItem("clicker_autoUpgradeLevel")) || 0,
        saveTime: new Date().toISOString()
      };
    }

    function buildSaveText(state) {
      return [
        "money=" + state.money,
        "clickValue=" + state.clickValue,
        "autoIncome=" + state.autoIncome,
        "clickUpgradeLevel=" + state.clickUpgradeLevel,
        "autoUpgradeLevel=" + state.autoUpgradeLevel,
        "saveTime=" + state.saveTime
      ].join("\n");
    }

    function parseSaveText(text) {
      const state = {
        money: 0,
        clickValue: 1,
        autoIncome: 0,
        clickUpgradeLevel: 0,
        autoUpgradeLevel: 0,
        saveTime: ""
      };

      const lines = text.split(/\r?\n/);
      for (const line of lines) {
        const parts = line.split("=");
        if (parts.length < 2) {
          continue;
        }

        const key = parts[0].trim();
        const value = Number(parts.slice(1).join("=").trim());

        if (key === "money" && !Number.isNaN(value)) {
          state.money = value;
        }
        if (key === "clickValue" && !Number.isNaN(value)) {
          state.clickValue = value;
        }
        if (key === "autoIncome" && !Number.isNaN(value)) {
          state.autoIncome = value;
        }
        if (key === "clickUpgradeLevel" && !Number.isNaN(value)) {
          state.clickUpgradeLevel = value;
        }
        if (key === "autoUpgradeLevel" && !Number.isNaN(value)) {
          state.autoUpgradeLevel = value;
        }
        if (key === "saveTime") {
          state.saveTime = parts.slice(1).join("=").trim();
        }
      }

      return state;
    }

    function applyOfflineProgress(state) {
      const savedTime = Date.parse(state.saveTime);
      if (Number.isNaN(savedTime)) {
        return {
          money: state.money,
          gained: 0,
          elapsedSeconds: 0
        };
      }

      const now = Date.now();
      const elapsedSeconds = Math.max(0, Math.floor((now - savedTime) / 1000));
      const gained = elapsedSeconds * state.autoIncome;

      return {
        money: state.money + gained,
        gained: gained,
        elapsedSeconds: elapsedSeconds
      };
    }

    generateSave.addEventListener("click", () => {
      const saveText = buildSaveText(readGameState());
      saveOutput.value = saveText;
      saveOutput.focus();
      saveOutput.select();
    });

    loadSave.addEventListener("click", () => {
      const state = parseSaveText(saveInput.value);
      const offlineProgress = applyOfflineProgress(state);
      const loadedTime = new Date().toISOString();

      localStorage.setItem("clicker_clickValue", String(state.clickValue));
      localStorage.setItem("clicker_autoIncome", String(state.autoIncome));
      localStorage.setItem("clicker_clickUpgradeLevel", String(state.clickUpgradeLevel));
      localStorage.setItem("clicker_autoUpgradeLevel", String(state.autoUpgradeLevel));

      const loadedState = {
        money: offlineProgress.money,
        clickValue: state.clickValue,
        autoIncome: state.autoIncome,
        clickUpgradeLevel: state.clickUpgradeLevel,
        autoUpgradeLevel: state.autoUpgradeLevel,
        saveTime: loadedTime
      };

      localStorage.setItem("clicker_money", String(loadedState.money));
      saveOutput.value = buildSaveText(loadedState);
      alert("Save successfully loaded! Gained " + offlineProgress.gained + " money over " + offlineProgress.elapsedSeconds + " seconds.");
    });

    saveOutput.value = buildSaveText(readGameState());
  </script>
</body>
</html>
