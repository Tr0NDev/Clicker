<!DOCTYPE html>
<html>
<head>
  <title>Team - Clicker</title>
  <style>
    :root {
      --sidebar-width: 420px;
    }

    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
      margin: 0;
      padding: 24px calc(var(--sidebar-width) + 20px) 36px 16px;
      height: 100vh;
      overflow: hidden;
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: #0c1217;
      border-bottom: 1px solid #22313b;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.35);
      margin: -24px calc(-1 * (var(--sidebar-width) + 20px)) 18px -24px;
      padding: 10px 0;
    }

    .top-nav {
      display: flex;
      justify-content: flex-start;
      gap: 10px;
      flex-wrap: wrap;
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 0 0 0 16px;
    }

    .nav-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      background: #31414d;
      color: #eef5f9;
      border: 1px solid #667a86;
      padding: 12px 16px;
      margin: 0;
      margin-right: 8px;
      font-size: 15px;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .nav-button:hover {
      background: #3a4c59;
      border-color: #7f95a3;
    }

    .nav-button.active-nav-button {
      background: #dbe3e8;
      color: #1d2a33;
      border-color: #dbe3e8;
      font-weight: bold;
    }

    .settings-nav-button {
      margin-left: auto;
      margin-right: 16px;
    }

    .shell {
      max-width: 1080px;
      margin: 0 auto;
      height: calc(100vh - 72px);
      display: flex;
      flex-direction: column;
    }

    h1 {
      font-size: 36px;
      margin: 20px 0 30px;
      text-align: left;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 20px;
      align-items: start;
      max-width: 1080px;
      margin: 18px auto 0;
      flex-shrink: 0;
    }

    .reserve-section {
      margin-top: 40px;
      padding: 20px;
      background: #0f1519;
      border: 1px solid #2f4d5c;
      border-radius: 16px;
      max-width: 1080px;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .reserve-title {
      font-size: 20px;
      font-weight: bold;
      color: #8dc4e0;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .reserve-sort {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #b8d4e3;
    }

    .reserve-sort select {
      border: 1px solid #4b6878;
      background: #142029;
      color: #e6f3fb;
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 13px;
    }

    .reserve-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      overflow-y: auto;
      overflow-x: hidden;
      flex: 1;
      padding-right: 8px;
      scrollbar-gutter: stable;
    }

    .reserve-empty {
      color: #6b8796;
      font-style: italic;
      font-size: 16px;
      text-align: center;
      margin: auto;
    }

    .reserve-character-card {
      background: linear-gradient(180deg, #18222a 0%, #12191f 100%);
      border: 1px solid #2f4d5c;
      border-radius: 12px;
      padding: 12px;
      text-align: center;
      cursor: move;
      touch-action: manipulation;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      user-select: none;
      flex-shrink: 0;
      width: 200px;
      height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      box-sizing: border-box;
    }

    .reserve-character-card.stars-2 {
      background: linear-gradient(180deg, rgba(0, 212, 170, 0.2) 0%, rgba(0, 180, 140, 0.1) 100%);
      border-color: #00d4aa;
    }

    .reserve-character-card.stars-3 {
      background: linear-gradient(180deg, rgba(74, 158, 255, 0.2) 0%, rgba(50, 130, 220, 0.1) 100%);
      border-color: #4a9eff;
    }

    .reserve-character-card.stars-4 {
      background: linear-gradient(180deg, rgba(179, 102, 255, 0.2) 0%, rgba(150, 80, 220, 0.1) 100%);
      border-color: #b366ff;
    }

    .reserve-character-card.stars-5 {
      background: linear-gradient(180deg, rgba(255, 215, 0, 0.25) 0%, rgba(255, 180, 0, 0.15) 100%);
      border-color: #ffd700;
    }

    .reserve-character-card:hover {
      border-color: #8dc4e0;
      box-shadow: 0 0 12px rgba(141, 196, 224, 0.2);
    }

    .reserve-character-card.dragging {
      opacity: 0.5;
      border-color: #8dc4e0;
    }

    .reserve-character-card.drag-over {
      border-color: #8dc4e0;
      box-shadow: 0 0 12px rgba(141, 196, 224, 0.4);
    }

    .characters-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
    }

    .character-card {
      background: linear-gradient(180deg, #18222a 0%, #12191f 100%);
      border: 2px solid #2f4d5c;
      border-radius: 16px;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      touch-action: manipulation;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      user-select: none;
      width: 200px;
      height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
    }

    .character-card.stars-2 {
      background: linear-gradient(180deg, rgba(0, 212, 170, 0.2) 0%, rgba(0, 180, 140, 0.1) 100%);
      border-color: #00d4aa;
    }

    .character-card.stars-3 {
      background: linear-gradient(180deg, rgba(74, 158, 255, 0.2) 0%, rgba(50, 130, 220, 0.1) 100%);
      border-color: #4a9eff;
    }

    .character-card.stars-4 {
      background: linear-gradient(180deg, rgba(179, 102, 255, 0.2) 0%, rgba(150, 80, 220, 0.1) 100%);
      border-color: #b366ff;
    }

    .character-card.stars-5 {
      background: linear-gradient(180deg, rgba(255, 215, 0, 0.25) 0%, rgba(255, 180, 0, 0.15) 100%);
      border-color: #ffd700;
    }

    .character-card.slot-empty {
      border: 2px dashed #4a6978;
      background: rgba(15, 21, 25, 0.5);
      cursor: default;
    }

    .character-card.slot-empty:hover {
      border-color: #4a6978;
    }

    .slot-empty-text {
      color: #6b8796;
      font-size: 14px;
      font-weight: bold;
    }

    .character-card.dragging {
      opacity: 0.5;
      border-color: #8dc4e0;
    }

    .character-card.drag-over {
      border-color: #8dc4e0;
      box-shadow: 0 0 12px rgba(141, 196, 224, 0.4);
    }

    .character-card:hover {
      border-color: #8dc4e0;
      box-shadow: 0 0 12px rgba(141, 196, 224, 0.2);
    }

    .character-header {
      margin-bottom: 16px;
    }

    .character-name {
      font-size: 24px;
      font-weight: bold;
      color: #8dc4e0;
      margin-bottom: 8px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .stack-count {
      display: inline-block;
      font-size: 12px;
      font-weight: bold;
      color: #0f1c24;
      background: #8dc4e0;
      border-radius: 999px;
      padding: 2px 7px;
      line-height: 1.2;
    }

    .reserve-character-card .character-name {
      font-size: 20px;
      font-weight: bold;
      color: #8dc4e0;
      margin-bottom: 6px;
    }

    .character-stars {
      font-size: 18px;
      color: #ffa657;
      margin-bottom: 8px;
      letter-spacing: 4px;
    }

    .reserve-character-card .character-stars {
      font-size: 16px;
      color: #ffa657;
      margin-bottom: 6px;
      letter-spacing: 3px;
    }

    .character-level {
      font-size: 14px;
      color: #a9c2d3;
    }

    .reserve-character-card .character-level {
      font-size: 13px;
      color: #a9c2d3;
    }

    .talent-badge {
      margin-top: 6px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid #4b6878;
      background: #142029;
      color: #d9ecf8;
      font-size: 11px;
      letter-spacing: 0.03em;
      max-width: 170px;
      overflow: visible;
      position: relative;
    }

    .talent-state {
      margin-top: 5px;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: #8aa6b8;
    }

    .talent-state.active {
      color: #7ee787;
    }

    .talent-state.inactive {
      color: #f1c27d;
    }

    .talent-state.none {
      color: #88a0af;
    }

    .talent-inline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .talent-name-text {
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .talent-help {
      position: relative;
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 1px solid #84a9be;
      color: #d9ecf8;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
      background: #203240;
      cursor: help;
      flex: 0 0 auto;
      line-height: 1;
    }

    .talent-help::after {
      content: attr(data-tooltip);
      position: absolute;
      left: 50%;
      bottom: calc(100% + 8px);
      transform: translateX(-50%) translateY(4px);
      background: #0f1519;
      color: #d9ecf8;
      border: 1px solid #4b6878;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.35;
      min-width: 220px;
      max-width: 320px;
      white-space: normal;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.45);
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
      z-index: 90;
      transition: opacity 0.06s ease, transform 0.06s ease, visibility 0.06s ease;
    }

    .talent-help:hover::after,
    .talent-help:focus-visible::after {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    .modal-talent-value {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      justify-content: flex-end;
    }

    .stack-nav {
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .stack-nav-btn {
      border: 1px solid #4b6878;
      background: #142029;
      color: #d9ecf8;
      border-radius: 6px;
      width: 24px;
      height: 24px;
      line-height: 1;
      cursor: pointer;
      padding: 0;
      font-size: 14px;
    }

    .stack-nav-btn:hover {
      background: #1d2d39;
    }

    .stack-nav-index {
      font-size: 11px;
      color: #a9c2d3;
      min-width: 54px;
    }

    .sell-btn {
      margin-top: 8px;
      border: 1px solid #9f6d3a;
      background: #3b2413;
      color: #ffd7a8;
      border-radius: 8px;
      padding: 5px 8px;
      font-size: 11px;
      cursor: pointer;
      line-height: 1.1;
    }

    .sell-btn:hover {
      background: #4a2d18;
    }

    .character-stats {
      display: grid;
      gap: 10px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px;
      background: #0f1519;
      border-radius: 8px;
      font-size: 14px;
    }

    .stat-label {
      color: #a6c3d5;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: 12px;
    }

    .stat-value {
      color: #f7f0c4;
      font-weight: bold;
      font-size: 16px;
    }

    .bonus-stats {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #2f4d5c;
    }

    .bonus-stat-box {
      background: #0f1519;
      border-radius: 8px;
      padding: 8px;
      text-align: center;
    }

    .bonus-stat-label {
      font-size: 11px;
      color: #a6c3d5;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }

    .bonus-stat-value {
      font-size: 14px;
      color: #7ee787;
      font-weight: bold;
    }

    .talents-section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #2f4d5c;
    }

    .talents-title {
      font-size: 12px;
      color: #a6c3d5;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .no-talents {
      font-size: 13px;
      color: #6b8796;
      font-style: italic;
    }

    .stat-origin {
      font-size: 11px;
      color: #88a0af;
      font-style: italic;
      margin-top: 2px;
    }

    .team-stats-panel {
      position: fixed;
      top: 72px;
      right: 0;
      bottom: 8px;
      width: var(--sidebar-width);
      max-width: var(--sidebar-width);
      background: #111;
      border-left: 1px solid #2a3f4d;
      box-sizing: border-box;
      padding: 14px 10px;
      z-index: 30;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }

    .team-stats-resizer {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 10px;
      cursor: col-resize;
      touch-action: none;
      z-index: 40;
      background: transparent;
    }

    .team-stats-resizer:hover {
      background: rgba(141, 196, 224, 0.12);
    }

    .team-stat-box {
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 10px;
      text-align: center;
    }

    .stat-progression {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      justify-content: center;
    }

    .stat-slot {
      background: rgba(45, 77, 92, 0.5);
      border: 1px solid #4a6978;
      border-radius: 4px;
      padding: 3px 6px;
      text-align: center;
      min-width: 45px;
      font-size: 10px;
      color: #8dc4e0;
    }

    .stat-slot.active {
      background: rgba(141, 196, 224, 0.3);
      border-color: #8dc4e0;
      font-weight: bold;
    }

    .team-stat-label {
      color: #a6c3d5;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }

    .team-stat-value {
      font-size: 16px;
      font-weight: bold;
      color: #d9ecf8;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 50;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: linear-gradient(180deg, #18222a 0%, #12191f 100%);
      margin: 10% auto;
      padding: 24px;
      border: 1px solid #2f4d5c;
      border-radius: 16px;
      width: 90%;
      max-width: 900px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid #2f4d5c;
    }

    .modal-title {
      font-size: 24px;
      font-weight: bold;
      color: #8dc4e0;
    }

    .modal-stars {
      font-size: 20px;
      color: #ffa657;
      letter-spacing: 3px;
    }

    .close-btn {
      background: none;
      border: none;
      color: #8dc4e0;
      font-size: 28px;
      cursor: pointer;
      padding: 0;
      width: 30px;
      height: 30px;
    }

    .close-btn:hover {
      color: #d9ecf8;
    }

    .modal-stats {
      display: grid;
      gap: 12px;
    }

    .modal-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(260px, 1fr);
      gap: 14px;
      align-items: start;
    }

    .modal-left {
      min-width: 0;
    }

    .modal-right {
      min-width: 0;
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .modal-image-slot {
      border: 1px dashed #4b6878;
      border-radius: 12px;
      height: 180px;
      background: linear-gradient(180deg, rgba(20, 32, 41, 0.65) 0%, rgba(15, 22, 28, 0.75) 100%);
      color: #8aa6b8;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-align: center;
      padding: 10px;
      box-sizing: border-box;
    }

    .modal-stat-item {
      background: #0f1519;
      border-radius: 8px;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-stat-label {
      color: #a6c3d5;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    .modal-stat-value {
      color: #f7f0c4;
      font-weight: bold;
      font-size: 16px;
    }

    .modal-actions-row {
      display: flex;
      justify-content: flex-start;
      gap: 8px;
      flex-wrap: wrap;
    }

    .modal-action-btn {
      border: 1px solid #7cb0ca;
      background: linear-gradient(180deg, #3f7fa2 0%, #285a74 100%);
      color: #f2fbff;
      border-radius: 14px;
      padding: 14px 22px;
      font-size: 17px;
      font-weight: bold;
      letter-spacing: 0.02em;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.35), 0 0 0 2px rgba(124, 176, 202, 0.18);
      transition: transform 0.1s ease, filter 0.12s ease, box-shadow 0.12s ease;
    }

    .modal-action-btn:hover {
      filter: brightness(1.08);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4), 0 0 0 2px rgba(124, 176, 202, 0.28);
    }

    .modal-action-btn:active {
      transform: translateY(1px) scale(0.99);
    }

    .modal-action-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
      filter: grayscale(0.15);
    }

    .fusion-panel {
      display: none;
      padding: 12px;
      border: 1px solid #35505f;
      border-radius: 10px;
      background: #10191f;
    }

    .fusion-panel.visible {
      display: block;
    }

    .fusion-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9dc2d8;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .fusion-help {
      font-size: 12px;
      color: #b8d4e3;
      margin-bottom: 8px;
    }

    .fusion-list {
      display: grid;
      gap: 6px;
      max-height: 180px;
      overflow-y: auto;
      margin-bottom: 10px;
      padding-right: 4px;
    }

    .fusion-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 7px 9px;
      border: 1px solid #35505f;
      border-radius: 8px;
      background: #132029;
      font-size: 12px;
      color: #d9ecf8;
    }

    .fusion-option-main {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .fusion-confirm {
      border: 1px solid #4d7a3f;
      background: #25451f;
      color: #d8ffd0;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
    }

    .fusion-confirm:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .fusion-empty {
      font-size: 12px;
      color: #89a2b1;
      font-style: italic;
    }

    .sell-confirm-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      z-index: 120;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .sell-confirm-modal.visible {
      display: flex;
    }

    .sell-confirm-card {
      width: min(420px, 100%);
      background: linear-gradient(180deg, #18222a 0%, #12191f 100%);
      border: 1px solid #3f6075;
      border-radius: 14px;
      padding: 16px;
      box-sizing: border-box;
    }

    const teamStatsResizer = document.querySelector('.team-stats-resizer');
    const TEAM_STATS_WIDTH_STORAGE_KEY = 'clicker_upgradesWidth';
    let teamStatsWidth = Number(localStorage.getItem(TEAM_STATS_WIDTH_STORAGE_KEY)) || 420;

    function clampTeamStatsWidth(value) {
      const maxWidth = Math.max(320, Math.floor(window.innerWidth * 0.58));
      return Math.min(maxWidth, Math.max(320, Math.floor(value)));
    }

    function setTeamStatsWidth(value, persist) {
      teamStatsWidth = clampTeamStatsWidth(value);
      document.documentElement.style.setProperty('--sidebar-width', teamStatsWidth + 'px');

      if (persist) {
        localStorage.setItem(TEAM_STATS_WIDTH_STORAGE_KEY, String(teamStatsWidth));
      }
    }

    setTeamStatsWidth(teamStatsWidth, false);

    if (teamStatsResizer && teamStatsPanel) {
      let isResizing = false;

      teamStatsResizer.addEventListener('mousedown', (event) => {
        event.preventDefault();
        isResizing = true;
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
      });

      window.addEventListener('mousemove', (event) => {
        if (!isResizing) {
          return;
        }

        const nextWidth = window.innerWidth - event.clientX;
        setTeamStatsWidth(nextWidth, false);
      });

      window.addEventListener('mouseup', () => {
        if (!isResizing) {
          return;
        }

        isResizing = false;
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        setTeamStatsWidth(teamStatsWidth, true);
      });

      window.addEventListener('resize', () => {
        setTeamStatsWidth(teamStatsWidth, false);
      });
    }

    function getTalentNameById(talentId) {
      return TALENT_NAME_BY_ID.get(talentId) || 'Unknown Talent';
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function getTalentDescriptionById(talentId) {
      if (!talentId) {
        return TALENT_DESCRIPTION_BY_ID['no-talent'];
      }
      return TALENT_DESCRIPTION_BY_ID[talentId] || 'No description available.';
    }

    function renderTalentWithHelp(name, talentId, wrapperClassName = '') {
      const safeName = escapeHtml(name || 'No Talent');
      const safeDescription = escapeHtml(getTalentDescriptionById(talentId));
      const wrapperClass = wrapperClassName ? ` ${wrapperClassName}` : '';
      return `<span class="talent-inline${wrapperClass}"><span class="talent-name-text">${safeName}</span><span class="talent-help" tabindex="0" data-tooltip="${safeDescription}" aria-label="Talent description">?</span></span>`;
    }

    function getCharacterKey(char) {
      if (!char) {
        return '';
      }
      return char.instanceId ? `instance:${char.instanceId}` : `id:${char.id}`;
    }

    function getTalentActivityMap() {
      const orderedTeam = [0, 1, 2]
        .map((slot) => allCharacters.find((char) => char.teamSlot === slot))
        .filter(Boolean);
      const effectiveTeam = applyTalentEffects(orderedTeam);
      return Object.fromEntries(effectiveTeam.map((char) => [getCharacterKey(char), !!char.talentActive]));
    }

    function canSellCharacter(char) {
      if (!char || !char.unlocked) {
        return false;
      }
      const templateId = Number(char.templateId || char.id);
      return !(templateId === 1 && !char.instanceId);
    }

    function getCharacterSellValue(char) {
      const baseCost = Math.max(100, Number(char?.cost) || 100);
      const stars = Math.max(1, Number(char?.stars) || 1);
      return Math.max(25, Math.round(baseCost * 0.35 + stars * 10));
    }

    function getFusionRequirement(level) {
      const currentLevel = Math.max(1, Number(level) || 1);
      if (currentLevel >= MAX_FUSION_LEVEL) {
        return null;
      }
      const nextLevel = currentLevel + 1;
      return {
        nextLevel,
        totalNeeded: nextLevel,
        extraNeeded: nextLevel - 1
      };
    }

    function getMatchingFusionCandidates(targetChar) {
      const targetTemplate = Number(targetChar.templateId || targetChar.id);
      return allCharacters.filter((char) => {
        if (!char.unlocked || Number(char.id) === Number(targetChar.id)) {
          return false;
        }
        return Number(char.templateId || char.id) === targetTemplate;
      });
    }

    function applyFusionBoost(char) {
      char.level = Math.max(1, Number(char.level) || 1) + 1;
      char.incomeMultiplier = (Number(char.incomeMultiplier) || 1) * FUSION_PRIMARY_MULT;
      char.clickMultiplier = (Number(char.clickMultiplier) || 1) * FUSION_PRIMARY_MULT;
      char.fishingSpeed = (Number(char.fishingSpeed) || 1) * FUSION_PRIMARY_MULT;

      char.sizeAdd = (Number(char.sizeAdd) || 0) * FUSION_ADDITIVE_MULT;
      char.weightAdd = (Number(char.weightAdd) || 0) * FUSION_ADDITIVE_MULT;
      char.chanceAdd = (Number(char.chanceAdd) || 0) * FUSION_ADDITIVE_MULT;
      char.resaleAdd = (Number(char.resaleAdd) || 0) * FUSION_ADDITIVE_MULT;

      char.sizeMult = 1 + (((Number(char.sizeMult) || 1) - 1) * FUSION_PRIMARY_MULT);
      char.weightMult = 1 + (((Number(char.weightMult) || 1) - 1) * FUSION_PRIMARY_MULT);
      char.chanceMult = 1 + (((Number(char.chanceMult) || 1) - 1) * FUSION_PRIMARY_MULT);
      char.resaleMult = 1 + (((Number(char.resaleMult) || 1) - 1) * FUSION_PRIMARY_MULT);
    }

    function cloneCharacterStats(char) {
      return {
        level: Number(char.level) || 1,
        incomeMultiplier: Number(char.incomeMultiplier) || 1,
        clickMultiplier: Number(char.clickMultiplier) || 1,
        sizeAdd: Number(char.sizeAdd) || 0,
        sizeMult: Number(char.sizeMult) || 1,
        weightAdd: Number(char.weightAdd) || 0,
        weightMult: Number(char.weightMult) || 1,
        chanceAdd: Number(char.chanceAdd) || 0,
        chanceMult: Number(char.chanceMult) || 1,
        resaleAdd: Number(char.resaleAdd) || 0,
        resaleMult: Number(char.resaleMult) || 1,
        fishingSpeed: Number(char.fishingSpeed) || 1
      };
    }

    function formatFusionPreviewRow(label, before, after, formatter) {
      const beforeFormatted = formatter(before);
      const afterFormatted = formatter(after);
      const deltaFormatted = formatter(after - before, true);
      const deltaPrefix = (after - before) >= 0 ? '+' : '';

      return `
        <div class="fusion-preview-row">
          <span class="fusion-preview-label">${label}</span>
          <span class="fusion-preview-values">${beforeFormatted}<span class="fusion-arrow">-></span>${afterFormatted}<span class="fusion-gain">(${deltaPrefix}${deltaFormatted})</span></span>
        </div>
      `;
    }

    function getFusionPreviewMarkup(targetChar) {
      const before = cloneCharacterStats(targetChar);
      const after = cloneCharacterStats(targetChar);
      applyFusionBoost(after);

      const asMult = (value, raw = false) => raw ? `${value.toFixed(2)}x` : `${value.toFixed(2)}x`;
      const asPct = (value, raw = false) => raw ? `${value.toFixed(1)}%` : `${value.toFixed(1)}%`;
      const levelDelta = Math.round(after.level - before.level);
      const levelRow = `
        <div class="fusion-preview-row">
          <span class="fusion-preview-label">Level</span>
          <span class="fusion-preview-values">Lv.${Math.round(before.level)}<span class="fusion-arrow">-></span>Lv.${Math.round(after.level)}<span class="fusion-gain">(+${levelDelta})</span></span>
        </div>
      `;

      return `
        <div class="fusion-preview">
          ${levelRow}
          ${formatFusionPreviewRow('Income', before.incomeMultiplier, after.incomeMultiplier, asMult)}
          ${formatFusionPreviewRow('Click', before.clickMultiplier, after.clickMultiplier, asMult)}
          ${formatFusionPreviewRow('Fishing', before.fishingSpeed, after.fishingSpeed, asMult)}
          ${formatFusionPreviewRow('Size Add', before.sizeAdd, after.sizeAdd, asPct)}
          ${formatFusionPreviewRow('Weight Add', before.weightAdd, after.weightAdd, asPct)}
          ${formatFusionPreviewRow('Chance Add', before.chanceAdd, after.chanceAdd, asPct)}
          ${formatFusionPreviewRow('Resale Add', before.resaleAdd, after.resaleAdd, asPct)}
        </div>
      `;
    }

    function formatFusionSourceLabel(char) {
      const origin = Number.isInteger(char.teamSlot) ? `Team slot ${char.teamSlot + 1}` : 'Reserve';
      return `${origin} | Lv.${Number(char.level) || 1} | ${char.talentName || 'No Talent'}`;
    }

    function formatCharacterForReserveStorage(char) {
      return {
        templateId: Number(char.templateId || char.id),
        talentId: char.talentId || null,
        instanceId: char.instanceId || `legacy-${char.id}`,
        level: Number(char.level) || 1,
        incomeMultiplier: Number(char.incomeMultiplier) || 1,
        clickMultiplier: Number(char.clickMultiplier) || 1,
        sizeAdd: Number(char.sizeAdd) || 0,
        sizeMult: Number(char.sizeMult) || 1,
        weightAdd: Number(char.weightAdd) || 0,
        weightMult: Number(char.weightMult) || 1,
        chanceAdd: Number(char.chanceAdd) || 0,
        chanceMult: Number(char.chanceMult) || 1,
        resaleAdd: Number(char.resaleAdd) || 0,
        resaleMult: Number(char.resaleMult) || 1,
        fishingSpeed: Number(char.fishingSpeed) || 1
      };
    }

    function persistOwnedCharactersToReserveStorage() {
      const ownedEntries = allCharacters
        .filter((char) => char.unlocked && canSellCharacter(char))
        .map((char) => formatCharacterForReserveStorage(char))
        .slice(0, MAX_RESERVE_SIZE);

      localStorage.setItem(TEAM_RESERVE_STORAGE_KEY, JSON.stringify(ownedEntries));
    }

    function closeSellConfirmation(result) {
      sellConfirmModal.classList.remove('visible');
      if (sellConfirmResolver) {
        const resolve = sellConfirmResolver;
        sellConfirmResolver = null;
        resolve(result);
      }
    }

    function askSellConfirmation(charName, sellValue) {
      const safeName = escapeHtml(charName);
      sellConfirmText.innerHTML = `Etes-vous sur de vendre <strong>${safeName}</strong> pour <strong>${sellValue}</strong> ?`;
      sellConfirmModal.classList.add('visible');

      return new Promise((resolve) => {
        sellConfirmResolver = resolve;
      });
    }

    async function sellCharacter(charId) {
      const index = allCharacters.findIndex((entry) => Number(entry.id) === Number(charId));
      if (index < 0) {
        return;
      }

      const char = allCharacters[index];
      if (!canSellCharacter(char)) {
        return;
      }

      const sellValue = getCharacterSellValue(char);
      const confirmed = await askSellConfirmation(char.name, sellValue);
      if (!confirmed) {
        return;
      }

      const currentMoney = Math.max(0, Number(localStorage.getItem('clicker_money')) || 0);
      localStorage.setItem('clicker_money', String(Math.floor(currentMoney + sellValue)));

      allCharacters.splice(index, 1);
      persistOwnedCharactersToReserveStorage();

      const openModal = document.getElementById('statsModal');
      if (openModal && openModal.style.display === 'block') {
        openModal.style.display = 'none';
      }

      renderCharacters();
    }

    sellCancelBtn.addEventListener('click', () => {
      closeSellConfirmation(false);
    });

    sellConfirmBtn.addEventListener('click', () => {
      closeSellConfirmation(true);
    });

    sellConfirmModal.addEventListener('click', (event) => {
      if (event.target === sellConfirmModal) {
        closeSellConfirmation(false);
      }
    });

    function applyReserveCharactersFromSave() {
      // Remove previously generated duplicate instances before rebuilding from storage
      if (allCharacters.length > BASE_CHARACTER_COUNT) {
        allCharacters.splice(BASE_CHARACTER_COUNT);
      }

      allCharacters.forEach((char) => {
        if (char.id === 1) {
          char.unlocked = true;
          return;
        }
        char.unlocked = false;
        if (char.teamSlot !== null) {
          char.teamSlot = null;
        }
      });

      let reserveEntries = [];
      try {
        const raw = localStorage.getItem(TEAM_RESERVE_STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        reserveEntries = Array.isArray(parsed)
          ? parsed.map((entry, index) => {
            if (Number.isInteger(Number(entry))) {
              return {
                templateId: Number(entry),
                talentId: null,
                instanceId: `legacy-${Date.now()}-${index}`
              };
            }

            if (entry && typeof entry === 'object') {
              const templateId = Number(entry.templateId || entry.id);
              if (!Number.isInteger(templateId)) {
                return null;
              }

              return {
                templateId,
                talentId: typeof entry.talentId === 'string' ? entry.talentId : null,
                instanceId: typeof entry.instanceId === 'string' && entry.instanceId
                  ? entry.instanceId
                  : `legacy-${Date.now()}-${index}`,
                level: entry.level,
                incomeMultiplier: entry.incomeMultiplier,
                clickMultiplier: entry.clickMultiplier,
                sizeAdd: entry.sizeAdd,
                sizeMult: entry.sizeMult,
                weightAdd: entry.weightAdd,
                weightMult: entry.weightMult,
                chanceAdd: entry.chanceAdd,
                chanceMult: entry.chanceMult,
                resaleAdd: entry.resaleAdd,
                resaleMult: entry.resaleMult,
                fishingSpeed: entry.fishingSpeed
              };
            }

            return null;
          }).filter(Boolean)
          : [];
      } catch (error) {
        reserveEntries = [];
      }

      const limitedReserve = reserveEntries.slice(0, MAX_RESERVE_SIZE);
      const templateById = new Map(allCharacters.slice(0, BASE_CHARACTER_COUNT).map((char) => [char.templateId || char.id, char]));

      const readOverride = (value, fallback) => {
        const numeric = Number(value);
        return Number.isFinite(numeric) ? numeric : fallback;
      };

      limitedReserve.forEach((entry, index) => {
        const template = templateById.get(entry.templateId);
        if (!template) {
          return;
        }

        allCharacters.push({
          ...template,
          id: BASE_CHARACTER_COUNT + index + 1,
          instanceId: entry.instanceId,
          templateId: template.templateId || template.id,
          talentId: entry.talentId,
          talentName: entry.talentId ? getTalentNameById(entry.talentId) : 'No Talent',
          level: readOverride(entry.level, template.level),
          incomeMultiplier: readOverride(entry.incomeMultiplier, template.incomeMultiplier),
          clickMultiplier: readOverride(entry.clickMultiplier, template.clickMultiplier),
          sizeAdd: readOverride(entry.sizeAdd, template.sizeAdd),
          sizeMult: readOverride(entry.sizeMult, template.sizeMult),
          weightAdd: readOverride(entry.weightAdd, template.weightAdd),
          weightMult: readOverride(entry.weightMult, template.weightMult),
          chanceAdd: readOverride(entry.chanceAdd, template.chanceAdd),
          chanceMult: readOverride(entry.chanceMult, template.chanceMult),
          resaleAdd: readOverride(entry.resaleAdd, template.resaleAdd),
          resaleMult: readOverride(entry.resaleMult, template.resaleMult),
          fishingSpeed: readOverride(entry.fishingSpeed, template.fishingSpeed),
          unlocked: true,
          teamSlot: null
        });
      });
    }

    function loadTeamState() {
      try {
        const raw = localStorage.getItem('clicker_teamState');
        if (!raw) {
          return [];
        }

        const parsed = JSON.parse(raw);
        if (!parsed || !Array.isArray(parsed.teamChars)) {
          return [];
        }

        return parsed.teamChars
          .map((char) => ({
            templateId: Number(char.templateId || char.id),
            teamSlot: Number(char.teamSlot),
            instanceId: typeof char.instanceId === 'string' ? char.instanceId : null
          }))
          .filter((char) => Number.isInteger(char.templateId) && Number.isInteger(char.teamSlot));
      } catch (error) {
        return [];
      }
    }

    function applyTeamStateFromSave() {
      const savedTeam = loadTeamState();
      const usedCharacterIds = new Set();

      // Always clear runtime slots first, then rebuild from saved state.
      allCharacters.forEach((char) => {
        char.teamSlot = null;
      });

      if (savedTeam.length === 0) {
        const bob = allCharacters.find((char) => Number(char.templateId || char.id) === 1);
        if (bob) {
          bob.teamSlot = 0;
        }
        return;
      }

      savedTeam.sort((left, right) => left.teamSlot - right.teamSlot).forEach((savedChar) => {
        const match = allCharacters.find((char) => {
          const templateId = Number(char.templateId || char.id);
          return templateId === savedChar.templateId
            && (savedChar.instanceId ? char.instanceId === savedChar.instanceId : true)
            && char.unlocked
            && char.teamSlot === null
            && !usedCharacterIds.has(char.id);
        });

        if (match) {
          match.teamSlot = savedChar.teamSlot;
          usedCharacterIds.add(match.id);
        }
      });

      const fallbackSaved = savedTeam.filter((entry) => entry.instanceId);
      fallbackSaved.forEach((savedChar) => {
        const alreadyPlaced = allCharacters.some((char) => char.teamSlot === savedChar.teamSlot);
        if (alreadyPlaced) {
          return;
        }

        const fallbackMatch = allCharacters.find((char) => {
          const templateId = Number(char.templateId || char.id);
          return templateId === savedChar.templateId
            && char.unlocked
            && char.teamSlot === null
            && !usedCharacterIds.has(char.id);
        });

        if (fallbackMatch) {
          fallbackMatch.teamSlot = savedChar.teamSlot;
          usedCharacterIds.add(fallbackMatch.id);
        }
      });

      lastSavedSlotByInstanceId = Object.fromEntries(
        allCharacters
          .filter((char) => typeof char.instanceId === 'string' && char.teamSlot !== null)
          .map((char) => [char.instanceId, char.teamSlot])
      );
    }

    function getStarString(stars) {
      const starSymbols = '★'.repeat(stars);
      let color = '#a9c2d3'; // 1 star - default gray
      if (stars === 2) color = '#00d4aa'; // green
      if (stars === 3) color = '#4a9eff'; // blue
      if (stars === 4) color = '#b366ff'; // purple
      if (stars === 5) color = '#ffd700'; // yellow/gold
      return `<span style="color: ${color}; font-weight: bold;">${starSymbols}</span>`;
    }

    function toEffectiveChar(char) {
      return {
        id: char.id,
        instanceId: char.instanceId || null,
        templateId: char.templateId || char.id,
        name: char.name,
        stars: char.stars,
        level: char.level,
        teamSlot: char.teamSlot,
        talentId: char.talentId || null,
        talentName: char.talentName || 'No Talent',
        incomeMultiplier: Number(char.incomeMultiplier) || 1,
        clickMultiplier: Number(char.clickMultiplier) || 1,
        sizeAdd: Number(char.sizeAdd) || 0,
        sizeMult: Number(char.sizeMult) || 1,
        weightAdd: Number(char.weightAdd) || 0,
        weightMult: Number(char.weightMult) || 1,
        chanceAdd: Number(char.chanceAdd) || 0,
        chanceMult: Number(char.chanceMult) || 1,
        resaleAdd: Number(char.resaleAdd) || 0,
        resaleMult: Number(char.resaleMult) || 1,
        fishingSpeed: Number(char.fishingSpeed) || 1
      };
    }

    function getTalentEffectContext(orderedTeam) {
      return {
        teamCount: orderedTeam.length,
        bySlot: [0, 1, 2].map((slot) => orderedTeam.find((char) => char.teamSlot === slot) || null)
      };
    }

    function applyTalentEffects(baseTeam) {
      const team = baseTeam.map((char) => toEffectiveChar(char));
      const context = getTalentEffectContext(team);
      const bySlot = context.bySlot;
      const talentActiveByKey = {};

      const getCharKey = (char) => (char && char.instanceId) ? `instance:${char.instanceId}` : (char ? `id:${char.id}` : '');
      const markActive = (char) => {
        if (!char || !char.talentId) {
          return;
        }
        talentActiveByKey[getCharKey(char)] = true;
      };

      team.forEach((char) => {
        if (char.talentId) {
          talentActiveByKey[getCharKey(char)] = false;
        }
      });

      team.forEach((char) => {
        switch (char.talentId) {
          case 'avant-garde':
            if (char.teamSlot === 0) {
              char.incomeMultiplier *= 1.25;
              char.clickMultiplier *= 1.25;
              markActive(char);
            }
            break;
          case 'capitaine':
            if (char.teamSlot === 1) {
              bySlot.forEach((target) => {
                if (target && target.id !== char.id) {
                  target.fishingSpeed *= 1.15;
                }
              });
              markActive(char);
            }
            break;
          case 'finisseur':
            if (char.teamSlot === 2) {
              char.clickMultiplier *= 1.35;
              markActive(char);
            }
            break;
          case 'ancre':
            if (bySlot[1]) {
              bySlot[1].weightAdd += 20;
            }
            if (bySlot[2]) {
              bySlot[2].resaleAdd += 10;
            }
            if (bySlot[1] || bySlot[2]) {
              markActive(char);
            }
            break;
          case 'specialiste-income':
            if (char.incomeMultiplier >= 1.3) {
              char.incomeMultiplier *= 1.15;
              markActive(char);
            }
            break;
          case 'specialiste-chance': {
            const converted = Math.min(10, Math.max(0, char.weightAdd));
            char.weightAdd -= converted;
            char.chanceAdd += converted;
            if (converted > 0) {
              markActive(char);
            }
            break;
          }
          case 'specialiste-resale':
            char.resaleMult *= 1.2;
            char.clickMultiplier *= 0.95;
            markActive(char);
            break;
          case 'pecheur-equipe': {
            const fishingSources = team.filter((entry) => entry.fishingSpeed >= 1.2).length;
            char.fishingSpeed += fishingSources * 0.05;
            if (fishingSources > 0) {
              markActive(char);
            }
            break;
          }
          case 'combo-additif': {
            const additiveEntries = [
              { key: 'sizeAdd', value: char.sizeAdd },
              { key: 'weightAdd', value: char.weightAdd },
              { key: 'chanceAdd', value: char.chanceAdd },
              { key: 'resaleAdd', value: char.resaleAdd }
            ].filter((entry) => entry.value > 0);

            if (additiveEntries.length >= 2) {
              additiveEntries.sort((left, right) => left.value - right.value);
              const lowest = additiveEntries[0];
              char[lowest.key] += 12;
              markActive(char);
            }
            break;
          }
          case 'combo-multiplicatif': {
            const multiplicativeKeys = ['sizeMult', 'weightMult', 'chanceMult', 'resaleMult'];
            let applied = false;
            multiplicativeKeys.forEach((key) => {
              if (char[key] > 1) {
                char[key] += 0.05;
                applied = true;
              }
            });
            if (applied) {
              markActive(char);
            }
            break;
          }
          case 'solitaire-tactique':
            if (context.teamCount === 1) {
              char.incomeMultiplier *= 1.8;
              char.clickMultiplier *= 1.8;
              char.fishingSpeed *= 1.8;
              markActive(char);
            }
            break;
          case 'duo-tactique':
            if (context.teamCount === 2) {
              char.chanceAdd += 12;
              char.resaleAdd += 12;
              markActive(char);
            }
            break;
          case 'trio-tactique':
            if (context.teamCount === 3) {
              if (char.teamSlot === 0) {
                char.incomeMultiplier *= 1.1;
              } else if (char.teamSlot === 1) {
                char.weightAdd += 10;
              } else if (char.teamSlot === 2) {
                char.clickMultiplier *= 1.1;
              }
              markActive(char);
            }
            break;
          case 'swap-ready': {
            if (char.instanceId && Number.isInteger(lastSavedSlotByInstanceId[char.instanceId]) && lastSavedSlotByInstanceId[char.instanceId] !== char.teamSlot) {
              char.sizeAdd += 20;
              markActive(char);
            }
            break;
          }
          case 'anti-synergie':
            char.incomeMultiplier *= 1.35;
            char.chanceAdd -= 12;
            markActive(char);
            break;
          default:
            break;
        }
      });

      // Pair and team-wide synergies resolved in a second pass.
      team.forEach((char) => {
        if (char.talentId === 'relais') {
          const right = bySlot[char.teamSlot + 1];
          if (right) {
            right.chanceAdd += 8;
            markActive(char);
          }
        }
      });

      team.forEach((char) => {
        if (char.talentId === 'duo-parfait') {
          const left = bySlot[char.teamSlot - 1];
          const right = bySlot[char.teamSlot + 1];
          let applied = false;
          if (left && left.stars === char.stars) {
            char.incomeMultiplier *= 1.2;
            left.incomeMultiplier *= 1.2;
            applied = true;
          }
          if (right && right.stars === char.stars) {
            char.incomeMultiplier *= 1.2;
            right.incomeMultiplier *= 1.2;
            applied = true;
          }
          if (applied) {
            markActive(char);
          }
        }
      });

      const isAscendingStars = context.teamCount === 3
        && bySlot[0]
        && bySlot[1]
        && bySlot[2]
        && bySlot[0].stars < bySlot[1].stars
        && bySlot[1].stars < bySlot[2].stars;
      if (isAscendingStars) {
        team.forEach((char) => {
          if (char.talentId === 'escalier') {
            team.forEach((member) => {
              member.chanceAdd += 15;
            });
            markActive(char);
          }
        });
      }

      const hasMirror = bySlot[0] && bySlot[1] && bySlot[2] && bySlot[0].stars === bySlot[2].stars;
      if (hasMirror) {
        team.forEach((char) => {
          if (char.talentId === 'miroir' && bySlot[1]) {
            bySlot[1].clickMultiplier *= 1.3;
            markActive(char);
          }
        });
      }

      team.forEach((char) => {
        const key = getCharKey(char);
        char.talentActive = !!talentActiveByKey[key];
      });

      return team.sort((left, right) => left.teamSlot - right.teamSlot);
    }

    function setupFusionSection(char) {
      const fusionBtn = document.getElementById('modalFusionBtn');
      const fusionPanel = document.getElementById('fusionPanel');
      const requirement = getFusionRequirement(char.level);
      const candidates = getMatchingFusionCandidates(char);

      fusionPanel.className = 'fusion-panel';
      fusionPanel.innerHTML = '';

      if (!requirement) {
        fusionBtn.disabled = true;
        fusionBtn.textContent = 'Fusion (Max level)';
        return;
      }

      const enough = candidates.length >= requirement.extraNeeded;
      fusionBtn.disabled = !enough;
      fusionBtn.textContent = `Fusion -> Lv.${requirement.nextLevel}`;

      fusionBtn.onclick = () => {
        renderFusionPanel(char, requirement, candidates);
      };
    }

    function renderFusionPanel(targetChar, requirement, candidates) {
      const fusionPanel = document.getElementById('fusionPanel');

      if (fusionPanel.classList.contains('visible')) {
        fusionPanel.classList.remove('visible');
        fusionPanel.innerHTML = '';
        return;
      }

      const candidateRows = candidates.map((candidate) => {
        const safeName = escapeHtml(candidate.name);
        const safeMeta = escapeHtml(formatFusionSourceLabel(candidate));
        return `
          <label class="fusion-option">
            <span class="fusion-option-main">${safeName} (${candidate.stars}★)</span>
            <span>${safeMeta}</span>
            <input type="checkbox" class="fusion-candidate-checkbox" data-fusion-id="${candidate.id}">
          </label>
        `;
      }).join('');

      fusionPanel.innerHTML = `
        <div class="fusion-title">Fusion ${escapeHtml(targetChar.name)} Lv.${Number(targetChar.level) || 1} -> Lv.${requirement.nextLevel}</div>
        <div class="fusion-help">Need ${requirement.extraNeeded} extra copy/copies of the same character. Available: ${candidates.length}.</div>
        ${getFusionPreviewMarkup(targetChar)}
        <div class="fusion-list">
          ${candidateRows || '<div class="fusion-empty">No matching copy available.</div>'}
        </div>
        <button class="fusion-confirm" id="fusionConfirmBtn" type="button" disabled>Confirm fusion</button>
      `;

      fusionPanel.classList.add('visible');

      const checkboxes = Array.from(fusionPanel.querySelectorAll('.fusion-candidate-checkbox'));
      const confirmBtn = document.getElementById('fusionConfirmBtn');

      const refreshSelectionState = () => {
        const selected = checkboxes.filter((checkbox) => checkbox.checked);
        const reachedLimit = selected.length >= requirement.extraNeeded;
        checkboxes.forEach((checkbox) => {
          checkbox.disabled = reachedLimit && !checkbox.checked;
        });
        confirmBtn.disabled = selected.length !== requirement.extraNeeded;
      };

      checkboxes.forEach((checkbox) => {
        checkbox.addEventListener('change', refreshSelectionState);
      });

      confirmBtn.addEventListener('click', () => {
        const selectedIds = checkboxes
          .filter((checkbox) => checkbox.checked)
          .map((checkbox) => Number(checkbox.dataset.fusionId))
          .filter((id) => Number.isInteger(id));

        if (selectedIds.length !== requirement.extraNeeded) {
          return;
        }

        executeFusion(targetChar.id, selectedIds);
      });

      refreshSelectionState();
    }

    function executeFusion(targetCharId, consumedIds) {
      const target = allCharacters.find((char) => Number(char.id) === Number(targetCharId));
      if (!target) {
        return;
      }

      const requirement = getFusionRequirement(target.level);
      if (!requirement || consumedIds.length !== requirement.extraNeeded) {
        return;
      }

      const consumedSet = new Set(consumedIds.map((id) => Number(id)));
      const validConsumed = allCharacters.filter((char) => consumedSet.has(Number(char.id)));

      if (validConsumed.length !== requirement.extraNeeded) {
        return;
      }

      const sameTemplate = validConsumed.every((char) => Number(char.templateId || char.id) === Number(target.templateId || target.id));
      if (!sameTemplate) {
        return;
      }

      applyFusionBoost(target);

      const removalIndexes = allCharacters
        .map((char, index) => ({ id: Number(char.id), index }))
        .filter((entry) => consumedSet.has(entry.id))
        .map((entry) => entry.index)
        .sort((left, right) => right - left);

      removalIndexes.forEach((index) => {
        allCharacters.splice(index, 1);
      });

      persistOwnedCharactersToReserveStorage();
      renderCharacters();
      openStatsModal(target.id);
    }

    function createCharacterCard(char, isReserve = false, stackMeta = null, cardOptions = {}) {
      const card = document.createElement('div');
      card.className = isReserve ? 'reserve-character-card' : 'character-card';
      card.classList.add(`stars-${char.stars}`);
      card.draggable = true;
      card.dataset.charId = char.id;
      let pointerDown = false;
      let pointerMoved = false;
      let startX = 0;
      let startY = 0;

      const stackCount = Number(char.stackCount) || 1;
      const stackLabel = isReserve && stackCount > 1
        ? `<span class="stack-count">x${stackCount}</span>`
        : '';
      const talentLabel = char.talentName || 'No Talent';
      const hasTalent = !!char.talentId;
      const talentIsActive = hasTalent && !isReserve && !!cardOptions.talentActive;
      const talentStateClass = !hasTalent ? 'none' : (talentIsActive ? 'active' : 'inactive');
      const talentStateText = !hasTalent ? 'No Talent' : (talentIsActive ? 'Active' : 'Inactive');
      const canSell = canSellCharacter(char);
      const sellValue = getCharacterSellValue(char);
      const stackNavigation = isReserve && stackMeta && stackMeta.stackCount > 1
        ? `
          <div class="stack-nav">
            <button class="stack-nav-btn" data-stack-action="prev" type="button">&#9664;</button>
            <span class="stack-nav-index">${stackMeta.stackIndex + 1}/${stackMeta.stackCount}</span>
            <button class="stack-nav-btn" data-stack-action="next" type="button">&#9654;</button>
          </div>
        `
        : '';
      
      card.innerHTML = `
        <div class="character-header">
          <div class="character-name">${char.name} ${stackLabel}</div>
          <div class="character-stars">${getStarString(char.stars)}</div>
          <div class="character-level">Level ${char.level}</div>
          <div class="talent-badge">${renderTalentWithHelp(talentLabel, char.talentId)}</div>
          <div class="talent-state ${talentStateClass}">${talentStateText}</div>
          ${stackNavigation}
          ${canSell ? `<button class="sell-btn" data-sell-id="${char.id}" type="button">Sell ${sellValue}</button>` : ''}
        </div>
      `;

      const sellButton = card.querySelector('.sell-btn');
      if (sellButton) {
        sellButton.addEventListener('pointerdown', (event) => {
          event.preventDefault();
          event.stopPropagation();
        });

        sellButton.addEventListener('click', (event) => {
          event.preventDefault();
          event.stopPropagation();
          sellCharacter(char.id);
        });
      }

      if (isReserve && stackMeta && stackMeta.stackCount > 1) {
        const buttons = card.querySelectorAll('.stack-nav-btn');
        buttons.forEach((button) => {
          button.addEventListener('pointerdown', (event) => {
            event.preventDefault();
            event.stopPropagation();
          });

          button.addEventListener('click', (event) => {
            event.preventDefault();
            event.stopPropagation();
            const direction = button.dataset.stackAction === 'prev' ? -1 : 1;
            const templateId = Number(char.templateId || char.id);
            const current = Number(reserveStackCursorByTemplate[templateId]) || 0;
            const next = (current + direction + stackMeta.stackCount) % stackMeta.stackCount;
            reserveStackCursorByTemplate[templateId] = next;
            renderCharacters();
          });
        });
      }

      // Drag events
      card.addEventListener('dragstart', (e) => {
        draggedChar = char;
        dragSource = isReserve ? 'reserve' : 'team';
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });

      card.addEventListener('dragend', (e) => {
        card.classList.remove('dragging');
        draggedChar = null;
        dragSource = null;
      });

      card.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        card.classList.add('drag-over');
      });

      card.addEventListener('dragleave', (e) => {
        card.classList.remove('drag-over');
      });

      // Reliable tap/click detection on draggable cards
      card.addEventListener('pointerdown', (e) => {
        pointerDown = true;
        pointerMoved = false;
        startX = e.clientX;
        startY = e.clientY;
      });

      card.addEventListener('pointermove', (e) => {
        if (!pointerDown) {
          return;
        }
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        if ((dx * dx + dy * dy) > 36) {
          pointerMoved = true;
        }
      });

      card.addEventListener('pointerup', (e) => {
        if (!pointerDown) {
          return;
        }
        pointerDown = false;
      });

      card.addEventListener('click', (e) => {
        if (pointerMoved || card.classList.contains('dragging')) {
          return;
        }
        e.preventDefault();
        e.stopPropagation();
        openStatsModal(char.id);
      });

      card.addEventListener('pointercancel', () => {
        pointerDown = false;
      });

      return card;
    }

    function renderCharacters() {
      const teamContainer = document.getElementById('charactersContainer');
      const reserveContainer = document.getElementById('reserveContainer');
      
      teamContainer.innerHTML = '';
      reserveContainer.innerHTML = '';

      const orderedTeam = [0, 1, 2]
        .map(slot => allCharacters.find(c => c.teamSlot === slot))
        .filter(Boolean);
      const effectiveTeam = applyTalentEffects(orderedTeam);
      const talentActivityByKey = Object.fromEntries(
        effectiveTeam.map((char) => [getCharacterKey(char), !!char.talentActive])
      );

      let totalPower = 0;
      let totalIncomeBonus = 1;
      let totalClickBonus = 1;
      let totalSizeBonus = 0;
      let totalWeightBonus = 0;
      let totalChanceBonus = 0;
      let totalResaleBonus = 0;
      let totalFishingSpeed = 1;

      const teamCharacters = allCharacters.filter(c => c.teamSlot !== null);
      const filterFn = window._reserveFilterFn || (() => true);
      const reserveCharacters = allCharacters.filter(c => c.unlocked && c.teamSlot === null && filterFn(c));
      const reserveGroups = new Map();

      reserveCharacters.forEach((char) => {
        const key = Number(char.templateId || char.id);
        if (!reserveGroups.has(key)) {
          reserveGroups.set(key, []);
        }
        reserveGroups.get(key).push(char);
      });

      const stackedReserveCharacters = Array.from(reserveGroups.entries()).map(([templateId, group]) => {
        const stackCount = group.length;
        const savedCursor = Number(reserveStackCursorByTemplate[templateId]) || 0;
        const stackIndex = ((savedCursor % stackCount) + stackCount) % stackCount;
        reserveStackCursorByTemplate[templateId] = stackIndex;
        const selected = group[stackIndex];
        selected.stackCount = stackCount;

        return {
          char: selected,
          templateId,
          stackCount,
          stackIndex
        };
      }).sort((left, right) => {
        if (left.char.stars !== right.char.stars) {
          return reserveSortDirection === 'desc'
            ? right.char.stars - left.char.stars
            : left.char.stars - right.char.stars;
        }
        return left.char.name.localeCompare(right.char.name);
      });

      // Render team with fixed 3 slots
      for (let i = 0; i < 3; i++) {
        const char = allCharacters.find(c => c.teamSlot === i);
        
        if (char) {
          totalPower += 1;
          const card = createCharacterCard(char, false, null, {
            talentActive: !!talentActivityByKey[getCharacterKey(char)]
          });
          card.dataset.slotIndex = i;
          teamContainer.appendChild(card);
        } else {
          // Create empty slot
          const emptySlot = document.createElement('div');
          emptySlot.className = 'character-card slot-empty';
          emptySlot.dataset.slotIndex = i;
          emptySlot.innerHTML = '<div class="slot-empty-text">Empty slot</div>';
          
          // Drag over effects for empty slot
          emptySlot.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            emptySlot.classList.add('drag-over');
          });

          emptySlot.addEventListener('dragleave', (e) => {
            emptySlot.classList.remove('drag-over');
          });

          emptySlot.addEventListener('drop', (e) => {
            e.preventDefault();
            emptySlot.classList.remove('drag-over');
            if (draggedChar) {
              if (dragSource === 'reserve') {
                // From reserve to empty team slot
                draggedChar.teamSlot = i;
                renderCharacters();
              } else if (dragSource === 'team') {
                // Move team member to empty slot (swap)
                draggedChar.teamSlot = i;
                renderCharacters();
              }
            }
          });

          teamContainer.appendChild(emptySlot);
        }
      }

      // Setup drop zone for team cards (to remove from team or swap)
      const teamCards = teamContainer.querySelectorAll('.character-card:not(.slot-empty)');
      teamCards.forEach(card => {
        const slotIndex = parseInt(card.dataset.slotIndex);
        
        card.addEventListener('dragstart', (e) => {
          draggedChar = allCharacters.find(c => c.id == card.dataset.charId);
          dragSource = 'team';
          card.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });

        card.addEventListener('dragend', (e) => {
          card.classList.remove('dragging');
        });

        card.addEventListener('dragover', (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          card.classList.add('drag-over');
        });

        card.addEventListener('dragleave', (e) => {
          card.classList.remove('drag-over');
        });

        card.addEventListener('drop', (e) => {
          e.preventDefault();
          card.classList.remove('drag-over');
          if (draggedChar) {
            if (dragSource === 'reserve') {
              // From reserve to team slot - swap with occupant
              const targetChar = allCharacters.find(c => c.teamSlot === slotIndex);
              if (targetChar) {
                // Swap: reserve char goes to slot, team char goes to reserve
                draggedChar.teamSlot = slotIndex;
                targetChar.teamSlot = null;
              } else {
                // Slot is empty, just put the reserve char there
                draggedChar.teamSlot = slotIndex;
              }
              renderCharacters();
            } else if (dragSource === 'team') {
              // Swap between team slots
              const targetChar = allCharacters.find(c => c.teamSlot === slotIndex);
              if (targetChar) {
                // Swap their team slots
                const tempSlot = draggedChar.teamSlot;
                draggedChar.teamSlot = targetChar.teamSlot;
                targetChar.teamSlot = tempSlot;
                renderCharacters();
              }
            }
          }
        });
      });

      // Render reserve
      if (stackedReserveCharacters.length === 0) {
        const emptyMsg = document.createElement('div');
        emptyMsg.className = 'reserve-empty';
        emptyMsg.textContent = 'No characters in reserve';
        reserveContainer.appendChild(emptyMsg);
      } else {
        stackedReserveCharacters.forEach((stackEntry) => {
          const card = createCharacterCard(stackEntry.char, true, {
            stackCount: stackEntry.stackCount,
            stackIndex: stackEntry.stackIndex
          });
          reserveContainer.appendChild(card);
        });
      }

      // Setup drop zone for reserve
      reserveContainer.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
      });

      reserveContainer.addEventListener('drop', (e) => {
        e.preventDefault();
        if (draggedChar && dragSource === 'team') {
          draggedChar.teamSlot = null;
          renderCharacters();
        }
      });

      effectiveTeam.forEach(char => {
        totalIncomeBonus *= char.incomeMultiplier;
        totalClickBonus *= char.clickMultiplier;
        totalSizeBonus = applyOrderedBonus(totalSizeBonus, char.sizeAdd, char.sizeMult);
        totalWeightBonus = applyOrderedBonus(totalWeightBonus, char.weightAdd, char.weightMult);
        totalChanceBonus = applyOrderedBonus(totalChanceBonus, char.chanceAdd, char.chanceMult);
        totalResaleBonus = applyOrderedBonus(totalResaleBonus, char.resaleAdd, char.resaleMult);
        totalFishingSpeed *= char.fishingSpeed;
      });

      // Update stats
      document.getElementById('totalIncomeBonus').textContent = totalIncomeBonus.toFixed(1) + 'x';
      document.getElementById('totalClickBonus').textContent = totalClickBonus.toFixed(1) + 'x';
      document.getElementById('totalSizeBonus').textContent = totalSizeBonus.toFixed(1) + '%';
      document.getElementById('totalWeightBonus').textContent = totalWeightBonus.toFixed(1) + '%';
      document.getElementById('totalChanceBonus').textContent = totalChanceBonus.toFixed(1) + '%';
      document.getElementById('totalResaleBonus').textContent = totalResaleBonus.toFixed(1) + '%';
      document.getElementById('totalFishingSpeed').textContent = totalFishingSpeed.toFixed(1) + 'x';

      updateContributionDetails(effectiveTeam);
      saveTeamState(orderedTeam, {
        incomeMultiplier: totalIncomeBonus,
        clickMultiplier: totalClickBonus,
        sizeBonus: totalSizeBonus,
        weightBonus: totalWeightBonus,
        chanceBonus: totalChanceBonus,
        resaleBonus: totalResaleBonus,
        fishingSpeed: totalFishingSpeed
      });

      // Update stat progressions (left to right accumulation)
      updateStatProgression();
    }

    function updateStatProgression() {
      const orderedTeam = [0, 1, 2]
        .map(slot => allCharacters.find(c => c.teamSlot === slot))
        .filter(Boolean);
      const effectiveTeam = applyTalentEffects(orderedTeam);

      // Calculate cumulative stats from left to right (slot 0, 0+1, 0+1+2)
      const progressions = {
        income: [],
        click: [],
        size: [],
        weight: [],
        chance: [],
        resale: [],
        fishing: []
      };

      // Accumulate from left to right
      let cumIncome = 1;
      let cumClick = 1;
      let cumSize = 0;
      let cumWeight = 0;
      let cumChance = 0;
      let cumResale = 0;
      let cumFishing = 1;

      for (let i = 0; i < 3; i++) {
        const char = effectiveTeam.find(c => c.teamSlot === i);
        if (char) {
          cumIncome *= char.incomeMultiplier;
          cumClick *= char.clickMultiplier;
          cumSize = applyOrderedBonus(cumSize, char.sizeAdd, char.sizeMult);
          cumWeight = applyOrderedBonus(cumWeight, char.weightAdd, char.weightMult);
          cumChance = applyOrderedBonus(cumChance, char.chanceAdd, char.chanceMult);
          cumResale = applyOrderedBonus(cumResale, char.resaleAdd, char.resaleMult);
          cumFishing *= char.fishingSpeed;
        }
        
        progressions.income.push(cumIncome.toFixed(1) + 'x');
        progressions.click.push(cumClick.toFixed(1) + 'x');
        progressions.size.push(cumSize.toFixed(1) + '%');
        progressions.weight.push(cumWeight.toFixed(1) + '%');
        progressions.chance.push(cumChance.toFixed(1) + '%');
        progressions.resale.push(cumResale.toFixed(1) + '%');
        progressions.fishing.push(cumFishing.toFixed(1) + 'x');
      }

      // Display progressions
      displayProgression('incomeProgression', progressions.income);
      displayProgression('clickProgression', progressions.click);
      displayProgression('sizeProgression', progressions.size);
      displayProgression('weightProgression', progressions.weight);
      displayProgression('chanceProgression', progressions.chance);
      displayProgression('resaleProgression', progressions.resale);
      displayProgression('fishingProgression', progressions.fishing);
    }

    function formatBonusValue(add, mult) {
      // Format additive and multiplicative values, including penalties.
      let result = '';
      if (add !== 0) {
        const addPrefix = add > 0 ? '+' : '';
        result += addPrefix + add.toFixed(1) + '%';
      }
      if (mult !== 1) {
        if (result) result += ' ';
        result += '×' + mult.toFixed(2);
      }
      return result || '0%';
    }

    function applyOrderedBonus(currentValue, addValue, multValue) {
      return (currentValue + addValue) * multValue;
    }

    function updateContributionDetails(teamChars) {
      const noMembers = teamChars.length === 0;
      const setDetail = (id, text) => {
        const el = document.getElementById(id);
        if (el) el.textContent = text;
      };

      if (noMembers) {
        setDetail('incomeOrigins', 'No active bonus');
        setDetail('clickOrigins', 'No active bonus');
        setDetail('sizeOrigins', 'No active bonus');
        setDetail('weightOrigins', 'No active bonus');
        setDetail('chanceOrigins', 'No active bonus');
        setDetail('resaleOrigins', 'No active bonus');
        setDetail('fishingOrigins', 'No active bonus');
        return;
      }

      setDetail('incomeOrigins', teamChars.map(c => `${c.name}: ${c.incomeMultiplier.toFixed(1)}x`).join(' | '));
      setDetail('clickOrigins', teamChars.map(c => `${c.name}: ${c.clickMultiplier.toFixed(1)}x`).join(' | '));
      setDetail('sizeOrigins', teamChars.map(c => `${c.name}: ${formatBonusValue(c.sizeAdd, c.sizeMult)}`).join(' | '));
      setDetail('weightOrigins', teamChars.map(c => `${c.name}: ${formatBonusValue(c.weightAdd, c.weightMult)}`).join(' | '));
      setDetail('chanceOrigins', teamChars.map(c => `${c.name}: ${formatBonusValue(c.chanceAdd, c.chanceMult)}`).join(' | '));
      setDetail('resaleOrigins', teamChars.map(c => `${c.name}: ${formatBonusValue(c.resaleAdd, c.resaleMult)}`).join(' | '));
      setDetail('fishingOrigins', teamChars.map(c => `${c.name}: ${c.fishingSpeed.toFixed(1)}x`).join(' | '));
    }

    function saveTeamState(teamChars, totals) {
      const persistedChars = teamChars.map((char) => ({
        id: char.templateId || char.id,
        templateId: char.templateId || char.id,
        instanceId: char.instanceId || null,
        name: char.name,
        stars: char.stars,
        level: char.level,
        talentId: char.talentId || null,
        talentName: char.talentName || 'No Talent',
        incomeMultiplier: char.incomeMultiplier,
        clickMultiplier: char.clickMultiplier,
        sizeAdd: char.sizeAdd,
        sizeMult: char.sizeMult,
        weightAdd: char.weightAdd,
        weightMult: char.weightMult,
        chanceAdd: char.chanceAdd,
        chanceMult: char.chanceMult,
        resaleAdd: char.resaleAdd,
        resaleMult: char.resaleMult,
        fishingSpeed: char.fishingSpeed,
        teamSlot: char.teamSlot
      }));

      localStorage.setItem('clicker_teamState', JSON.stringify({
        updatedAt: Date.now(),
        teamChars: persistedChars,
        totals
      }));

      localStorage.setItem('clicker_teamRoster', JSON.stringify({
        updatedAt: Date.now(),
        slots: teamChars.map((char) => ({
          templateId: char.templateId || char.id,
          instanceId: char.instanceId || null,
          slot: char.teamSlot,
          id: char.templateId || char.id,
          name: char.name,
          stars: char.stars
        })),
        totals
      }));

      lastSavedSlotByInstanceId = Object.fromEntries(
        teamChars
          .filter((char) => typeof char.instanceId === 'string' && char.instanceId)
          .map((char) => [char.instanceId, char.teamSlot])
      );
    }

    function displayProgression(elementId, values) {
      const container = document.getElementById(elementId);
      container.innerHTML = '';
      values.forEach((value, index) => {
        const slot = document.createElement('div');
        slot.className = 'stat-slot';
        slot.textContent = `Slot ${index + 1}: ${value}`;
        
        // Check if slot has a character
        const hasChar = allCharacters.find(c => c.teamSlot === index) !== undefined;
        if (hasChar) {
          slot.classList.add('active');
        }
        
        container.appendChild(slot);
      });
    }

    // Initial render
    const reserveSortSelect = document.getElementById('reserveSortSelect');
    reserveSortSelect.addEventListener('change', () => {
      reserveSortDirection = reserveSortSelect.value === 'asc' ? 'asc' : 'desc';
      renderCharacters();
    });

    applyReserveCharactersFromSave();
    applyTeamStateFromSave();
    renderCharacters();

    // Apply limited navigation mode if upgrades not unlocked
    const upgradesUnlocked = localStorage.getItem("clicker_upgradesUnlocked") === "true";
    if (!upgradesUnlocked) {
      document.body.classList.add("limited-nav-mode");
    }
  </script>

</body>
</html>
