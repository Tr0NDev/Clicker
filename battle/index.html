<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Battle - Clicker</title>
	<script defer src="../guild-badge.js"></script>
	<style>
		:root {
			--line: #2f4d5c;
			--text: #eef5f9;
			--muted: #cde0eb;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: Arial, sans-serif;
			color: #fff;
			background: #111;
			display: grid;
			grid-template-rows: auto 1fr;
			padding: 24px 16px 36px;
			overflow-x: hidden;
		}

		.top-bar {
			position: sticky;
			top: 0;
			z-index: 20;
			background: #0c1217;
			border-bottom: 1px solid #22313b;
			box-shadow: 0 10px 20px rgba(0, 0, 0, 0.35);
			margin: -24px -16px 18px;
			padding: 10px 0;
		}

		.top-nav {
			display: flex;
			justify-content: flex-start;
			gap: 8px;
			flex-wrap: wrap;
			width: 100%;
			max-width: none;
			margin: 0;
			padding: 0 0 0 16px;
		}

		.nav-button {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			text-decoration: none;
			border: 1px solid #667a86;
			background: #31414d;
			color: #eef5f9;
			border-radius: 10px;
			padding: 12px 16px;
			cursor: pointer;
			font-size: 14px;
			margin-right: 8px;
			transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
		}

		.nav-button:hover {
			background: #3a4c59;
			border-color: #7f95a3;
		}

		.nav-button.active-nav-button {
			background: #dbe3e8;
			color: #1a2433;
			border-color: #dbe3e8;
			font-weight: 700;
		}

		.settings-nav-button {
			margin-left: auto;
		}

		main {
			width: min(1000px, calc(100% - 32px));
			margin: 0 auto;
		}

		.hero {
			border: 1px solid var(--line);
			background: linear-gradient(180deg, #18222a 0%, #12191f 100%);
			border-radius: 16px;
			padding: 20px;
			margin-bottom: 16px;
			box-shadow: 0 18px 42px rgba(0, 0, 0, 0.35);
		}

		.hero h1 {
			margin: 0 0 8px;
			font-size: clamp(24px, 4vw, 34px);
		}

		.hero p {
			margin: 0;
			color: #bed1dd;
			line-height: 1.5;
		}

		.mode-grid {
			display: grid;
			grid-template-columns: repeat(2, minmax(0, 1fr));
			gap: 14px;
		}

		.mode-card {
			border: 1px solid var(--line);
			border-radius: 14px;
			padding: 18px;
			background: #142028;
			display: grid;
			gap: 10px;
		}

		.mode-card h2 {
			margin: 0;
			font-size: 20px;
		}

		.mode-card p {
			margin: 0;
			color: #bed1dd;
			line-height: 1.45;
			min-height: 44px;
		}

		.mode-btn {
			border: 1px solid #8ea3b1;
			background: #263541;
			color: #fff;
			border-radius: 10px;
			padding: 11px 14px;
			font-size: 15px;
			cursor: pointer;
			width: 100%;
			font-weight: 700;
		}

		.mode-btn:hover {
			background: #324555;
		}

		.mode-btn.raid {
			border-color: #49687b;
			background: #1d2a33;
		}

		.mode-btn.raid:hover {
			background: #243541;
		}

		.connected {
			font-size: 13px;
			color: #7ee787;
			font-weight: 700;
		}

		.disconnected {
			font-size: 13px;
			color: #ffa657;
			font-weight: 700;
		}

		@media (max-width: 760px) {
			.mode-grid {
				grid-template-columns: 1fr;
			}

			.settings-nav-button {
				margin-left: 0;
			}
		}
	</style>
</head>
<body>
	<div class="top-bar">
		<div class="top-nav">
			<button class="nav-button" onclick="window.location.href='../'">Game</button>
			<button class="nav-button" onclick="window.location.href='../inventory/'">Inventory</button>
			<button class="nav-button locked-nav-button" onclick="window.location.href='../team/'">Team</button>
			<button class="nav-button locked-nav-button" onclick="window.location.href='../shop/'">Shop</button>
			<button class="nav-button locked-nav-button" onclick="window.location.href='../bestiary/'">Bestiary</button>
			<button class="nav-button active-nav-button" onclick="window.location.href='./'">Battle</button>
			<button class="nav-button locked-nav-button" onclick="window.location.href='../reproduction/'">Reproduction</button>
			<button class="nav-button locked-nav-button" onclick="window.location.href='../missions/'">Missions</button>
			<button class="nav-button locked-nav-button" onclick="window.location.href='../guild/'">Guild</button>
			<button class="nav-button settings-nav-button" onclick="window.location.href='../settings/'">Settings</button>
		</div>
	</div>

	<main>
		<section class="hero">
			<h1>Battle Modes</h1>
			<p>Choose your battle mode. Guild Raid requires a player login to enter.</p>
		</section>

		<section class="mode-grid">
			<article class="mode-card">
				<h2>PVP</h2>
				<p>Face off against other players with your team.</p>
				<button class="mode-btn" id="pvpButton">Enter PVP</button>
			</article>

			<article class="mode-card">
				<h2>Guild Raid</h2>
				<p>Cooperative guild mode. You must be logged in before entering.</p>
				<div id="loginState" class="disconnected">Not logged in</div>
				<button class="mode-btn raid" id="raidButton">Enter Guild Raid</button>
			</article>
		</section>
	</main>

	<script>
		const userId = localStorage.getItem("clicker_userId") || "";
		const username = localStorage.getItem("clicker_username") || "";

		const loginStateEl = document.getElementById("loginState");
		const isConnected = !!(userId && username);

		if (isConnected) {
			loginStateEl.textContent = "Connected as " + username;
			loginStateEl.className = "connected";
		} else {
			loginStateEl.textContent = "Not connected";
			loginStateEl.className = "disconnected";
		}

		document.getElementById("pvpButton").addEventListener("click", () => {
			window.location.href = "./pvp/";
		});

		document.getElementById("raidButton").addEventListener("click", () => {
			if (!isConnected) {
				alert("You must be logged in to enter Guild Raid.");
				window.location.href = "../settings/";
				return;
			}
			window.location.href = "./raid/";
		});
	</script>
</body>
</html>
