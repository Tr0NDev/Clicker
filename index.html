<html>
<head>

  })(window,document,'script','dataLayer','GTM-WRX7NXVH');</script>

  <style>
    :root {
      --sidebar-width: 420px;
    }

    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
      margin: 0;
      padding: 24px calc(var(--sidebar-width) + 20px) 36px 16px;
      min-height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
    }

    button {
      padding: 15px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .upgrade {
      width: 100%;
      background: #24343f;
      color: white;
      border: 1px solid #6b8796;
      margin: 0;
      padding: 16px 20px;
      text-align: left;
      box-sizing: border-box;
      border-radius: 14px;
    }

    .upgrade:disabled {
      background: #3a3a3a;
      border-color: #5a5a5a;
      color: #a8a8a8;
      cursor: not-allowed;
    }

    .upgrade:disabled .upgrade-desc,
    .upgrade:disabled .upgrade-meta,
    .upgrade:disabled .upgrade-right {
      color: #9a9a9a;
    }

    .shell {
      max-width: 1080px;
      margin: 0 auto;
      min-height: calc(100vh - 24px - 36px);
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 60;
      background: #0c1217;
      border-bottom: 1px solid #22313b;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.35);
      margin: -24px calc(-1 * (var(--sidebar-width) + 20px)) 18px -24px;
      padding: 10px 0;
    }

    .top-nav {
      display: flex;
      justify-content: flex-start;
      gap: 10px;
      flex-wrap: wrap;
      position: relative;
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 0 0 0 16px;
    }

    .fish-panel {
      max-width: 100%;
      margin: 0;
      padding: 18px;
      border: 1px solid #2f4d5c;
      border-radius: 16px;
      background: linear-gradient(180deg, #18222a 0%, #12191f 100%);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.35);
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 20px;
      align-items: start;
      max-width: 1080px;
      margin: 18px auto 0;
      min-height: 0;
    }

    .main-column {
      display: grid;
      gap: 16px;
      min-height: 0;
      overflow: hidden;
    }

    .upgrades {
      width: var(--sidebar-width);
      max-width: var(--sidebar-width);
      margin: 0;
      display: grid;
      gap: 12px;
      position: fixed;
      top: 72px;
      right: 0;
      bottom: 8px;
      z-index: 30;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
      -webkit-overflow-scrolling: touch;
      box-sizing: border-box;
      padding: 10px 10px 10px 14px;
      background: #111;
      border-left: 1px solid #2a3f4d;
    }

    .upgrades-resizer {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 10px;
      cursor: col-resize;
      touch-action: none;
      z-index: 40;
      background: transparent;
    }

    .upgrades-resizer:hover {
      background: rgba(141, 196, 224, 0.12);
    }

    .upgrade-name {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .upgrade-desc {
      color: #ccc;
      font-size: 14px;
      min-height: 38px;
      margin-bottom: 8px;
    }

    .upgrade-count {
      color: #9ad;
      font-size: 14px;
      margin-top: 6px;
    }

    .upgrade-meta {
      color: #fff;
      font-size: 14px;
      margin-top: 4px;
    }

    .upgrade-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
    }

    .upgrade-left {
      flex: 1;
      min-width: 0;
    }

    .upgrade-right {
      font-size: 26px;
      font-weight: bold;
      color: #f7f0c4;
      min-width: 76px;
      text-align: right;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      width: 100%;
      max-width: 720px;
      margin: 16px auto 0;
      text-align: left;
    }

    .stat-box {
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 12px 14px;
      min-height: 82px;
      min-width: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .stat-label {
      color: #a6c3d5;
      font-size: 13px;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .stat-value {
      display: block;
      font-size: 18px;
      font-weight: bold;
      line-height: 1.2;
      width: 100%;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stat-subvalue {
      margin-top: 4px;
      font-size: 14px;
      color: #b8c8d4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .money-rate {
      margin: 6px 0 0;
      text-align: center;
      color: #c9d8e4;
      font-size: 22px;
      font-weight: bold;
    }

    .hooks-display {
      margin: 4px 0 0;
      text-align: center;
      color: #f7d87a;
      font-size: 16px;
      font-weight: bold;
    }

    .money-header {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .team-reminder {
      width: 100%;
      max-width: 720px;
      margin: 12px auto 0;
      padding: 10px 14px;
      border: 1px solid #2f4d5c;
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(24, 34, 42, 0.95) 0%, rgba(18, 25, 31, 0.95) 100%);
      text-align: left;
      box-sizing: border-box;
    }

    .team-reminder-slots {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
    }

    .team-reminder-slot {
      border: 1px solid #35505f;
      border-radius: 10px;
      padding: 8px 10px;
      background: rgba(15, 21, 25, 0.75);
      min-width: 0;
    }

    .team-reminder-slot.active { border-color: #8dc4e0; background: rgba(141, 196, 224, 0.12); }
    .team-reminder-slot.active.rarity-common { border-color: #d9d9d9; background: rgba(217, 217, 217, 0.12); }
    .team-reminder-slot.active.rarity-uncommon { border-color: #7ee787; background: rgba(126, 231, 135, 0.12); }
    .team-reminder-slot.active.rarity-rare { border-color: #58a6ff; background: rgba(88, 166, 255, 0.14); }
    .team-reminder-slot.active.rarity-epic { border-color: #d2a8ff; background: rgba(210, 168, 255, 0.14); }
    .team-reminder-slot.active.rarity-legendary { border-color: #ffa657; background: rgba(255, 166, 87, 0.16); }
    .team-reminder-slot.active.rarity-mythic { border-color: #ff5e5e; background: rgba(255, 94, 94, 0.16); }

    .team-reminder-slot-title { font-size: 11px; color: #8dc4e0; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; font-weight: bold; }
    .team-reminder-slot-name { font-size: 13px; color: #f7f0c4; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .team-reminder-slot-stats { font-size: 11px; color: #9fb3c1; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .team-reminder-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: #8dc4e0; margin-bottom: 6px; font-weight: bold; }
    .team-reminder-body { font-size: 13px; color: #d9ecf8; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .team-reminder-sub { margin-top: 4px; font-size: 12px; color: #9fb3c1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .center-drag-block {
      width: min(760px, calc(100vw - var(--sidebar-width) - 44px));
      position: fixed;
      left: 16px;
      top: 150px;
      z-index: 24;
      border: 1px solid #2f4d5c;
      border-radius: 16px;
      background: linear-gradient(180deg, #141c22 0%, #10161b 100%);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.34);
      box-sizing: border-box;
      padding: 12px;
      text-align: left;
    }

    .center-drag-grip {
      height: 16px;
      width: 28px;
      border-radius: 6px;
      margin: 0 auto 8px;
      cursor: move;
      background-image: radial-gradient(circle, #8fb1c3 1.2px, transparent 1.2px);
      background-size: 6px 6px;
      opacity: 0.45;
    }


    .center-drag-block:hover .center-drag-grip { opacity: 0.72; }
    .center-drag-block .team-reminder, .center-drag-block .stats, .center-drag-block .fish-panel { max-width: none; margin: 0 0 12px; }
    .center-drag-block .fish-panel { margin-bottom: 0; }

    #money { font-size: 44px; margin: 0; text-align: center; }

    .fish-button {
      width: 100%;
      border: 2px solid #8dc4e0;
      background: linear-gradient(180deg, #3e7390 0%, #294f63 100%);
      color: white;
      padding: 18px 20px;
      margin: 0;
      height: 138px;
      border-radius: 14px;
      cursor: pointer;
      box-sizing: border-box;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      box-shadow: 0 0 0 2px rgba(141, 196, 224, 0.15);
      transition: transform 0.08s ease, filter 0.14s ease;
    }
    .fish-button:hover { filter: brightness(1.08); }
    .fish-button:active { transform: translateY(1px) scale(0.995); }

    .fish-info { flex: 1; min-width: 0; }
    .fish-title { font-size: 24px; font-weight: bold; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fish-subtitle { font-size: 14px; color: #d7e8f2; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fish-price { min-width: 96px; text-align: right; font-size: 28px; font-weight: bold; color: #f7f0c4; }

    .legend { max-width: 720px; margin: 14px auto 0; color: #aab8c0; font-size: 14px; }

    .auto-sell-panel {
      width: min(460px, calc(100vw - var(--sidebar-width) - 40px));
      max-width: 520px;
      margin: 0;
      position: fixed;
      right: calc(var(--sidebar-width) + 16px);
      top: 84px;
      z-index: 25;
      padding: 18px;
      border: 1px solid #354854;
      border-radius: 12px;
      background: #171f25;
      text-align: left;
      box-sizing: border-box;
      overflow: hidden;
    }
    .auto-sell-panel.is-collapsed { width: 240px; max-width: 240px; padding-bottom: 12px; }
    .auto-sell-panel-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
    .auto-sell-title { display: flex; align-items: center; gap: 8px; font-size: 17px; color: #e6f4ff; margin-bottom: 0; font-weight: bold; cursor: move; user-select: none; min-width: 0; }
    .auto-sell-title::before { content: ""; width: 12px; height: 16px; border-radius: 4px; background-image: radial-gradient(circle, #8fb1c3 1.2px, transparent 1.2px); background-size: 4px 4px; opacity: 0.45; flex: 0 0 auto; }
    .auto-sell-panel:hover .auto-sell-title::before { opacity: 0.72; }
    .auto-sell-collapse-btn { flex: 0 0 auto; display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; padding: 0; font-size: 16px; line-height: 1; border-radius: 999px; background: #1b2a33; border-color: #355063; color: #cfe0ea; box-shadow: none; letter-spacing: 0; white-space: nowrap; font-family: inherit; font-weight: bold; }
    .auto-sell-collapse-btn:hover { background: #243541; border-color: #4f7185; color: #ffffff; }
    .auto-sell-collapse-btn:active { transform: translateY(1px); }
    .auto-sell-body { display: grid; gap: 8px; }
    .auto-sell-panel.is-collapsed .auto-sell-body { display: none; }
    .auto-sell-help { font-size: 13px; color: #a9c2d3; margin-bottom: 10px; line-height: 1.4; }
    .auto-sell-label { display: block; font-size: 12px; color: #bdd5e4; margin-bottom: 4px; font-weight: bold; }
    .auto-sell-toggle { display: flex; align-items: center; gap: 8px; color: #d9ecf8; font-size: 14px; padding-top: 2px; }
    .auto-sell-row { display: grid; grid-template-columns: 1fr; gap: 8px; align-items: start; }
    .auto-sell-dynamic { grid-column: auto; }
    .auto-sell-row > label { min-width: 0; }
    .auto-sell-hidden { display: none; }
    .auto-sell-row input, .auto-sell-row select { width: 100%; box-sizing: border-box; padding: 8px; border-radius: 8px; border: 1px solid #4f6978; background: #0f1519; color: #fff; }
    .auto-sell-row input:disabled, .auto-sell-row select:disabled { opacity: 0.55; cursor: not-allowed; }
    .auto-sell-toggle input[type="checkbox"] { appearance: none; width: 46px; height: 24px; margin: 0; border-radius: 999px; border: 1px solid #5f7f91; background: #24343f; cursor: pointer; position: relative; transition: background 0.18s ease, border-color 0.18s ease; }
    .auto-sell-toggle input[type="checkbox"]::before { content: ""; width: 18px; height: 18px; border-radius: 50%; background: #d9eaf5; position: absolute; top: 2px; left: 2px; transition: transform 0.18s ease, background 0.18s ease; }
    .auto-sell-toggle input[type="checkbox"]:checked { background: #2f9f6a; border-color: #52c58d; }
    .auto-sell-toggle input[type="checkbox"]:checked::before { transform: translateX(22px); background: #ffffff; }

    .rarity-common { color: #d9d9d9; }
    .rarity-uncommon { color: #7ee787; }
    .rarity-rare { color: #58a6ff; }
    .rarity-epic { color: #d2a8ff; }
    .rarity-legendary { color: #ffa657; }
    .rarity-mythic { color: #ff5e5e; }

    @media (max-width: 980px) {
      body { overflow: hidden; padding: 24px 16px 36px; }
      .shell { min-height: auto; }
      .content-grid { grid-template-columns: 1fr; }
      .fish-panel, .auto-sell-panel { margin: 0 auto; }
      .auto-sell-panel { position: static; left: auto; right: auto; top: auto; z-index: auto; width: 100%; max-width: none; }
      .upgrades { width: 100%; max-width: 720px; margin: 0 auto; position: static; height: auto; max-height: none; overflow-y: auto; padding: 0; background: transparent; border-left: 0; }
      .upgrades-resizer { display: none; }
      .center-drag-block { position: static; left: auto; top: auto; z-index: auto; width: 100%; max-width: 720px; margin: 12px auto 0; }
      .center-drag-grip { display: none; }
    }

    .nav-button { position: relative; z-index: 1; display: inline-flex; align-items: center; justify-content: center; text-decoration: none; background: #31414d; color: #eef5f9; border: 1px solid #667a86; padding: 12px 16px; margin: 0; margin-right: 8px; font-size: 15px; border-radius: 12px; cursor: pointer; transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease; }
    .nav-button:hover { background: #3a4c59; border-color: #7f95a3; }
    .nav-button.active-nav-button { background: #dbe3e8; color: #1d2a33; border-color: #dbe3e8; font-weight: bold; z-index: 3; }
    .settings-nav-button { margin-left: auto; margin-right: 16px; }

    .hook-notification-layer { position: fixed; right: 14px; top: 90px; z-index: 260; display: grid; gap: 8px; pointer-events: none; max-width: min(92vw, 420px); }
    .hook-notification { border: 1px solid #4f89a8; border-radius: 10px; background: linear-gradient(135deg, #123244 0%, #0d2431 100%); color: #dcf3ff; font-size: 13px; line-height: 1.4; padding: 10px 12px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4); opacity: 0; transform: translateX(12px); animation: hookToastIn 0.18s ease forwards; }
    .hook-notification.fade-out { animation: hookToastOut 0.25s ease forwards; }
    .hook-notification-title { font-weight: bold; color: #9ad9ff; margin-bottom: 4px; }
    @keyframes hookToastIn { from { opacity: 0; transform: translateX(12px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes hookToastOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(18px); } }
  </style>
</head>

<body>
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WRX7NXVH" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <div class="top-bar">
    <div class="top-nav">
      <button class="nav-button active-nav-button" onclick="window.location.href='./'">Game</button>
      <button class="nav-button" onclick="window.location.href='inventory/'">Inventory</button>
      <button class="nav-button locked-nav-button" onclick="window.location.href='team/'">Team</button>
      <button class="nav-button locked-nav-button" onclick="window.location.href='shop/'">Shop</button>
      <button class="nav-button locked-nav-button" onclick="window.location.href='battle/'">Battle</button>
      <button class="nav-button locked-nav-button" onclick="window.location.href='reproduction/'">Reproduction</button>
      <button class="nav-button locked-nav-button" onclick="window.location.href='missions/'">Missions</button>
      <button class="nav-button locked-nav-button" onclick="window.location.href='guild/'">Guild</button>
      <button class="nav-button settings-nav-button" onclick="window.location.href='settings/'">Settings</button>
    </div>
  </div>
  <div class="hook-notification-layer" id="hookNotificationLayer"></div>

  <div class="shell">
    <div class="money-header">
      <h2 id="money">Money: 0</h2>
      <div class="hooks-display" id="hooksDisplay">🪝 Hooks: 0</div>
      <div class="money-rate" id="catchPerSecond">Catches per second: 0</div>
    </div>

    <div class="center-drag-block" id="centerDragBlock">
      <div class="center-drag-grip" id="centerDragGrip" aria-hidden="true"></div>
      <div class="team-reminder" id="teamReminder">
        <div class="team-reminder-title">Active Team</div>
        <div class="team-reminder-body" id="teamReminderBody">No team selected.</div>
        <div class="team-reminder-sub" id="teamReminderSub">Open the Team menu to change your lineup.</div>
        <div class="team-reminder-slots" id="teamReminderSlots"></div>
      </div>

      <div class="stats">
        <div class="stat-box">
          <div class="stat-label">Fish caught</div>
          <div class="stat-value" id="caughtCount">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Fish in inventory</div>
          <div class="stat-value" id="inventoryCount">0</div>
          <div class="stat-subvalue">Total value: <span id="inventoryTotalValue">0</span></div>
        </div>
      </div>

      <div class="fish-panel">
        <button id="clicker" class="fish-button">
          <div class="fish-info">
            <div class="fish-title" id="fishButtonLabel">Fish</div>
            <div class="fish-subtitle" id="fishDescription">Click to fish a random catch.</div>
          </div>
          <div class="fish-price" id="fishPrice">0</div>
        </button>
      </div>
    </div>

    <div class="content-grid">
      <div class="main-column">
        <div class="auto-sell-panel">
          <div class="auto-sell-panel-header">
            <div class="auto-sell-title">Smart auto-sell</div>
            <button id="autoSellTogglePanelBtn" class="btn auto-sell-collapse-btn" type="button" aria-label="Hide auto-sell panel">-</button>
          </div>
          <div class="auto-sell-body">
          <div class="auto-sell-row">
            <label>
              <span class="auto-sell-label">Status</span>
              <span class="auto-sell-toggle">
                <input type="checkbox" id="autoSellEnabled">
                Enabled
              </span>
            </label>
            <label>
              <span class="auto-sell-label">Mode</span>
              <select id="autoSellMode">
                <option value="price">Sell by price</option>
                <option value="rarity">Sell by rarity</option>
                <option value="all">Sell all</option>
              </select>
            </label>
            <label id="autoSellPriceGroup" class="auto-sell-dynamic">
              <span class="auto-sell-label">Price limit (sell if &lt;=)</span>
              <input type="number" min="0" step="1" id="autoSellMaxPrice" value="25">
            </label>
            <label id="autoSellRarityGroup" class="auto-sell-dynamic">
              <span class="auto-sell-label">Max rarity sold</span>
              <select id="autoSellMaxRarity">
                <option value="common">Common</option>
                <option value="uncommon">Uncommon</option>
                <option value="rare">Rare</option>
                <option value="epic">Epic</option>
                <option value="legendary">Legendary</option>
              </select>
            </label>
          </div>
          </div>
        </div>
      </div>

      <div class="upgrades">
        <div class="upgrades-resizer" aria-hidden="true"></div>
        <button id="tripleHookUpgrade" class="upgrade">
          <div class="upgrade-content">
            <div class="upgrade-left">
              <div class="upgrade-name">Triple hook</div>
              <div class="upgrade-desc">Each level adds +1 fish caught per click.</div>
              <div class="upgrade-meta">Cost: <span id="tripleHookUpgradeCost">0</span> | Per click: <span id="fishPerClickLabel">1</span></div>
            </div>
            <div class="upgrade-right">x<span id="tripleHookUpgradeCount">0</span></div>
          </div>
        </button>

        <button id="rodUpgrade" class="upgrade">
          <div class="upgrade-content">
            <div class="upgrade-left">

      let lastManualCatchMs   = 0;

      const CENTER_BLOCK_POS_VERSION_KEY  = "clicker_centerBlockPosVersion";
      const FLOATING_LAYER_MIN = 24;
      const FLOATING_LAYER_MAX = 55;
      const floatingPanels = [centerDragBlock, autoSellPanel, upgradesPanel].filter(Boolean);
      let nextFloatingLayer = 31;

      const defaultTeamBonuses = { incomeMultiplier: 1, clickMultiplier: 1, sizeBonus: 0, weightBonus: 0, chanceBonus: 0, resaleBonus: 0, fishingSpeed: 1 };
      let teamBonuses = loadTeamBonuses();

      if (Number.isNaN(autoSellMaxPrice)) autoSellMaxPrice = 25;
      if (autoSellMode !== "price" && autoSellMode !== "rarity" && autoSellMode !== "all") autoSellMode = "price";

      function clampUpgradesWidth(value) {
        const maxWidth = Math.max(320, Math.floor(window.innerWidth * 0.58));
        return Math.min(maxWidth, Math.max(320, Math.floor(value)));
      }

      function isCompactLayout() { return window.matchMedia("(max-width: 980px)").matches; }

      function clampAutoSellPosition(left, top) {
        if (!autoSellPanel) return { left: 12, top: 84 };
        const panelWidth = autoSellPanel.offsetWidth || 460;
        const panelHeight = autoSellPanel.offsetHeight || 220;
        const minLeft = 8, minTop = 56;
        const maxLeft = Math.max(minLeft, window.innerWidth - panelWidth - 8);
        const maxTop  = Math.max(minTop,  window.innerHeight - panelHeight - 8);
        return { left: Math.min(maxLeft, Math.max(minLeft, Math.floor(left))), top: Math.min(maxTop, Math.max(minTop, Math.floor(top))) };
      }

      function setAutoSellPosition(left, top, persist) {
        if (!autoSellPanel) return;
        if (isCompactLayout()) { autoSellPanel.style.left = ""; autoSellPanel.style.right = ""; autoSellPanel.style.top = ""; return; }
        const next = clampAutoSellPosition(left, top);
        autoSellPanel.style.right = "auto";
        autoSellPanel.style.left = `${next.left}px`;
        autoSellPanel.style.top  = `${next.top}px`;
        if (persist) { localStorage.setItem("clicker_autoSellPanelLeft", String(next.left)); localStorage.setItem("clicker_autoSellPanelTop", String(next.top)); }
      }

      function setAutoSellPanelCollapsed(collapsed, persist) {
        if (!autoSellPanel) return;
        autoSellPanelCollapsed = !!collapsed;
        autoSellPanel.classList.toggle("is-collapsed", autoSellPanelCollapsed);
        if (autoSellTogglePanelBtn) {
          autoSellTogglePanelBtn.textContent = autoSellPanelCollapsed ? "+" : "-";
          autoSellTogglePanelBtn.setAttribute("aria-label", autoSellPanelCollapsed ? "Show auto-sell panel" : "Hide auto-sell panel");
          autoSellTogglePanelBtn.setAttribute("aria-expanded", String(!autoSellPanelCollapsed));
        }
        if (persist) localStorage.setItem("clicker_autoSellPanelCollapsed", String(autoSellPanelCollapsed));
      }

      function clampCenterBlockPosition(left, top) {
        if (!centerDragBlock) return { left: 16, top: 150 };
        const blockWidth = centerDragBlock.offsetWidth || 760;
        const blockHeight = centerDragBlock.offsetHeight || 360;
        const minLeft = 8, minTop = 56;
        const maxLeft = Math.max(minLeft, window.innerWidth - blockWidth - 8);
        const maxTop  = Math.max(minTop,  window.innerHeight - blockHeight - 8);
        return { left: Math.min(maxLeft, Math.max(minLeft, Math.floor(left))), top: Math.min(maxTop, Math.max(minTop, Math.floor(top))) };
      }

      function setCenterBlockPosition(left, top, persist) {
        if (!centerDragBlock) return;
        if (isCompactLayout()) { centerDragBlock.style.left = ""; centerDragBlock.style.top = ""; return; }
        const next = clampCenterBlockPosition(left, top);
        centerDragBlock.style.left = `${next.left}px`;
        centerDragBlock.style.top  = `${next.top}px`;
        if (persist) { localStorage.setItem("clicker_centerBlockLeft", String(next.left)); localStorage.setItem("clicker_centerBlockTop", String(next.top)); }
      }

      function setUpgradesWidth(value, persist) {
        upgradesWidth = clampUpgradesWidth(value);
        document.documentElement.style.setProperty("--sidebar-width", upgradesWidth + "px");
        if (persist) localStorage.setItem("clicker_upgradesWidth", String(upgradesWidth));
      }

      function bringFloatingPanelToFront(panel) {
        if (!panel || isCompactLayout()) return;
        nextFloatingLayer += 1;
        if (nextFloatingLayer > FLOATING_LAYER_MAX) {
          floatingPanels.slice().sort((a, b) => (Number(a.style.zIndex) || FLOATING_LAYER_MIN) - (Number(b.style.zIndex) || FLOATING_LAYER_MIN))
            .forEach((entry, index) => { entry.style.zIndex = String(FLOATING_LAYER_MIN + index); });
          nextFloatingLayer = FLOATING_LAYER_MIN + floatingPanels.length;
        }
        panel.style.zIndex = String(nextFloatingLayer);
      }

      setUpgradesWidth(upgradesWidth, false);

      function getDefaultAutoSellPosition() {
        if (!autoSellPanel) return { left: 12, top: 84 };
        const panelWidth = autoSellPanel.offsetWidth || 460;
        const left = Math.max(8, Math.floor(window.innerWidth - (upgradesWidth + 20) - panelWidth - 12));
        return { left, top: 84 };
      }

      function getDefaultCenterBlockPosition() {
        if (!centerDragBlock) return { left: 16, top: 150 };
        const blockWidth = centerDragBlock.offsetWidth || 760;
        const left = Math.max(8, Math.floor((window.innerWidth - upgradesWidth - blockWidth) / 2));
        return { left, top: 150 };
      }

      const storedAutoSellLeft = Number(localStorage.getItem("clicker_autoSellPanelLeft"));
      const storedAutoSellTop  = Number(localStorage.getItem("clicker_autoSellPanelTop"));
      const panelPosVersion    = Number(localStorage.getItem(AUTO_SELL_PANEL_POS_VERSION_KEY)) || 0;
      let initialAutoSellPosition = {
        left: Number.isFinite(storedAutoSellLeft) ? storedAutoSellLeft : getDefaultAutoSellPosition().left,
        top:  Number.isFinite(storedAutoSellTop)  ? storedAutoSellTop  : 84
      };
      if (panelPosVersion < 2) {
        initialAutoSellPosition = getDefaultAutoSellPosition();
        localStorage.setItem(AUTO_SELL_PANEL_POS_VERSION_KEY, "2");
        localStorage.setItem("clicker_autoSellPanelLeft", String(initialAutoSellPosition.left));
        localStorage.setItem("clicker_autoSellPanelTop",  String(initialAutoSellPosition.top));

      setAutoSellPanelCollapsed(autoSellPanelCollapsed, false);

      const storedCenterBlockTop  = Number(localStorage.getItem("clicker_centerBlockTop"));

        left: Number.isFinite(storedCenterBlockLeft) ? storedCenterBlockLeft : getDefaultCenterBlockPosition().left,

        initialCenterBlockPosition = getDefaultCenterBlockPosition();

        let isDraggingAutoSell = false, dragOffsetX = 0, dragOffsetY = 0;

          autoSellTogglePanelBtn.addEventListener("click", (e) => { e.preventDefault(); e.stopPropagation(); setAutoSellPanelCollapsed(!autoSellPanelCollapsed, true); });

          if (isCompactLayout()) return;
          bringFloatingPanelToFront(autoSellPanel);
          if (e.target.closest("input, select, option, button, a, label")) return;
          e.preventDefault();
          const rect = autoSellPanel.getBoundingClientRect();
          dragOffsetX = e.clientX - rect.left; dragOffsetY = e.clientY - rect.top;
          isDraggingAutoSell = true; document.body.style.userSelect = "none"; document.body.style.cursor = "move";

        window.addEventListener("mousemove", (e) => { if (!isDraggingAutoSell) return; setAutoSellPosition(e.clientX - dragOffsetX, e.clientY - dragOffsetY, false); });

          if (!isDraggingAutoSell) return;

        setAutoSellPosition(Number.parseInt((autoSellPanel && autoSellPanel.style.left) || "8", 10), Number.parseInt((autoSellPanel && autoSellPanel.style.top) || "84", 10), false);

      if (upgradesResizer && upgradesPanel) {
        let isResizing = false;
        upgradesPanel.addEventListener("mousedown", () => { bringFloatingPanelToFront(upgradesPanel); });

        window.addEventListener("mousemove", (e) => { if (!isResizing) return; setUpgradesWidth(window.innerWidth - e.clientX, false); });
        window.addEventListener("mouseup", () => { if (!isResizing) return; isResizing = false; document.body.style.cursor = ""; document.body.style.userSelect = ""; setUpgradesWidth(upgradesWidth, true); });
        window.addEventListener("resize", () => { setUpgradesWidth(upgradesWidth, false); });

      try {
        const storedInventory = localStorage.getItem("clicker_inventory");
        inventory = storedInventory ? JSON.parse(storedInventory) : [];
        if (!Array.isArray(inventory)) inventory = [];
      } catch (e) { inventory = []; }

      window.addEventListener("storage", (e) => {
        if (e.key === "clicker_inventory") {
          try { inventory = e.newValue ? JSON.parse(e.newValue) : []; if (!Array.isArray(inventory)) inventory = []; } catch { inventory = []; }
        }
        if (e.key === TEAM_STATE_STORAGE_KEY || e.key === TEAM_ROSTER_STORAGE_KEY) refreshTeamBonuses();
      });

      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
          try {
            const storedInventory = localStorage.getItem("clicker_inventory");
            inventory = storedInventory ? JSON.parse(storedInventory) : [];
            if (!Array.isArray(inventory)) inventory = [];
            money = Number(localStorage.getItem("clicker_money")) || 0;
            hooks = Number(localStorage.getItem("clicker_hooks")) || 0;
            const storedLastAuto = Number(localStorage.getItem("clicker_lastAutoCatchMs"));
            if (storedLastAuto && Number.isFinite(storedLastAuto)) lastAutoCatchMs = storedLastAuto;
            refreshTeamBonuses();
            processAutoFisher();
          } catch { inventory = []; }

          localStorage.setItem("clicker_lastAutoCatchMs", String(lastAutoCatchMs));
          saveGameState();
        }
      });

      function getSizeUpgradeCost(level)   { return Math.floor(700  * Math.pow(2.05, level)); }
      function getTripleHookCost(level)    { return Math.floor(7800 * Math.pow(2.3,  level)); }
      function getRodUpgradeCost(level)    { return Math.floor(5200 * Math.pow(2.28, level)); }
      function getAutoUpgradeCost(level)   { return Math.floor(1300 * Math.pow(2.15, level)); }
      function getWeightUpgradeCost(level) { return Math.floor(900  * Math.pow(1.98, level)); }
      function getWaitUpgradeCost(level)   { return Math.floor(1700 * Math.pow(2.2,  level)); }

      function getRodTierInfo(level) {
        const baseTierIndex = Math.min(level, ROD_TIERS.length - 1);
        const baseTier = ROD_TIERS[baseTierIndex];
        const extraLevels = Math.max(0, level - (ROD_TIERS.length - 1));
        if (extraLevels <= 0) return baseTier;
        const masteryBoost = 1 + (extraLevels * 0.08);
        return {
          name: `Ultimate+${extraLevels}`,
          desc: `Ultimate mastery improves rare catches (+${Math.round(extraLevels * 8)}%).`,
          multipliers: {
            common:    Math.max(0.2, baseTier.multipliers.common * (1 - extraLevels * 0.02)),
            uncommon:  baseTier.multipliers.uncommon * (1 + extraLevels * 0.03),
            rare:      baseTier.multipliers.rare      * masteryBoost,
            epic:      baseTier.multipliers.epic      * masteryBoost,
            legendary: baseTier.multipliers.legendary * masteryBoost
          }
        };
      }

      function getAutoIntervalMs() {
        const baseInterval = Math.max(2000, 10000 - autoWaitReductionLevel * 500);
        return Math.max(400, Math.floor(baseInterval / Math.max(1, teamBonuses.fishingSpeed)));
      }

      function randomBetween(min, max, decimals) { return Number((min + Math.random() * (max - min)).toFixed(decimals)); }

      function applyFishPriceReduction(fish) {
        if (!fish || typeof fish !== "object") return fish;
        if ((Number(fish.priceReductionVersion) || 0) >= 1) return fish;
        const scale = v => { const n = Number(v); return Number.isFinite(n) ? Math.max(1, Math.round(n * 2 / 3)) : v; };
        if (Number.isFinite(Number(fish.price)))         fish.price         = scale(fish.price);
        if (Number.isFinite(Number(fish.basePrice)))     fish.basePrice     = scale(fish.basePrice);
        if (Number.isFinite(Number(fish.currentValue)))  fish.currentValue  = scale(fish.currentValue);
        if (Number.isFinite(Number(fish.spoiledValue)))  fish.spoiledValue  = scale(fish.spoiledValue);
        if (Number.isFinite(Number(fish.outStartValue))) fish.outStartValue = scale(fish.outStartValue);
        if (Number.isFinite(Number(fish.outTargetValue)))fish.outTargetValue= scale(fish.outTargetValue);
        fish.priceReductionVersion = 1;
        return fish;
      }

      function pickWeighted(items) {
        const total = items.reduce((s, i) => s + i.weight, 0);
        let roll = Math.random() * total;
        for (const item of items) { roll -= item.weight; if (roll <= 0) return item.rarity; }
        return items[0].rarity;
      }

      function pickRandom(list) { return list[Math.floor(Math.random() * list.length)]; }

      function pickTernaryProfile() { const r = Math.random(); return r < 1/3 ? "low" : r < 2/3 ? "mid" : "high"; }

      function pickSegmentValue(min, max, decimals, profile) {
        const span = max - min;
        if (span <= 0) return Number(min.toFixed(decimals));
        const third = span / 3;
        const rangeMin = profile === "low" ? min : profile === "mid" ? min + third : min + 2 * third;
        const rangeMax = profile === "low" ? min + third : profile === "mid" ? min + 2 * third : max;
        return randomBetween(rangeMin, rangeMax, decimals);
      }

      function deriveProfileFromValue(value, min, max) {
        const span = max - min;
        if (span <= 0) return "mid";
        const third = span / 3;
        if (value <= min + third) return "low";
        if (value <= min + 2 * third) return "mid";
        return "high";
      }

      function getSpeciesByType(type) { return FISH_SPECIES.find(f => f.type === type) || null; }

      function normalizeFishProfiles(fish) {
        if (fish.sizeProfile && fish.weightProfile) return fish;
        const species = getSpeciesByType(fish.type);
        if (!species) return { ...fish, sizeProfile: fish.sizeProfile || "mid", weightProfile: fish.weightProfile || "mid" };
        return {
          ...fish,
          sizeProfile:   fish.sizeProfile   || deriveProfileFromValue(fish.size,   species.sizeMin,   species.sizeMax),
          weightProfile: fish.weightProfile || deriveProfileFromValue(fish.weight, species.weightMin, species.weightMax)
        };
      }

      function normalizeTeamBonuses(raw) {
        return {
          incomeMultiplier: Number(raw?.incomeMultiplier) || 1,
          clickMultiplier:  Number(raw?.clickMultiplier)  || 1,
          sizeBonus:        Number(raw?.sizeBonus)        || 0,
          weightBonus:      Number(raw?.weightBonus)      || 0,
          chanceBonus:      Number(raw?.chanceBonus)      || 0,
          resaleBonus:      Number(raw?.resaleBonus)      || 0,
          fishingSpeed:     Number(raw?.fishingSpeed)     || 1
        };
      }

      function computeTeamBonusesFromChars(teamChars) {
        let im=1, cm=1, sb=0, wb=0, cb=0, rb=0, fs=1;
        teamChars.forEach(c => {
          im *= Number(c.incomeMultiplier) || 1;
          cm *= Number(c.clickMultiplier)  || 1;
          sb  = (sb + (Number(c.sizeAdd)   || 0)) * (Number(c.sizeMult)   || 1);
          wb  = (wb + (Number(c.weightAdd) || 0)) * (Number(c.weightMult) || 1);
          cb  = (cb + (Number(c.chanceAdd) || 0)) * (Number(c.chanceMult) || 1);
          rb  = (rb + (Number(c.resaleAdd) || 0)) * (Number(c.resaleMult) || 1);
          fs *= Number(c.fishingSpeed) || 1;
        });
        return normalizeTeamBonuses({ incomeMultiplier:im, clickMultiplier:cm, sizeBonus:sb, weightBonus:wb, chanceBonus:cb, resaleBonus:rb, fishingSpeed:fs });
      }

      function loadTeamBonuses() {
        try {
          const ps = localStorage.getItem(TEAM_STATE_STORAGE_KEY);
          const pr = localStorage.getItem(TEAM_ROSTER_STORAGE_KEY);
          const s  = ps ? JSON.parse(ps) : null;
          const r  = pr ? JSON.parse(pr) : null;
          if (s?.totals) return normalizeTeamBonuses(s.totals);
          if (r?.totals) return normalizeTeamBonuses(r.totals);
          if (Array.isArray(s?.teamChars)) return computeTeamBonusesFromChars(s.teamChars);
        } catch { return { ...defaultTeamBonuses }; }
        return { ...defaultTeamBonuses };
      }

      function loadTeamReminder() {
        try {
          const ps = localStorage.getItem(TEAM_STATE_STORAGE_KEY);
          const pr = localStorage.getItem(TEAM_ROSTER_STORAGE_KEY);
          if (!ps && !pr) return { teamChars: [], totals: { ...defaultTeamBonuses } };
          const s = ps ? JSON.parse(ps) : null;
          const r = pr ? JSON.parse(pr) : null;
          const stateAt  = Number(s?.updatedAt) || 0;
          const rosterAt = Number(r?.updatedAt) || 0;
          const preferredTotals = stateAt >= rosterAt ? s?.totals : r?.totals;
          const teamChars = Array.isArray(s?.teamChars) ? s.teamChars
            : Array.isArray(r?.slots) ? r.slots.slice().sort((a,b) => Number(a.slot)-Number(b.slot)).map(e => ({
                id:e.id, name:e.name, stars:e.stars,
                incomeMultiplier:1, clickMultiplier:1,
                sizeAdd:0, sizeMult:1, weightAdd:0, weightMult:1,
                chanceAdd:0, chanceMult:1, resaleAdd:0, resaleMult:1,
                fishingSpeed:1, teamSlot:Number(e.slot)
              }))
            : [];
          const totals = preferredTotals ? normalizeTeamBonuses(preferredTotals)
            : s?.totals ? normalizeTeamBonuses(s.totals)
            : r?.totals ? normalizeTeamBonuses(r.totals)
            : computeTeamBonusesFromChars(teamChars);
          return { teamChars, totals };
        } catch { return { teamChars: [], totals: { ...defaultTeamBonuses } }; }
      }

      function getCharacterRarityFromStars(stars) {
        const s = Number(stars) || 1;
        if (s >= 5) return "legendary";
        if (s === 4) return "epic";
        if (s === 3) return "rare";
        if (s === 2) return "uncommon";
        return "common";
      }

      function formatTeamReminder(teamChars, totals) {
        if (!teamChars.length) {
          teamReminderBody.textContent = "No team selected.";
          teamReminderSub.textContent  = "Open the Team menu to change your lineup.";
          teamReminderSlots.innerHTML  = "";
          return;
        }
        teamReminderBody.textContent = teamChars.map(c => `${c.name} (${c.stars}★)`).join(" • ");
        teamReminderSub.textContent  = `Income x${totals.incomeMultiplier.toFixed(1)} | Click x${totals.clickMultiplier.toFixed(1)} | Size +${totals.sizeBonus.toFixed(1)}% | Weight +${totals.weightBonus.toFixed(1)}% | Chance +${totals.chanceBonus.toFixed(1)}% | Resale +${totals.resaleBonus.toFixed(1)}% | Speed x${totals.fishingSpeed.toFixed(1)}`;
        teamReminderSlots.innerHTML  = [0, 1, 2].map(slotIndex => {
          const char = teamChars.find(e => Number(e.teamSlot) === slotIndex);
          if (!char) return `<div class="team-reminder-slot"><div class="team-reminder-slot-name">Empty</div><div class="team-reminder-slot-stats">No character</div></div>`;
          return `<div class="team-reminder-slot active rarity-${getCharacterRarityFromStars(char.stars)}"><div class="team-reminder-slot-name">${char.name} ${"★".repeat(char.stars)}</div><div class="team-reminder-slot-stats">${char.incomeMultiplier.toFixed(1)}x income | ${char.fishingSpeed.toFixed(1)}x speed</div></div>`;
        }).join("");
      }

      function refreshTeamBonuses() {
        const state = loadTeamReminder();
        teamBonuses = state.totals;
        formatTeamReminder(state.teamChars, state.totals);
        applyTeamBonusesToCurrentFish();
      }

      function applyTeamBonusesToCurrentFish() {
        if (!currentFish) return;
        const baseSize    = Number(currentFish.baseSize)   || Number(currentFish.size)   || 0;
        const baseWeight  = Number(currentFish.baseWeight) || Number(currentFish.weight) || 0;
        const basePrice   = Number(currentFish.basePrice)  || Number(currentFish.price)  || 0;
        const sizeMult    = (1 + sizeBoostLevel   * 0.01) * (1 + teamBonuses.sizeBonus   * 0.01);
        const weightMult  = (1 + weightBoostLevel * 0.01) * (1 + teamBonuses.weightBonus * 0.01);
        const valueMult   = Math.max(0.1, teamBonuses.incomeMultiplier * (1 + teamBonuses.resaleBonus * 0.01));
        currentFish = {
          ...currentFish, baseSize, baseWeight, basePrice,
          size:         Number((baseSize   * sizeMult).toFixed(1)),
          weight:       Number((baseWeight * weightMult).toFixed(2)),
          price:        Math.max(1, Math.round(basePrice * valueMult)),
          currentValue: Math.max(1, Math.round(basePrice * valueMult))
        };
      }

      function formatRarityLabel(r) { return { common:"Common", uncommon:"Uncommon", rare:"Rare", epic:"Epic", legendary:"Legendary", mythic:"Mythic" }[r] || r; }
      function rarityRank(r) { return { common:1, uncommon:2, rare:3, epic:4, legendary:5, mythic:6 }[r] || 1; }
      function getRarityClass(r) { return { common:"rarity-common", uncommon:"rarity-uncommon", rare:"rarity-rare", epic:"rarity-epic", legendary:"rarity-legendary", mythic:"rarity-mythic" }[r] || "rarity-common"; }

      function getAdjustedRarityWeights() {
        const tier = getRodTierInfo(rodTierLevel);
        return RARITY_WEIGHTS.map(entry => {
          const mult       = tier.multipliers[entry.rarity] || 1;
          const chanceBoost = 1 + (rarityRank(entry.rarity) - 1) * teamBonuses.chanceBonus * 0.0125;
          return { rarity: entry.rarity, weight: entry.weight * mult * chanceBoost };
        });
      }

      function getFishDescriptors(fish) {
        const f = normalizeFishProfiles(fish), tags = [];
        if (f.sizeProfile   === "high") tags.push("big");    else if (f.sizeProfile   === "low") tags.push("small");
        if (f.weightProfile === "high") tags.push("heavy");  else if (f.weightProfile === "low") tags.push("light");
        return tags.length ? `(${tags.join(", ")})` : "(average)";
      }

      function shouldAutoSell(fish) {
        if (!autoSellEnabled) return false;
        if (autoSellMode === "all") return true;
        if (autoSellMode === "rarity") return rarityRank(fish.rarity) <= rarityRank(autoSellMaxRarity);
        return fish.price <= autoSellMaxPrice;
      }

      function createFish() {
        const rarity   = pickWeighted(getAdjustedRarityWeights());
        const species  = pickRandom(FISH_SPECIES.filter(f => f.rarity === rarity));
        const sp       = pickTernaryProfile(), wp = pickTernaryProfile();
        const baseSize   = pickSegmentValue(species.sizeMin,   species.sizeMax,   1, sp);
        const baseWeight = pickSegmentValue(species.weightMin, species.weightMax, 2, wp);
        const sizeMult   = (1 + sizeBoostLevel   * 0.01) * (1 + teamBonuses.sizeBonus   * 0.01);
        const weightMult = (1 + weightBoostLevel * 0.01) * (1 + teamBonuses.weightBonus * 0.01);
        const size   = Number((baseSize   * sizeMult).toFixed(1));
        const weight = Number((baseWeight * weightMult).toFixed(2));
        const basePrice   = Math.max(1, Math.round((size * 0.315 + weight * 9) * RARITY_MULTIPLIERS[rarity]));
        const reducedBase = Math.max(1, Math.round(basePrice * 2 / 3));
        const price       = Math.max(1, Math.round(reducedBase * teamBonuses.incomeMultiplier * (1 + teamBonuses.resaleBonus * 0.01)));
        return { type: species.type, rarity, size, weight, price, baseSize, baseWeight, basePrice: reducedBase, currentValue: price, priceReductionVersion: 1, sizeProfile: sp, weightProfile: wp };
      }

      function loadCurrentFish() {
        const stored = localStorage.getItem("clicker_currentFish");
        if (!stored) return createFish();
        try {
          const parsed = JSON.parse(stored);
          if (!parsed || typeof parsed.type !== "string") return createFish();
          return applyFishPriceReduction(normalizeFishProfiles(parsed));
        } catch { return createFish(); }
      }

      let currentFish = loadCurrentFish();
      let bestCaughtFishDisplay = null;
      let bestCaughtDisplayTimer = null;

      function saveGameState() {
        localStorage.setItem("clicker_money",                 String(money));
        localStorage.setItem("clicker_hooks",                 String(hooks));
        localStorage.setItem("clicker_caughtCount",           String(caughtCount));
        localStorage.setItem("clicker_epicCaught",            String(epicCaughtCount));
        localStorage.setItem("clicker_legendaryCaught",       String(legendaryCaughtCount));
        localStorage.setItem("clicker_currentFish",           JSON.stringify(currentFish));
        localStorage.setItem("clicker_inventory",             JSON.stringify(inventory));
        localStorage.setItem("clicker_inventoryTurn",         String(inventoryTurn));
        localStorage.setItem("clicker_tripleHookLevel",       String(tripleHookLevel));
        localStorage.setItem("clicker_rodTierLevel",          String(rodTierLevel));
        localStorage.setItem("clicker_sizeBoostLevel",        String(sizeBoostLevel));
        localStorage.setItem("clicker_autoFisherLevel",       String(autoFisherLevel));
        localStorage.setItem("clicker_weightBoostLevel",      String(weightBoostLevel));
        localStorage.setItem("clicker_autoWaitReductionLevel",String(autoWaitReductionLevel));
        localStorage.setItem("clicker_autoSellEnabled",       String(autoSellEnabled));
        localStorage.setItem("clicker_autoSellMode",          autoSellMode);
        localStorage.setItem("clicker_autoSellMaxPrice",      String(autoSellMaxPrice));
        localStorage.setItem("clicker_autoSellMaxRarity",     autoSellMaxRarity);
        localStorage.setItem("clicker_tutorialCompleted",     String(tutorialCompleted));
        localStorage.setItem("clicker_lastAutoCatchMs",       String(lastAutoCatchMs));
      }

      function showHookNotification(title, text) {
        if (!hookNotificationLayer) return;
        const toast = document.createElement("div");
        toast.className = "hook-notification";
        toast.innerHTML = `<div class="hook-notification-title">${title}</div><div>${text}</div>`;
        hookNotificationLayer.appendChild(toast);
        setTimeout(() => { toast.classList.add("fade-out"); setTimeout(() => toast.remove(), 260); }, 2300);
      }

      function addHooks(amount, title, text) {
        const n = Math.max(0, Math.floor(Number(amount) || 0));
        if (!n) return;
        hooks += n;
        localStorage.setItem("clicker_hooks", String(hooks));
        showHookNotification(title, `${text} (+${n} Hooks)`);
      }

      function catchCurrentFish(source) {
        const fish = {
          type: currentFish.type, rarity: currentFish.rarity,
          size: currentFish.size, weight: currentFish.weight,
          price:        Math.max(1, Math.round(currentFish.price)),
          basePrice:    Math.max(1, Math.round(currentFish.basePrice    || currentFish.price)),
          currentValue: Math.max(1, Math.round(currentFish.currentValue || currentFish.price)),
          sizeProfile: currentFish.sizeProfile, weightProfile: currentFish.weightProfile,
          priceReductionVersion: 1, caughtAt: new Date().toISOString()
        };
        if (shouldAutoSell(fish)) { money += fish.price; } else { inventory.push(fish); }
        if (fish.rarity === "epic")      epicCaughtCount++;
        else if (fish.rarity === "legendary") legendaryCaughtCount++;
        caughtCount++;
        currentFish = createFish();
        return fish;
      }

      function pickBestFish(list) {
        if (!list || !list.length) return null;
        return list.reduce((best, fish) => {
          const br = rarityRank(best.rarity), fr = rarityRank(fish.rarity);
          if (fr > br) return fish;
          if (fr === br && fish.price > best.price) return fish;
          return best;
        });
      }

      function scheduleDistributedCatches(count, intervalMs) {
        const now = Date.now();
        for (let i = 0; i < count; i++) scheduledCatches.push(now + Math.random() * intervalMs);
        scheduledCatches.sort((a, b) => a - b);
      }

      // ── processAutoFisher ──────────────────────────────────────────────────
      // FIX: offline catch-up now calls catchCurrentFish() for every fish,
      // so shouldAutoSell() is respected for ALL rarities — nothing bypasses it.
      function processAutoFisher() {
        if (autoFisherLevel <= 0) { lastAutoCatchMs = Date.now(); return; }

        const interval = getAutoIntervalMs();
        const now      = Date.now();
        const elapsed  = now - lastAutoCatchMs;

        const OFFLINE_THRESHOLD_MS = 5000;
        if (elapsed > OFFLINE_THRESHOLD_MS) {
          const missedIntervals = Math.floor(elapsed / interval);
          if (missedIntervals > 0) {
            // Cap to avoid freezing the browser on very long absences.
            const MAX_OFFLINE_FISH = 2000;
            const totalMissed = Math.min(missedIntervals * autoFisherLevel, MAX_OFFLINE_FISH);

            const caughtBatch = [];
            for (let i = 0; i < totalMissed; i++) {
              // catchCurrentFish applies shouldAutoSell internally — no bypass.
              caughtBatch.push(catchCurrentFish("auto-offline"));
            }

            lastAutoCatchMs = now;
            scheduledCatches = [];

            const rareCaught = caughtBatch.filter(f => rarityRank(f.rarity) >= 4);
            const best       = pickBestFish(caughtBatch);
            if (best) {
              bestCaughtFishDisplay = best;
              if (bestCaughtDisplayTimer) clearTimeout(bestCaughtDisplayTimer);
              bestCaughtDisplayTimer = setTimeout(() => { bestCaughtFishDisplay = null; renderDisplay(); }, 4000);
            }

            if (rareCaught.length > 0) {
              showHookNotification("Offline catch-up", `${totalMissed} fish caught while away. Found ${rareCaught.length} epic/legendary!`);
            } else {
              showHookNotification("Offline catch-up", `${totalMissed} fish caught while away.`);
            }
          }
          lastAutoCatchMs = now;
          return;
        }

        // Normal real-time mode
        while (now - lastAutoCatchMs >= interval) {
          scheduleDistributedCatches(autoFisherLevel, interval);
          lastAutoCatchMs += interval;
        }

        const caughtBatch = [];
        while (scheduledCatches.length > 0 && scheduledCatches[0] <= now) {
          scheduledCatches.shift();
          caughtBatch.push(catchCurrentFish("auto"));
        }

        if (caughtBatch.length > 0) {
          const best = pickBestFish(caughtBatch);
          if (best) {
            bestCaughtFishDisplay = best;
            if (bestCaughtDisplayTimer) clearTimeout(bestCaughtDisplayTimer);
            bestCaughtDisplayTimer = setTimeout(() => { bestCaughtFishDisplay = null; renderDisplay(); }, 3000);
          }
          render();
        }
      }

      function renderDisplay() {
        const fish = bestCaughtFishDisplay || currentFish;
        fishButtonLabel.textContent = fish.type + " " + getFishDescriptors(fish);
        fishButtonLabel.className   = "fish-title " + getRarityClass(fish.rarity);
        fishDescription.textContent = (!tutorialCompleted && caughtCount < 30) ? ""
          : `Rarity: ${formatRarityLabel(fish.rarity)} | Size: ${fish.size} cm | Weight: ${fish.weight} kg | Price: ${fish.price}`;
        fishPrice.textContent = formatNumber(fish.price);
      }

      function formatNumber(n) {
        const num = Number(n) || 0;
        if (num < 1000) return String(Math.floor(num));
        if (num < 1e6) return (num / 1e3).toFixed(1) + "K";
        if (num < 1e9) return (num / 1e6).toFixed(1) + "M";
        if (num < 1e12) return (num / 1e9).toFixed(1) + "B";
        if (num < 1e15) return (num / 1e12).toFixed(1) + "T";
        return (num / 1e15).toFixed(1) + "Q";
      }

      function render() {
        refreshTeamBonuses();
        const nextTripleHookCost = getTripleHookCost(tripleHookLevel);
        const nextRodUpgradeCost = getRodUpgradeCost(rodTierLevel);
        const nextSizeCost       = getSizeUpgradeCost(sizeBoostLevel);
        const nextAutoCost       = getAutoUpgradeCost(autoFisherLevel);
        const nextWeightCost     = getWeightUpgradeCost(weightBoostLevel);
        const nextWaitCost       = getWaitUpgradeCost(autoWaitReductionLevel);
        const autoDelaySeconds   = (getAutoIntervalMs() / 1000).toFixed(1);
        const fishPerClick       = 1 + tripleHookLevel;
        const rodTier            = getRodTierInfo(rodTierLevel);
        const inventoryTotalValue = inventory.reduce((s, f) => s + (Number(f.currentValue) || Number(f.basePrice) || Number(f.price) || 0), 0);
        const catchesPerSecond   = autoFisherLevel <= 0 ? 0 : Number((autoFisherLevel / (getAutoIntervalMs() / 1000)).toFixed(2));

        moneyDisplay.textContent          = "Money: " + formatNumber(money);
        hooksDisplay.textContent          = "🪝 Hooks: " + formatNumber(hooks);
        catchPerSecondDisplay.textContent = "Catches per second: " + catchesPerSecond;
        caughtCountDisplay.textContent    = formatNumber(caughtCount);
        inventoryCountDisplay.textContent = formatNumber(inventory.length);
        inventoryTotalValueDisplay.textContent = formatNumber(inventoryTotalValue);

        renderDisplay();

        tripleHookUpgradeCount.textContent = formatNumber(tripleHookLevel);
        rodUpgradeCount.textContent        = formatNumber(rodTierLevel);
        fishPerClickLabel.textContent      = formatNumber(fishPerClick);
        rodTierLabel.textContent           = rodTier.name;
        rodUpgradeDesc.textContent         = rodTier.desc;
        tripleHookUpgradeCost.textContent  = formatNumber(nextTripleHookCost);
        rodUpgradeCost.textContent         = formatNumber(nextRodUpgradeCost);
        sizeUpgradeCount.textContent       = formatNumber(sizeBoostLevel);
        autoUpgradeCount.textContent       = formatNumber(autoFisherLevel);
        weightUpgradeCount.textContent     = formatNumber(weightBoostLevel);
        waitUpgradeCount.textContent       = formatNumber(autoWaitReductionLevel);
        sizeUpgradeCost.textContent        = formatNumber(nextSizeCost);
        autoUpgradeCost.textContent        = formatNumber(nextAutoCost);
        weightUpgradeCost.textContent      = formatNumber(nextWeightCost);
        waitUpgradeCost.textContent        = formatNumber(nextWaitCost);
        autoDelayLabel.textContent         = autoDelaySeconds;

        tripleHookUpgrade.disabled = money < nextTripleHookCost;
        rodUpgrade.disabled        = money < nextRodUpgradeCost;
        sizeUpgrade.disabled       = money < nextSizeCost;
        autoUpgrade.disabled       = money < nextAutoCost;
        weightUpgrade.disabled     = money < nextWeightCost;
        waitUpgrade.disabled       = money < nextWaitCost;

        autoSellEnabledInput.checked       = autoSellEnabled;
        autoSellModeSelect.value           = autoSellMode;
        autoSellMaxPriceInput.value        = String(autoSellMaxPrice);
        autoSellMaxRaritySelect.value      = autoSellMaxRarity;
        autoSellModeSelect.disabled        = !autoSellEnabled;
        const isPriceMode  = autoSellMode === "price";
        const isRarityMode = autoSellMode === "rarity";
        autoSellPriceGroup.classList.toggle("auto-sell-hidden", !isPriceMode);
        autoSellRarityGroup.classList.toggle("auto-sell-hidden", !isRarityMode);
        autoSellMaxPriceInput.disabled    = !autoSellEnabled || !isPriceMode;
        autoSellMaxRaritySelect.disabled  = !autoSellEnabled || !isRarityMode;
        saveGameState();
      }

      clicker.addEventListener("click", () => {
        const now = Date.now();
        if (now - lastManualCatchMs < 100) return;
        lastManualCatchMs = now;
        const fishPerClick = Math.max(1, Math.round((1 + tripleHookLevel) * Math.max(1, teamBonuses.clickMultiplier)));
        const batch = [];
        for (let i = 0; i < fishPerClick; i++) batch.push(catchCurrentFish("manual"));
        if (batch.length > 1) {
          const best = pickBestFish(batch);
          if (best) {
            bestCaughtFishDisplay = best;
            if (bestCaughtDisplayTimer) clearTimeout(bestCaughtDisplayTimer);
            bestCaughtDisplayTimer = setTimeout(() => { bestCaughtFishDisplay = null; renderDisplay(); }, 3000);
          }
        }
        render();
        renderDisplay();
      });

      tripleHookUpgrade.addEventListener("click", () => { const c = getTripleHookCost(tripleHookLevel);    if (money >= c) { money -= c; tripleHookLevel++;         render(); } });
      rodUpgrade.addEventListener("click",        () => { const c = getRodUpgradeCost(rodTierLevel);       if (money >= c) { money -= c; rodTierLevel++;             render(); } });
      sizeUpgrade.addEventListener("click",       () => { const c = getSizeUpgradeCost(sizeBoostLevel);    if (money >= c) { money -= c; sizeBoostLevel++;           render(); } });
      autoUpgrade.addEventListener("click",       () => { const c = getAutoUpgradeCost(autoFisherLevel);   if (money >= c) { money -= c; autoFisherLevel++;          render(); } });
      weightUpgrade.addEventListener("click",     () => { const c = getWeightUpgradeCost(weightBoostLevel);if (money >= c) { money -= c; weightBoostLevel++;         render(); } });
      waitUpgrade.addEventListener("click",       () => { const c = getWaitUpgradeCost(autoWaitReductionLevel); if (money >= c) { money -= c; autoWaitReductionLevel++; render(); } });

      autoSellEnabledInput.addEventListener("change",  () => { autoSellEnabled = autoSellEnabledInput.checked; render(); });
      autoSellModeSelect.addEventListener("change",    () => { const v = autoSellModeSelect.value; autoSellMode = (v === "rarity" || v === "all") ? v : "price"; render(); });
      autoSellMaxPriceInput.addEventListener("input",  () => { const v = Number(autoSellMaxPriceInput.value); autoSellMaxPrice = Number.isNaN(v) ? 0 : Math.max(0, Math.floor(v)); render(); });
      autoSellMaxRaritySelect.addEventListener("change", () => { autoSellMaxRarity = autoSellMaxRaritySelect.value; render(); });

      setInterval(() => { processAutoFisher(); render(); }, 250);

      render();


      setInterval(() => {
      }, 500);
    </script>
</body>
</html>
