<!DOCTYPE html>
<html>
<head>
  <title>Clicker</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
      margin: 0;
      padding: 24px 16px 36px;
    }

    button {
      padding: 15px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .upgrade {
      width: 100%;
      background: #24343f;
      color: white;
      border: 1px solid #6b8796;
      margin: 0;
      padding: 16px 18px;
      text-align: left;
      box-sizing: border-box;
      border-radius: 14px;
    }

    .shell {
      max-width: 1080px;
      margin: 0 auto;
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: #0c1217;
      border-bottom: 1px solid #22313b;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.35);
      margin: -24px -16px 18px;
      padding: 10px 16px;
    }

    .top-nav {
      display: flex;
      justify-content: flex-start;
      gap: 10px;
      flex-wrap: wrap;
      max-width: 1080px;
      margin: 0 auto;
    }

    .fish-panel {
      max-width: 720px;
      margin: 0;
      padding: 18px;
      border: 1px solid #2f4d5c;
      border-radius: 16px;
      background: linear-gradient(180deg, #18222a 0%, #12191f 100%);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.35);
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 500px;
      gap: 20px;
      align-items: start;
      max-width: 1080px;
      margin: 18px auto 0;
    }

    .main-column {
      display: grid;
      gap: 16px;
    }

    .upgrades {
      width: 460px;
      max-width: none;
      justify-self: end;
      margin: 0;
      display: grid;
      gap: 12px;
      position: sticky;
      top: 72px;
      max-height: calc(100vh - 88px);
      overflow-y: auto;
      padding-right: 6px;
    }

    .upgrade-name {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .upgrade-desc {
      color: #ccc;
      font-size: 14px;
      min-height: 38px;
      margin-bottom: 8px;
    }

    .upgrade-count {
      color: #9ad;
      font-size: 14px;
      margin-top: 6px;
    }

    .upgrade-meta {
      color: #fff;
      font-size: 14px;
      margin-top: 4px;
    }

    .upgrade-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
    }

    .upgrade-left {
      flex: 1;
      min-width: 0;
    }

    .upgrade-right {
      font-size: 26px;
      font-weight: bold;
      color: #f7f0c4;
      min-width: 76px;
      text-align: right;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      max-width: 720px;
      margin: 16px auto 0;
      text-align: left;
    }

    .stat-box {
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 12px 14px;
    }

    .stat-label {
      color: #a6c3d5;
      font-size: 13px;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .stat-value {
      font-size: 18px;
      font-weight: bold;
    }

    .fish-button {
      width: 100%;
      border: 1px solid #76a6c0;
      background: linear-gradient(180deg, #35617a 0%, #27495b 100%);
      color: white;
      padding: 18px 20px;
      margin: 0;
      border-radius: 14px;
      cursor: pointer;
      box-sizing: border-box;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .fish-info {
      flex: 1;
      min-width: 0;
    }

    .fish-title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .fish-subtitle {
      font-size: 14px;
      color: #d7e8f2;
      line-height: 1.5;
    }

    .fish-price {
      min-width: 96px;
      text-align: right;
      font-size: 28px;
      font-weight: bold;
      color: #f7f0c4;
    }

    .legend {
      max-width: 720px;
      margin: 14px auto 0;
      color: #aab8c0;
      font-size: 14px;
    }

    .auto-sell-panel {
      max-width: 720px;
      margin: 0;
      padding: 14px;
      border: 1px solid #354854;
      border-radius: 12px;
      background: #171f25;
      text-align: left;
    }

    .auto-sell-title {
      font-size: 15px;
      color: #cfe3ef;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .auto-sell-row {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 10px;
      align-items: center;
    }

    .auto-sell-row input,
    .auto-sell-row select {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #4f6978;
      background: #0f1519;
      color: #fff;
    }

    .rarity-common { color: #d9d9d9; }
    .rarity-uncommon { color: #7ee787; }
    .rarity-rare { color: #58a6ff; }
    .rarity-epic { color: #d2a8ff; }
    .rarity-legendary { color: #ffa657; }

    @media (max-width: 980px) {
      .content-grid {
        grid-template-columns: 1fr;
      }

      .fish-panel,
      .auto-sell-panel {
        margin: 0 auto;
      }

      .upgrades {
        max-width: 720px;
        margin: 0 auto;
        position: static;
        max-height: none;
        overflow-y: visible;
        padding-right: 0;
      }
    }

    .nav-button {
      display: inline-block;
      text-decoration: none;
      background: #555;
      color: white;
      border: 1px solid #aaa;
      padding: 15px;
      margin: 0;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <div class="top-bar">
    <div class="top-nav">
      <button class="nav-button" onclick="window.location.href='settings/'">Settings</button>
      <button class="nav-button" onclick="window.location.href='inventaire/'">Inventaire</button>
    </div>
  </div>

  <div class="shell">
    <h1>Clicker</h1>

    <h2 id="money">Money: 0</h2>
    <div class="stats">
      <div class="stat-box">
        <div class="stat-label">Poissons capturés</div>
        <div class="stat-value" id="caughtCount">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Poisson pêché</div>
        <div class="stat-value" id="fishTypeDisplay">-</div>
      </div>
    </div>

    <div class="content-grid">
      <div class="main-column">
        <div class="fish-panel">
          <button id="clicker" class="fish-button">
            <div class="fish-info">
              <div class="fish-title" id="fishButtonLabel">Poisson</div>
              <div class="fish-subtitle" id="fishDescription">Clique pour pêcher un poisson aléatoire.</div>
            </div>
            <div class="fish-price" id="fishPrice">0</div>
          </button>

          <div class="legend" id="fishDetails">
            Rareté, taille et poids apparaîtront ici.
          </div>
        </div>

        <div class="auto-sell-panel">
          <div class="auto-sell-title">Auto-vente (vendre si prix <= seuil et rareté <= seuil)</div>
          <div class="auto-sell-row">
            <label>
              <input type="checkbox" id="autoSellEnabled">
              Activer l'auto-vente
            </label>
            <label>
              Prix max
              <input type="number" min="0" step="1" id="autoSellMaxPrice" value="25">
            </label>
            <label>
              Rareté max
              <select id="autoSellMaxRarity">
                <option value="common">Commune</option>
                <option value="uncommon">Peu commune</option>
                <option value="rare">Rare</option>
                <option value="epic">Épique</option>
                <option value="legendary">Légendaire</option>
              </select>
            </label>
          </div>
        </div>
      </div>

      <div class="upgrades">
        <button id="tripleHookUpgrade" class="upgrade">
          <div class="upgrade-content">
            <div class="upgrade-left">
              <div class="upgrade-name">Hamecon triple</div>
              <div class="upgrade-desc">Chaque niveau ajoute +1 poisson peche par clic.</div>
              <div class="upgrade-meta">Coût: <span id="tripleHookUpgradeCost">0</span> | Par clic: <span id="fishPerClickLabel">1</span></div>
            </div>
            <div class="upgrade-right">x<span id="tripleHookUpgradeCount">0</span></div>
          </div>
        </button>

        <button id="rodUpgrade" class="upgrade">
          <div class="upgrade-content">
            <div class="upgrade-left">
              <div class="upgrade-name">Evolution de canne</div>
              <div class="upgrade-desc" id="rodUpgradeDesc">Canne classique: surtout des poissons communs.</div>
              <div class="upgrade-meta">Niveau: <span id="rodTierLabel">Classique</span> | Coût: <span id="rodUpgradeCost">-</span></div>
            </div>
            <div class="upgrade-right">x<span id="rodUpgradeCount">0</span></div>
          </div>
        </button>

        <button id="sizeUpgrade" class="upgrade">
          <div class="upgrade-content">
            <div class="upgrade-left">
              <div class="upgrade-name">Canne de précision</div>
              <div class="upgrade-desc">Augmente très légèrement la taille des poissons (+1% par niveau).</div>
              <div class="upgrade-meta">Coût: <span id="sizeUpgradeCost">0</span></div>
            </div>
            <div class="upgrade-right">x<span id="sizeUpgradeCount">0</span></div>
          </div>
        </button>

        <button id="autoUpgrade" class="upgrade">
          <div class="upgrade-content">
            <div class="upgrade-left">
              <div class="upgrade-name">Filet automatique</div>
              <div class="upgrade-desc">Pêche automatiquement toutes les 10 secondes (+1 poisson par niveau).</div>
              <div class="upgrade-meta">Coût: <span id="autoUpgradeCost">0</span></div>
            </div>
            <div class="upgrade-right">x<span id="autoUpgradeCount">0</span></div>
          </div>
        </button>

        <button id="weightUpgrade" class="upgrade">
          <div class="upgrade-content">
            <div class="upgrade-left">
              <div class="upgrade-name">Ligne renforcée</div>
              <div class="upgrade-desc">Augmente légèrement le poids des poissons (+1% par niveau).</div>
              <div class="upgrade-meta">Coût: <span id="weightUpgradeCost">0</span></div>
            </div>
            <div class="upgrade-right">x<span id="weightUpgradeCount">0</span></div>
          </div>
        </button>

        <button id="waitUpgrade" class="upgrade">
          <div class="upgrade-content">
            <div class="upgrade-left">
              <div class="upgrade-name">Moteur de chalut</div>
              <div class="upgrade-desc">Réduit le délai de pêche auto de 0.5s par niveau.</div>
              <div class="upgrade-meta">Coût: <span id="waitUpgradeCost">0</span> | Délai actuel: <span id="autoDelayLabel">10.0</span>s</div>
            </div>
            <div class="upgrade-right">x<span id="waitUpgradeCount">0</span></div>
          </div>
        </button>
      </div>
    </div>

    <script>
      const FISH_SPECIES = [
        { type: "Carpe commune", rarity: "common", sizeMin: 25, sizeMax: 55, weightMin: 0.8, weightMax: 2.8 },
        { type: "Gardon rapide", rarity: "common", sizeMin: 15, sizeMax: 28, weightMin: 0.2, weightMax: 0.9 },
        { type: "Perche rayée", rarity: "common", sizeMin: 18, sizeMax: 35, weightMin: 0.3, weightMax: 1.4 },
        { type: "Truite argentée", rarity: "uncommon", sizeMin: 28, sizeMax: 58, weightMin: 0.7, weightMax: 3.5 },
        { type: "Bar de roche", rarity: "uncommon", sizeMin: 22, sizeMax: 44, weightMin: 0.8, weightMax: 2.6 },
        { type: "Saumon noble", rarity: "uncommon", sizeMin: 40, sizeMax: 78, weightMin: 1.8, weightMax: 5.6 },
        { type: "Thon bleu", rarity: "rare", sizeMin: 60, sizeMax: 130, weightMin: 8, weightMax: 35 },
        { type: "Brochet sauvage", rarity: "rare", sizeMin: 45, sizeMax: 110, weightMin: 2.5, weightMax: 15 },
        { type: "Poisson-lune", rarity: "rare", sizeMin: 70, sizeMax: 180, weightMin: 3, weightMax: 45 },
        { type: "Mahi-mahi", rarity: "epic", sizeMin: 70, sizeMax: 160, weightMin: 5, weightMax: 25 },
        { type: "Raie arc-en-ciel", rarity: "epic", sizeMin: 80, sizeMax: 220, weightMin: 10, weightMax: 80 },
        { type: "Mérou géant", rarity: "epic", sizeMin: 90, sizeMax: 200, weightMin: 15, weightMax: 90 },
        { type: "Requin doré", rarity: "legendary", sizeMin: 150, sizeMax: 420, weightMin: 40, weightMax: 220 },
        { type: "Dragon des mers", rarity: "legendary", sizeMin: 120, sizeMax: 300, weightMin: 30, weightMax: 180 }
      ];

      const RARITY_WEIGHTS = [
        { rarity: "common", weight: 88 },
        { rarity: "uncommon", weight: 9 },
        { rarity: "rare", weight: 2.2 },
        { rarity: "epic", weight: 0.7 },
        { rarity: "legendary", weight: 0.1 }
      ];

      const ROD_TIERS = [
        {
          name: "Classique",
          desc: "Canne classique: surtout des poissons communs.",
          multipliers: { common: 1, uncommon: 1, rare: 1, epic: 1, legendary: 1 }
        },
        {
          name: "Amateur",
          desc: "Augmente un peu les rares et baisse les communs.",
          multipliers: { common: 0.78, uncommon: 1.25, rare: 1.8, epic: 2.4, legendary: 3.5 }
        },
        {
          name: "Pro",
          desc: "Ameliore fortement les chances de poissons rares.",
          multipliers: { common: 0.55, uncommon: 1.35, rare: 2.6, epic: 4, legendary: 6.5 }
        },
        {
          name: "Ultime",
          desc: "Canne ultime: bien meilleure qualite de prises.",
          multipliers: { common: 0.35, uncommon: 1.25, rare: 3.5, epic: 6.5, legendary: 10 }
        }
      ];

      const ROD_UPGRADE_COSTS = [8000, 35000, 140000];

      const RARITY_MULTIPLIERS = {
        common: 1,
        uncommon: 1.35,
        rare: 1.9,
        epic: 2.8,
        legendary: 4.2
      };

      const moneyDisplay = document.getElementById("money");
      const caughtCountDisplay = document.getElementById("caughtCount");
      const fishTypeDisplay = document.getElementById("fishTypeDisplay");
      const clicker = document.getElementById("clicker");
      const fishButtonLabel = document.getElementById("fishButtonLabel");
      const fishDescription = document.getElementById("fishDescription");
      const fishDetails = document.getElementById("fishDetails");
      const fishPrice = document.getElementById("fishPrice");
      const autoSellEnabledInput = document.getElementById("autoSellEnabled");
      const autoSellMaxPriceInput = document.getElementById("autoSellMaxPrice");
      const autoSellMaxRaritySelect = document.getElementById("autoSellMaxRarity");
      const tripleHookUpgrade = document.getElementById("tripleHookUpgrade");
      const rodUpgrade = document.getElementById("rodUpgrade");
      const sizeUpgrade = document.getElementById("sizeUpgrade");
      const autoUpgrade = document.getElementById("autoUpgrade");
      const weightUpgrade = document.getElementById("weightUpgrade");
      const waitUpgrade = document.getElementById("waitUpgrade");
      const tripleHookUpgradeCount = document.getElementById("tripleHookUpgradeCount");
      const rodUpgradeCount = document.getElementById("rodUpgradeCount");
      const sizeUpgradeCount = document.getElementById("sizeUpgradeCount");
      const autoUpgradeCount = document.getElementById("autoUpgradeCount");
      const weightUpgradeCount = document.getElementById("weightUpgradeCount");
      const waitUpgradeCount = document.getElementById("waitUpgradeCount");
      const tripleHookUpgradeCost = document.getElementById("tripleHookUpgradeCost");
      const rodUpgradeCost = document.getElementById("rodUpgradeCost");
      const fishPerClickLabel = document.getElementById("fishPerClickLabel");
      const rodTierLabel = document.getElementById("rodTierLabel");
      const rodUpgradeDesc = document.getElementById("rodUpgradeDesc");
      const sizeUpgradeCost = document.getElementById("sizeUpgradeCost");
      const autoUpgradeCost = document.getElementById("autoUpgradeCost");
      const weightUpgradeCost = document.getElementById("weightUpgradeCost");
      const waitUpgradeCost = document.getElementById("waitUpgradeCost");
      const autoDelayLabel = document.getElementById("autoDelayLabel");

      let money = Number(localStorage.getItem("clicker_money")) || 0;
      let caughtCount = Number(localStorage.getItem("clicker_caughtCount")) || 0;
      let sizeBoostLevel = Number(localStorage.getItem("clicker_sizeBoostLevel")) || 0;
      let autoFisherLevel = Number(localStorage.getItem("clicker_autoFisherLevel")) || 0;
      let weightBoostLevel = Number(localStorage.getItem("clicker_weightBoostLevel")) || 0;
      let autoWaitReductionLevel = Number(localStorage.getItem("clicker_autoWaitReductionLevel")) || 0;
      let tripleHookLevel = Number(localStorage.getItem("clicker_tripleHookLevel")) || 0;
      let rodTierLevel = Number(localStorage.getItem("clicker_rodTierLevel")) || 0;
      let inventory = [];
      let autoSellEnabled = localStorage.getItem("clicker_autoSellEnabled") === "true";
      let autoSellMaxPrice = Number(localStorage.getItem("clicker_autoSellMaxPrice"));
      let autoSellMaxRarity = localStorage.getItem("clicker_autoSellMaxRarity") || "common";
      let lastAutoCatchMs = Date.now();

      if (Number.isNaN(autoSellMaxPrice)) {
        autoSellMaxPrice = 25;
      }

      try {
        const storedInventory = localStorage.getItem("clicker_inventory");
        inventory = storedInventory ? JSON.parse(storedInventory) : [];
        if (!Array.isArray(inventory)) {
          inventory = [];
        }
      } catch (error) {
        inventory = [];
      }

      function getSizeUpgradeCost(level) {
        return Math.floor(1500 * Math.pow(2.15, level));
      }

      function getTripleHookCost(level) {
        return Math.floor(2500 * Math.pow(2.2, level));
      }

      function getRodUpgradeCost(level) {
        if (level >= ROD_UPGRADE_COSTS.length) {
          return null;
        }

        return ROD_UPGRADE_COSTS[level];
      }

      function getAutoUpgradeCost(level) {
        return Math.floor(3000 * Math.pow(2.25, level));
      }

      function getWeightUpgradeCost(level) {
        return Math.floor(2000 * Math.pow(2.05, level));
      }

      function getWaitUpgradeCost(level) {
        return Math.floor(4000 * Math.pow(2.3, level));
      }

      function getAutoIntervalMs() {
        return Math.max(2000, 10000 - (autoWaitReductionLevel * 500));
      }

      function randomBetween(min, max, decimals) {
        const value = min + Math.random() * (max - min);
        return Number(value.toFixed(decimals));
      }

      function pickWeighted(items) {
        const totalWeight = items.reduce((sum, item) => sum + item.weight, 0);
        let roll = Math.random() * totalWeight;

        for (const item of items) {
          roll -= item.weight;
          if (roll <= 0) {
            return item.rarity;
          }
        }

        return items[0].rarity;
      }

      function pickRandom(list) {
        return list[Math.floor(Math.random() * list.length)];
      }

      function formatRarityLabel(rarity) {
        const labels = {
          common: "Commune",
          uncommon: "Peu commune",
          rare: "Rare",
          epic: "Épique",
          legendary: "Légendaire"
        };

        return labels[rarity] || rarity;
      }

      function rarityRank(rarity) {
        const ranks = {
          common: 1,
          uncommon: 2,
          rare: 3,
          epic: 4,
          legendary: 5
        };

        return ranks[rarity] || 1;
      }

      function getRarityClass(rarity) {
        const classes = {
          common: "rarity-common",
          uncommon: "rarity-uncommon",
          rare: "rarity-rare",
          epic: "rarity-epic",
          legendary: "rarity-legendary"
        };

        return classes[rarity] || "rarity-common";
      }

      function getAdjustedRarityWeights() {
        const tier = ROD_TIERS[Math.min(rodTierLevel, ROD_TIERS.length - 1)];

        return RARITY_WEIGHTS.map((entry) => {
          const multiplier = tier.multipliers[entry.rarity] || 1;
          return {
            rarity: entry.rarity,
            weight: entry.weight * multiplier
          };
        });
      }

      function getFishDescriptors(fish) {
        const tags = [];

        if (fish.size >= 180) {
          tags.push("immense");
        } else if (fish.size >= 95) {
          tags.push("gros");
        } else if (fish.size <= 28) {
          tags.push("petit");
        }

        if (fish.weight >= 40) {
          tags.push("lourd");
        } else if (fish.weight <= 1.2) {
          tags.push("leger");
        }

        if (tags.length === 0) {
          return "(moyen)";
        }

        return "(" + tags.join(", ") + ")";
      }

      function shouldAutoSell(fish) {
        if (!autoSellEnabled) {
          return false;
        }

        const isUnderPrice = fish.price <= autoSellMaxPrice;
        const isUnderRarity = rarityRank(fish.rarity) <= rarityRank(autoSellMaxRarity);
        return isUnderPrice && isUnderRarity;
      }

      function createFish() {
        const rarity = pickWeighted(getAdjustedRarityWeights());
        const pool = FISH_SPECIES.filter((fish) => fish.rarity === rarity);
        const species = pickRandom(pool);
        const baseSize = randomBetween(species.sizeMin, species.sizeMax, 1);
        const baseWeight = randomBetween(species.weightMin, species.weightMax, 2);
        const sizeMultiplier = 1 + (sizeBoostLevel * 0.01);
        const weightMultiplier = 1 + (weightBoostLevel * 0.01);
        const size = Number((baseSize * sizeMultiplier).toFixed(1));
        const weight = Number((baseWeight * weightMultiplier).toFixed(2));
        const price = Math.max(1, Math.round((size * 0.35 + weight * 10) * RARITY_MULTIPLIERS[rarity]));

        return {
          type: species.type,
          rarity: rarity,
          size: size,
          weight: weight,
          price: price
        };
      }

      function loadCurrentFish() {
        const stored = localStorage.getItem("clicker_currentFish");
        if (!stored) {
          return createFish();
        }

        try {
          const parsed = JSON.parse(stored);
          if (!parsed || typeof parsed.type !== "string") {
            return createFish();
          }

          return parsed;
        } catch (error) {
          return createFish();
        }
      }

      let currentFish = loadCurrentFish();

      function saveGameState() {
        localStorage.setItem("clicker_money", String(money));
        localStorage.setItem("clicker_caughtCount", String(caughtCount));
        localStorage.setItem("clicker_currentFish", JSON.stringify(currentFish));
        localStorage.setItem("clicker_inventory", JSON.stringify(inventory));
        localStorage.setItem("clicker_tripleHookLevel", String(tripleHookLevel));
        localStorage.setItem("clicker_rodTierLevel", String(rodTierLevel));
        localStorage.setItem("clicker_sizeBoostLevel", String(sizeBoostLevel));
        localStorage.setItem("clicker_autoFisherLevel", String(autoFisherLevel));
        localStorage.setItem("clicker_weightBoostLevel", String(weightBoostLevel));
        localStorage.setItem("clicker_autoWaitReductionLevel", String(autoWaitReductionLevel));
        localStorage.setItem("clicker_autoSellEnabled", String(autoSellEnabled));
        localStorage.setItem("clicker_autoSellMaxPrice", String(autoSellMaxPrice));
        localStorage.setItem("clicker_autoSellMaxRarity", autoSellMaxRarity);
      }

      function catchCurrentFish() {
        const fishToStore = {
          type: currentFish.type,
          rarity: currentFish.rarity,
          size: currentFish.size,
          weight: currentFish.weight,
          price: currentFish.price,
          caughtAt: new Date().toISOString()
        };

        money += fishToStore.price;

        if (!shouldAutoSell(fishToStore)) {
          inventory.push(fishToStore);
        }

        caughtCount++;
        currentFish = createFish();
      }

      function render() {
        const nextTripleHookCost = getTripleHookCost(tripleHookLevel);
        const nextRodUpgradeCost = getRodUpgradeCost(rodTierLevel);
        const nextSizeCost = getSizeUpgradeCost(sizeBoostLevel);
        const nextAutoCost = getAutoUpgradeCost(autoFisherLevel);
        const nextWeightCost = getWeightUpgradeCost(weightBoostLevel);
        const nextWaitCost = getWaitUpgradeCost(autoWaitReductionLevel);
        const autoDelaySeconds = (getAutoIntervalMs() / 1000).toFixed(1);
        const rarityClass = getRarityClass(currentFish.rarity);
        const fishDescriptors = getFishDescriptors(currentFish);
        const fishPerClick = 1 + tripleHookLevel;
        const rodTier = ROD_TIERS[Math.min(rodTierLevel, ROD_TIERS.length - 1)];

        moneyDisplay.textContent = "Money: " + money;
        caughtCountDisplay.textContent = String(caughtCount);
        fishTypeDisplay.textContent = currentFish.type + " " + fishDescriptors;
        fishTypeDisplay.className = "stat-value " + rarityClass;
        fishButtonLabel.textContent = currentFish.type + " " + fishDescriptors;
        fishButtonLabel.className = "fish-title " + rarityClass;
        fishDescription.textContent = "Clique pour pêcher ce poisson. Sa valeur dépend de sa taille, de son poids et de sa rareté.";
        fishPrice.textContent = String(currentFish.price);
        fishDetails.innerHTML = "Type: " + currentFish.type + " " + fishDescriptors + " | Rareté: <span class='" + getRarityClass(currentFish.rarity) + "'>" + formatRarityLabel(currentFish.rarity) + "</span> | Taille: " + currentFish.size + " cm | Poids: " + currentFish.weight + " kg | Prix: " + currentFish.price + " | Inventaire: " + inventory.length;
        tripleHookUpgradeCount.textContent = String(tripleHookLevel);
        rodUpgradeCount.textContent = String(rodTierLevel);
        fishPerClickLabel.textContent = String(fishPerClick);
        rodTierLabel.textContent = rodTier.name;
        rodUpgradeDesc.textContent = rodTier.desc;
        tripleHookUpgradeCost.textContent = String(nextTripleHookCost);
        rodUpgradeCost.textContent = nextRodUpgradeCost === null ? "MAX" : String(nextRodUpgradeCost);
        sizeUpgradeCount.textContent = String(sizeBoostLevel);
        autoUpgradeCount.textContent = String(autoFisherLevel);
        weightUpgradeCount.textContent = String(weightBoostLevel);
        waitUpgradeCount.textContent = String(autoWaitReductionLevel);
        sizeUpgradeCost.textContent = String(nextSizeCost);
        autoUpgradeCost.textContent = String(nextAutoCost);
        weightUpgradeCost.textContent = String(nextWeightCost);
        waitUpgradeCost.textContent = String(nextWaitCost);
        autoDelayLabel.textContent = autoDelaySeconds;
        autoSellEnabledInput.checked = autoSellEnabled;
        autoSellMaxPriceInput.value = String(autoSellMaxPrice);
        autoSellMaxRaritySelect.value = autoSellMaxRarity;
        saveGameState();
      }

      clicker.addEventListener("click", () => {
        const fishPerClick = 1 + tripleHookLevel;
        for (let i = 0; i < fishPerClick; i++) {
          catchCurrentFish();
        }
        render();
      });

      tripleHookUpgrade.addEventListener("click", () => {
        const cost = getTripleHookCost(tripleHookLevel);
        if (money >= cost) {
          money -= cost;
          tripleHookLevel++;
          render();
        }
      });

      rodUpgrade.addEventListener("click", () => {
        const cost = getRodUpgradeCost(rodTierLevel);
        if (cost !== null && money >= cost) {
          money -= cost;
          rodTierLevel++;
          render();
        }
      });

      sizeUpgrade.addEventListener("click", () => {
        const cost = getSizeUpgradeCost(sizeBoostLevel);
        if (money >= cost) {
          money -= cost;
          sizeBoostLevel++;
          render();
        }
      });

      autoUpgrade.addEventListener("click", () => {
        const cost = getAutoUpgradeCost(autoFisherLevel);
        if (money >= cost) {
          money -= cost;
          autoFisherLevel++;
          render();
        }
      });

      weightUpgrade.addEventListener("click", () => {
        const cost = getWeightUpgradeCost(weightBoostLevel);
        if (money >= cost) {
          money -= cost;
          weightBoostLevel++;
          render();
        }
      });

      waitUpgrade.addEventListener("click", () => {
        const cost = getWaitUpgradeCost(autoWaitReductionLevel);
        if (money >= cost) {
          money -= cost;
          autoWaitReductionLevel++;
          render();
        }
      });

      autoSellEnabledInput.addEventListener("change", () => {
        autoSellEnabled = autoSellEnabledInput.checked;
        render();
      });

      autoSellMaxPriceInput.addEventListener("input", () => {
        const value = Number(autoSellMaxPriceInput.value);
        autoSellMaxPrice = Number.isNaN(value) ? 0 : Math.max(0, Math.floor(value));
        render();
      });

      autoSellMaxRaritySelect.addEventListener("change", () => {
        autoSellMaxRarity = autoSellMaxRaritySelect.value;
        render();
      });

      setInterval(() => {
        if (autoFisherLevel <= 0) {
          lastAutoCatchMs = Date.now();
          return;
        }

        const interval = getAutoIntervalMs();
        const now = Date.now();

        while (now - lastAutoCatchMs >= interval) {
          for (let i = 0; i < autoFisherLevel; i++) {
            catchCurrentFish();
          }
          lastAutoCatchMs += interval;
        }

        render();
      }, 500);

      render();
    </script>
</body>
</html>
