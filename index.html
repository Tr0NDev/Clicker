<!DOCTYPE html>
<html>
<head>
  <title>Clicker</title>
  <style>
    :root {
      --sidebar-width: 420px;
    }

    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
      margin: 0;
      padding: 24px calc(var(--sidebar-width) + 20px) 36px 16px;
      height: 100vh;
      overflow: hidden;
    }

    button {
      padding: 15px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .upgrade {
      width: 100%;
      background: #24343f;
      color: white;
      border: 1px solid #6b8796;
      margin: 0;
      padding: 16px 20px;
      text-align: left;
      box-sizing: border-box;
      border-radius: 14px;
    }

    .upgrade:disabled {
      background: #3a3a3a;
      border-color: #5a5a5a;
      color: #a8a8a8;
      cursor: not-allowed;
    }

    .upgrade:disabled .upgrade-desc,
    .upgrade:disabled .upgrade-meta,
    .upgrade:disabled .upgrade-right {
      color: #9a9a9a;
    }

    .shell {
      max-width: 1080px;
      margin: 0 auto;
      min-height: calc(100vh - 24px - 36px);
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: #0c1217;
      border-bottom: 1px solid #22313b;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.35);
      margin: -24px calc(-1 * (var(--sidebar-width) + 20px)) 18px -24px;
      padding: 10px 0;
    }

    .top-nav {
      display: flex;
      justify-content: flex-start;
      gap: 10px;
      flex-wrap: wrap;
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 0 0 0 16px;
    }

    .fish-panel {
      max-width: 100%;
      margin: 0;
      padding: 18px;
      border: 1px solid #2f4d5c;
      border-radius: 16px;
      background: linear-gradient(180deg, #18222a 0%, #12191f 100%);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.35);
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 20px;
      align-items: start;
      max-width: 1080px;
      margin: 18px auto 0;
      min-height: 0;
    }

    .main-column {
      display: grid;
      gap: 16px;
      min-height: 0;
      overflow: hidden;
    }

    .upgrades {
      width: var(--sidebar-width);
      max-width: var(--sidebar-width);
      margin: 0;
      display: grid;
      gap: 12px;
      position: fixed;
      top: 72px;
      right: 0;
      bottom: 8px;
      z-index: 30;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
      -webkit-overflow-scrolling: touch;
      box-sizing: border-box;
      padding: 10px 10px 10px 14px;
      background: #111;
      border-left: 1px solid #2a3f4d;
    }

    .upgrades-resizer {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 10px;
      cursor: col-resize;
      touch-action: none;
      z-index: 40;
      background: transparent;
    }

    .upgrades-resizer:hover {
      background: rgba(141, 196, 224, 0.12);
    }

    .upgrade-name {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .upgrade-desc {
      color: #ccc;
      font-size: 14px;
      min-height: 38px;
      margin-bottom: 8px;
    }

    .upgrade-count {
      color: #9ad;
      font-size: 14px;
      margin-top: 6px;
    }

    .upgrade-meta {
      color: #fff;
      font-size: 14px;
      margin-top: 4px;
    }

    .upgrade-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
    }

    .upgrade-left {
      flex: 1;
      min-width: 0;
    }

    .upgrade-right {
      font-size: 26px;
      font-weight: bold;
      color: #f7f0c4;
      min-width: 76px;
      text-align: right;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      width: 100%;
      max-width: 720px;
      margin: 16px auto 0;
      text-align: left;
    }

    .stat-box {
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 12px 14px;
      min-height: 82px;
      min-width: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .stat-label {
      color: #a6c3d5;
      font-size: 13px;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .stat-value {
      display: block;
      font-size: 18px;
      font-weight: bold;
      line-height: 1.2;
      width: 100%;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stat-subvalue {
      margin-top: 4px;
      font-size: 14px;
      color: #b8c8d4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .money-rate {
      margin: 6px 0 0;
      text-align: center;
      color: #c9d8e4;
      font-size: 22px;
      font-weight: bold;
    }

    .money-header {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #money {
      font-size: 44px;
      margin: 0;
      text-align: center;
    }

    .fish-button {
      width: 100%;
      border: 2px solid #8dc4e0;
      background: linear-gradient(180deg, #3e7390 0%, #294f63 100%);
      color: white;
      padding: 18px 20px;
      margin: 0;
      height: 138px;
      border-radius: 14px;
      cursor: pointer;
      box-sizing: border-box;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      box-shadow: 0 0 0 2px rgba(141, 196, 224, 0.15);
      transition: transform 0.08s ease, filter 0.14s ease;
    }

    .fish-button:hover {
      filter: brightness(1.08);
    }

    .fish-button:active {
      transform: translateY(1px) scale(0.995);
    }

    .fish-info {
      flex: 1;
      min-width: 0;
    }

    .fish-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .fish-subtitle {
      font-size: 14px;
      color: #d7e8f2;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .fish-price {
      min-width: 96px;
      text-align: right;
      font-size: 28px;
      font-weight: bold;
      color: #f7f0c4;
    }

    .legend {
      max-width: 720px;
      margin: 14px auto 0;
      color: #aab8c0;
      font-size: 14px;
    }

    .auto-sell-panel {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 14px;
      border: 1px solid #354854;
      border-radius: 12px;
      background: #171f25;
      text-align: left;
      box-sizing: border-box;
      overflow: hidden;
    }

    .auto-sell-title {
      font-size: 17px;
      color: #e6f4ff;
      margin-bottom: 4px;
      font-weight: bold;
    }

    .auto-sell-help {
      font-size: 13px;
      color: #a9c2d3;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .auto-sell-label {
      display: block;
      font-size: 12px;
      color: #bdd5e4;
      margin-bottom: 4px;
      font-weight: bold;
    }

    .auto-sell-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #d9ecf8;
      font-size: 14px;
      padding-top: 2px;
    }

    .auto-sell-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      align-items: start;
    }

    .auto-sell-dynamic {
      grid-column: 1 / -1;
    }

    .auto-sell-row > label {
      min-width: 0;
    }

    .auto-sell-hidden {
      display: none;
    }

    .auto-sell-row input,
    .auto-sell-row select {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #4f6978;
      background: #0f1519;
      color: #fff;
    }

    .auto-sell-row input:disabled,
    .auto-sell-row select:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .auto-sell-toggle input[type="checkbox"] {
      appearance: none;
      width: 46px;
      height: 24px;
      margin: 0;
      border-radius: 999px;
      border: 1px solid #5f7f91;
      background: #24343f;
      cursor: pointer;
      position: relative;
      transition: background 0.18s ease, border-color 0.18s ease;
    }

    .auto-sell-toggle input[type="checkbox"]::before {
      content: "";
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #d9eaf5;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .auto-sell-toggle input[type="checkbox"]:checked {
      background: #2f9f6a;
      border-color: #52c58d;
    }

    .auto-sell-toggle input[type="checkbox"]:checked::before {
      transform: translateX(22px);
      background: #ffffff;
    }

    .rarity-common { color: #d9d9d9; }
    .rarity-uncommon { color: #7ee787; }
    .rarity-rare { color: #58a6ff; }
    .rarity-epic { color: #d2a8ff; }
    .rarity-legendary { color: #ffa657; }

    @media (max-width: 980px) {
      body {
        overflow: hidden;
        padding: 24px 16px 36px;
      }

      .shell {
        min-height: auto;
      }

      .content-grid {
        grid-template-columns: 1fr;
      }

      .fish-panel,
      .auto-sell-panel {
        margin: 0 auto;
      }

      .upgrades {
        width: 100%;
        max-width: 720px;
        margin: 0 auto;
        position: static;
        height: auto;
        max-height: none;
        overflow-y: auto;
        padding: 0;
        background: transparent;
        border-left: 0;
      }

      .upgrades-resizer {
        display: none;
      }
    }

    .nav-button {
      display: inline-block;
      text-decoration: none;
      background: #555;
      color: white;
      border: 1px solid #aaa;
      padding: 15px;
      margin: 0;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <div class="top-bar">
    <div class="top-nav">
      <button class="nav-button" onclick="window.location.href='settings/'">Settings</button>
      <button class="nav-button" onclick="window.location.href='inventaire/'">Inventory</button>

  <div class="shell">

            <label id="autoSellRarityGroup" class="auto-sell-dynamic">
              <span class="auto-sell-label">Max rarity sold</span>

                <option value="rare">Rare</option>
                <option value="epic">Epic</option>
                <option value="legendary">Legendary</option>
              </select>
            </label>
          </div>
        </div>
      </div>

      <div class="upgrades">

            </div>
            <div class="upgrade-right">x<span id="tripleHookUpgradeCount">0</span></div>
          </div>
        </button>

        <button id="rodUpgrade" class="upgrade">
          <div class="upgrade-content">
            <div class="upgrade-left">
              <div class="upgrade-name">Rod upgrade</div>
              <div class="upgrade-desc" id="rodUpgradeDesc">Classic rod: mostly common fish.</div>
              <div class="upgrade-meta">Tier: <span id="rodTierLabel">Classic</span> | Cost: <span id="rodUpgradeCost">-</span></div>
            </div>
            <div class="upgrade-right">x<span id="rodUpgradeCount">0</span></div>

        <button id="sizeUpgrade" class="upgrade">

      const autoUpgradeCost = document.getElementById("autoUpgradeCost");
      const weightUpgradeCost = document.getElementById("weightUpgradeCost");
      const waitUpgradeCost = document.getElementById("waitUpgradeCost");
      const autoDelayLabel = document.getElementById("autoDelayLabel");

      let money = Number(localStorage.getItem("clicker_money")) || 0;
      let caughtCount = Number(localStorage.getItem("clicker_caughtCount")) || 0;
      let sizeBoostLevel = Number(localStorage.getItem("clicker_sizeBoostLevel")) || 0;
      let autoFisherLevel = Number(localStorage.getItem("clicker_autoFisherLevel")) || 0;
      let weightBoostLevel = Number(localStorage.getItem("clicker_weightBoostLevel")) || 0;
      let autoWaitReductionLevel = Number(localStorage.getItem("clicker_autoWaitReductionLevel")) || 0;
      let tripleHookLevel = Number(localStorage.getItem("clicker_tripleHookLevel")) || 0;
      let rodTierLevel = Number(localStorage.getItem("clicker_rodTierLevel")) || 0;
      let inventory = [];
      let autoSellEnabled = localStorage.getItem("clicker_autoSellEnabled") === "true";
      let autoSellMode = localStorage.getItem("clicker_autoSellMode") || "price";
      let upgradesWidth = Number(localStorage.getItem("clicker_upgradesWidth")) || 420;
      let autoSellMaxPrice = Number(localStorage.getItem("clicker_autoSellMaxPrice"));
      let autoSellMaxRarity = localStorage.getItem("clicker_autoSellMaxRarity") || "common";
      let lastAutoCatchMs = Date.now();
      let lastManualCatchMs = 0;
      let inventoryTurn = Number(localStorage.getItem("clicker_inventoryTurn")) || 0;

      if (Number.isNaN(autoSellMaxPrice)) {
        autoSellMaxPrice = 25;
      }

      if (autoSellMode !== "price" && autoSellMode !== "rarity") {
        autoSellMode = "price";
      }

      function clampUpgradesWidth(value) {
        const maxWidth = Math.max(320, Math.floor(window.innerWidth * 0.58));
        return Math.min(maxWidth, Math.max(320, Math.floor(value)));
      }

      function setUpgradesWidth(value, persist) {
        upgradesWidth = clampUpgradesWidth(value);
        document.documentElement.style.setProperty("--sidebar-width", upgradesWidth + "px");

        if (persist) {
          localStorage.setItem("clicker_upgradesWidth", String(upgradesWidth));
        }
      }

      setUpgradesWidth(upgradesWidth, false);

      if (upgradesResizer && upgradesPanel) {
        let isResizing = false;

        upgradesResizer.addEventListener("mousedown", (event) => {
          event.preventDefault();
          isResizing = true;
          document.body.style.cursor = "col-resize";
          document.body.style.userSelect = "none";
        });

        window.addEventListener("mousemove", (event) => {
          if (!isResizing) {
            return;
          }

          const nextWidth = window.innerWidth - event.clientX;
          setUpgradesWidth(nextWidth, false);
        });

        window.addEventListener("mouseup", () => {
          if (!isResizing) {
            return;
          }

          isResizing = false;
          document.body.style.cursor = "";
          document.body.style.userSelect = "";
          setUpgradesWidth(upgradesWidth, true);
        });

        window.addEventListener("resize", () => {
          setUpgradesWidth(upgradesWidth, false);
        });
      }

      try {
        const storedInventory = localStorage.getItem("clicker_inventory");
        inventory = storedInventory ? JSON.parse(storedInventory) : [];
        if (!Array.isArray(inventory)) {
          inventory = [];
        }
      } catch (error) {
        inventory = [];
      }

      function getSizeUpgradeCost(level) {
        return Math.floor(1500 * Math.pow(2.15, level));
      }

      function getTripleHookCost(level) {
        return Math.floor(2500 * Math.pow(2.2, level));
      }

      function getRodUpgradeCost(level) {
        if (level >= ROD_UPGRADE_COSTS.length) {
          return null;
        }

        return ROD_UPGRADE_COSTS[level];
      }

      function getAutoUpgradeCost(level) {
        return Math.floor(3000 * Math.pow(2.25, level));
      }

      function getWeightUpgradeCost(level) {
        return Math.floor(2000 * Math.pow(2.05, level));
      }

      function getWaitUpgradeCost(level) {
        return Math.floor(4000 * Math.pow(2.3, level));
      }

      function getAutoIntervalMs() {
        return Math.max(2000, 10000 - (autoWaitReductionLevel * 500));
      }

      function randomBetween(min, max, decimals) {
        const value = min + Math.random() * (max - min);
        return Number(value.toFixed(decimals));
      }

      function pickWeighted(items) {
        const totalWeight = items.reduce((sum, item) => sum + item.weight, 0);
        let roll = Math.random() * totalWeight;

        for (const item of items) {
          roll -= item.weight;
          if (roll <= 0) {
            return item.rarity;
          }
        }

        return items[0].rarity;
      }

      function pickRandom(list) {
        return list[Math.floor(Math.random() * list.length)];
      }

      function pickTernaryProfile() {
        const roll = Math.random();

        if (roll < (1 / 3)) {
          return "low";
        }

        if (roll < (2 / 3)) {
          return "mid";
        }

        return "high";
      }

      function pickSegmentValue(min, max, decimals, profile) {
        const span = max - min;
        if (span <= 0) {
          return Number(min.toFixed(decimals));
        }

        const third = span / 3;
        let rangeMin = min;
        let rangeMax = max;

        if (profile === "low") {
          rangeMax = min + third;
        } else if (profile === "mid") {
          rangeMin = min + third;
          rangeMax = min + (2 * third);
        } else {
          rangeMin = min + (2 * third);
        }

        return randomBetween(rangeMin, rangeMax, decimals);
      }

      function deriveProfileFromValue(value, min, max) {
        const span = max - min;
        if (span <= 0) {
          return "mid";
        }

        const third = span / 3;
        if (value <= min + third) {
          return "low";
        }

        if (value <= min + (2 * third)) {
          return "mid";
        }

        return "high";
      }

      function getSpeciesByType(type) {
        return FISH_SPECIES.find((fish) => fish.type === type) || null;
      }

      function normalizeFishProfiles(fish) {
        if (fish.sizeProfile && fish.weightProfile) {
          return fish;
        }

        const species = getSpeciesByType(fish.type);
        if (!species) {
          return {
            ...fish,
            sizeProfile: fish.sizeProfile || "mid",
            weightProfile: fish.weightProfile || "mid"
          };
        }

        return {
          ...fish,
          sizeProfile: fish.sizeProfile || deriveProfileFromValue(fish.size, species.sizeMin, species.sizeMax),
          weightProfile: fish.weightProfile || deriveProfileFromValue(fish.weight, species.weightMin, species.weightMax)
        };
      }

      function formatRarityLabel(rarity) {
        const labels = {
          common: "Common",
          uncommon: "Uncommon",
          rare: "Rare",
          epic: "Epic",
          legendary: "Legendary"
        };

        return labels[rarity] || rarity;
      }

      function rarityRank(rarity) {
        const ranks = {
          common: 1,
          uncommon: 2,
          rare: 3,
          epic: 4,
          legendary: 5
        };

        return ranks[rarity] || 1;
      }

      function getRarityClass(rarity) {
        const classes = {
          common: "rarity-common",
          uncommon: "rarity-uncommon",
          rare: "rarity-rare",
          epic: "rarity-epic",
          legendary: "rarity-legendary"
        };

        return classes[rarity] || "rarity-common";
      }

      function getAdjustedRarityWeights() {
        const tier = ROD_TIERS[Math.min(rodTierLevel, ROD_TIERS.length - 1)];

        return RARITY_WEIGHTS.map((entry) => {
          const multiplier = tier.multipliers[entry.rarity] || 1;
          return {
            rarity: entry.rarity,
            weight: entry.weight * multiplier
          };
        });
      }

      function getFishDescriptors(fish) {
        const normalizedFish = normalizeFishProfiles(fish);
        const tags = [];

        if (normalizedFish.sizeProfile === "high") {
          tags.push("big");
        } else if (normalizedFish.sizeProfile === "low") {
          tags.push("small");
        }

        if (normalizedFish.weightProfile === "high") {
          tags.push("heavy");
        } else if (normalizedFish.weightProfile === "low") {
          tags.push("light");
        }

        if (tags.length === 0) {
          return "(average)";
        }

        return "(" + tags.join(", ") + ")";
      }

      function shouldAutoSell(fish) {
        if (!autoSellEnabled) {
          return false;
        }

        if (autoSellMode === "rarity") {
          return rarityRank(fish.rarity) <= rarityRank(autoSellMaxRarity);
        }

        return fish.price <= autoSellMaxPrice;
      }

      function createFish() {
        const rarity = pickWeighted(getAdjustedRarityWeights());
        const pool = FISH_SPECIES.filter((fish) => fish.rarity === rarity);
        const species = pickRandom(pool);
        const sizeProfile = pickTernaryProfile();
        const weightProfile = pickTernaryProfile();
        const baseSize = pickSegmentValue(species.sizeMin, species.sizeMax, 1, sizeProfile);
        const baseWeight = pickSegmentValue(species.weightMin, species.weightMax, 2, weightProfile);
        const sizeMultiplier = 1 + (sizeBoostLevel * 0.01);
        const weightMultiplier = 1 + (weightBoostLevel * 0.01);
        const size = Number((baseSize * sizeMultiplier).toFixed(1));
        const weight = Number((baseWeight * weightMultiplier).toFixed(2));
        const price = Math.max(1, Math.round((size * 0.35 + weight * 10) * RARITY_MULTIPLIERS[rarity]));

        return {
          type: species.type,
          rarity: rarity,
          size: size,
          weight: weight,
          price: price,
          sizeProfile: sizeProfile,
          weightProfile: weightProfile
        };
      }

      function loadCurrentFish() {
        const stored = localStorage.getItem("clicker_currentFish");
        if (!stored) {
          return createFish();
        }

        try {
          const parsed = JSON.parse(stored);
          if (!parsed || typeof parsed.type !== "string") {
            return createFish();
          }

          return normalizeFishProfiles(parsed);
        } catch (error) {
          return createFish();
        }
      }

      let currentFish = loadCurrentFish();

      function saveGameState() {
        localStorage.setItem("clicker_money", String(money));
        localStorage.setItem("clicker_caughtCount", String(caughtCount));
        localStorage.setItem("clicker_currentFish", JSON.stringify(currentFish));
        localStorage.setItem("clicker_inventory", JSON.stringify(inventory));
        localStorage.setItem("clicker_inventoryTurn", String(inventoryTurn));
        localStorage.setItem("clicker_tripleHookLevel", String(tripleHookLevel));
        localStorage.setItem("clicker_rodTierLevel", String(rodTierLevel));
        localStorage.setItem("clicker_sizeBoostLevel", String(sizeBoostLevel));
        localStorage.setItem("clicker_autoFisherLevel", String(autoFisherLevel));
        localStorage.setItem("clicker_weightBoostLevel", String(weightBoostLevel));
        localStorage.setItem("clicker_autoWaitReductionLevel", String(autoWaitReductionLevel));
        localStorage.setItem("clicker_autoSellEnabled", String(autoSellEnabled));
        localStorage.setItem("clicker_autoSellMode", autoSellMode);
        localStorage.setItem("clicker_autoSellMaxPrice", String(autoSellMaxPrice));
        localStorage.setItem("clicker_autoSellMaxRarity", autoSellMaxRarity);
      }

      function catchCurrentFish(source) {
        const fishToStore = {
          type: currentFish.type,
          rarity: currentFish.rarity,
          size: currentFish.size,
          weight: currentFish.weight,
          price: currentFish.price,
          sizeProfile: currentFish.sizeProfile,
          weightProfile: currentFish.weightProfile,
          caughtAt: new Date().toISOString()
        };

        if (shouldAutoSell(fishToStore)) {
          money += fishToStore.price;
        } else {
          inventory.push(fishToStore);
        }

        caughtCount++;
        currentFish = createFish();
        return true;
      }

      function render() {
        const nextTripleHookCost = getTripleHookCost(tripleHookLevel);
        const nextRodUpgradeCost = getRodUpgradeCost(rodTierLevel);
        const nextSizeCost = getSizeUpgradeCost(sizeBoostLevel);
        const nextAutoCost = getAutoUpgradeCost(autoFisherLevel);
        const nextWeightCost = getWeightUpgradeCost(weightBoostLevel);
        const nextWaitCost = getWaitUpgradeCost(autoWaitReductionLevel);
        const autoDelaySeconds = (getAutoIntervalMs() / 1000).toFixed(1);
        const rarityClass = getRarityClass(currentFish.rarity);
        const fishDescriptors = getFishDescriptors(currentFish);
        const fishPerClick = 1 + tripleHookLevel;
        const rodTier = ROD_TIERS[Math.min(rodTierLevel, ROD_TIERS.length - 1)];
        const inventoryTotalValue = inventory.reduce((sum, fish) => sum + (Number(fish.price) || 0), 0);
        const catchesPerSecond = autoFisherLevel <= 0 ? 0 : Number((autoFisherLevel / (getAutoIntervalMs() / 1000)).toFixed(2));

        moneyDisplay.textContent = "Money: " + money;
        catchPerSecondDisplay.textContent = "Catches per second: " + catchesPerSecond;
        caughtCountDisplay.textContent = String(caughtCount);
        inventoryCountDisplay.textContent = String(inventory.length);
        inventoryTotalValueDisplay.textContent = String(inventoryTotalValue);
        fishButtonLabel.textContent = currentFish.type + " " + fishDescriptors;
        fishButtonLabel.className = "fish-title " + rarityClass;
        fishDescription.textContent = currentFish.type + " " + fishDescriptors + " | Rarity: " + formatRarityLabel(currentFish.rarity) + " | Size: " + currentFish.size + " cm | Weight: " + currentFish.weight + " kg | Price: " + currentFish.price;
        fishPrice.textContent = String(currentFish.price);
        tripleHookUpgradeCount.textContent = String(tripleHookLevel);
        rodUpgradeCount.textContent = String(rodTierLevel);
        fishPerClickLabel.textContent = String(fishPerClick);
        rodTierLabel.textContent = rodTier.name;
        rodUpgradeDesc.textContent = rodTier.desc;
        tripleHookUpgradeCost.textContent = String(nextTripleHookCost);
        rodUpgradeCost.textContent = nextRodUpgradeCost === null ? "MAX" : String(nextRodUpgradeCost);
        sizeUpgradeCount.textContent = String(sizeBoostLevel);
        autoUpgradeCount.textContent = String(autoFisherLevel);
        weightUpgradeCount.textContent = String(weightBoostLevel);
        waitUpgradeCount.textContent = String(autoWaitReductionLevel);
        sizeUpgradeCost.textContent = String(nextSizeCost);
        autoUpgradeCost.textContent = String(nextAutoCost);
        weightUpgradeCost.textContent = String(nextWeightCost);
        waitUpgradeCost.textContent = String(nextWaitCost);
        autoDelayLabel.textContent = autoDelaySeconds;

        tripleHookUpgrade.disabled = money < nextTripleHookCost;
        rodUpgrade.disabled = nextRodUpgradeCost === null || money < nextRodUpgradeCost;
        sizeUpgrade.disabled = money < nextSizeCost;
        autoUpgrade.disabled = money < nextAutoCost;
        weightUpgrade.disabled = money < nextWeightCost;
        waitUpgrade.disabled = money < nextWaitCost;

        autoSellEnabledInput.checked = autoSellEnabled;
        autoSellModeSelect.value = autoSellMode;
        autoSellMaxPriceInput.value = String(autoSellMaxPrice);
        autoSellMaxRaritySelect.value = autoSellMaxRarity;
        autoSellModeSelect.disabled = !autoSellEnabled;
        const isPriceMode = autoSellMode === "price";
        autoSellPriceGroup.classList.toggle("auto-sell-hidden", !isPriceMode);
        autoSellRarityGroup.classList.toggle("auto-sell-hidden", isPriceMode);
        autoSellMaxPriceInput.disabled = !autoSellEnabled || !isPriceMode;
        autoSellMaxRaritySelect.disabled = !autoSellEnabled || isPriceMode;
        saveGameState();
      }

      clicker.addEventListener("click", () => {
        const now = Date.now();
        if (now - lastManualCatchMs < 200) {
          return;
        }

        lastManualCatchMs = now;
        const fishPerClick = 1 + tripleHookLevel;
        for (let i = 0; i < fishPerClick; i++) {
          catchCurrentFish("manual");
        }
        render();
      });

      tripleHookUpgrade.addEventListener("click", () => {
        const cost = getTripleHookCost(tripleHookLevel);
        if (money >= cost) {
          money -= cost;
          tripleHookLevel++;
          render();
        }
      });

      rodUpgrade.addEventListener("click", () => {
        const cost = getRodUpgradeCost(rodTierLevel);
        if (cost !== null && money >= cost) {
          money -= cost;
          rodTierLevel++;
          render();
        }
      });

      sizeUpgrade.addEventListener("click", () => {
        const cost = getSizeUpgradeCost(sizeBoostLevel);
        if (money >= cost) {
          money -= cost;
          sizeBoostLevel++;
          render();
        }
      });

      autoUpgrade.addEventListener("click", () => {
        const cost = getAutoUpgradeCost(autoFisherLevel);
        if (money >= cost) {
          money -= cost;
          autoFisherLevel++;
          render();
        }
      });

      weightUpgrade.addEventListener("click", () => {
        const cost = getWeightUpgradeCost(weightBoostLevel);
        if (money >= cost) {
          money -= cost;
          weightBoostLevel++;
          render();
        }
      });

      waitUpgrade.addEventListener("click", () => {
        const cost = getWaitUpgradeCost(autoWaitReductionLevel);
        if (money >= cost) {
          money -= cost;
          autoWaitReductionLevel++;
          render();
        }
      });

      autoSellEnabledInput.addEventListener("change", () => {
        autoSellEnabled = autoSellEnabledInput.checked;
        render();
      });

      autoSellModeSelect.addEventListener("change", () => {
        autoSellMode = autoSellModeSelect.value === "rarity" ? "rarity" : "price";
        render();
      });

      autoSellMaxPriceInput.addEventListener("input", () => {
        const value = Number(autoSellMaxPriceInput.value);
        autoSellMaxPrice = Number.isNaN(value) ? 0 : Math.max(0, Math.floor(value));
        render();
      });

      autoSellMaxRaritySelect.addEventListener("change", () => {
        autoSellMaxRarity = autoSellMaxRaritySelect.value;
        render();
      });

      setInterval(() => {
        if (autoFisherLevel <= 0) {
          lastAutoCatchMs = Date.now();
          return;
        }

        const interval = getAutoIntervalMs();
        const now = Date.now();

        while (now - lastAutoCatchMs >= interval) {
          for (let i = 0; i < autoFisherLevel; i++) {
            catchCurrentFish("auto");
          }
          lastAutoCatchMs += interval;
        }

        render();
      }, 500);

      render();
    </script>
</body>
</html>
