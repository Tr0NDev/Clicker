<!DOCTYPE html>
<html>
<head>
  <title>Clicker</title>
  <style>
    :root {
      --sidebar-width: 420px;
    }

    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
      margin: 0;
      padding: 24px calc(var(--sidebar-width) + 20px) 36px 16px;
      min-height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
    }

    button {
      padding: 15px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .upgrade {
      width: 100%;
      background: #24343f;
      color: white;
      border: 1px solid #6b8796;
      margin: 0;
      padding: 16px 20px;
      text-align: left;
      box-sizing: border-box;
      border-radius: 14px;
    }

    .upgrade:disabled {
      background: #3a3a3a;
      border-color: #5a5a5a;
      color: #a8a8a8;
      cursor: not-allowed;
    }

    .upgrade:disabled .upgrade-desc,
    .upgrade:disabled .upgrade-meta,
    .upgrade:disabled .upgrade-right {
      color: #9a9a9a;
    }

    .shell {
      max-width: 1080px;
      margin: 0 auto;
      min-height: calc(100vh - 24px - 36px);
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: #0c1217;
      border-bottom: 1px solid #22313b;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.35);
      margin: -24px calc(-1 * (var(--sidebar-width) + 20px)) 18px -24px;
      padding: 10px 0;
    }

    .top-nav {
      display: flex;
      justify-content: flex-start;
      gap: 10px;
      flex-wrap: wrap;
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 0 0 0 16px;
    }

    .fish-panel {
      max-width: 100%;
      margin: 0;
      padding: 18px;
      border: 1px solid #2f4d5c;
      border-radius: 16px;
      background: linear-gradient(180deg, #18222a 0%, #12191f 100%);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.35);
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 20px;
      align-items: start;
      max-width: 1080px;
      margin: 18px auto 0;
      min-height: 0;
    }

    .main-column {
      display: grid;
      gap: 16px;
      min-height: 0;
      overflow: hidden;
    }

    .upgrades {
      width: var(--sidebar-width);
      max-width: var(--sidebar-width);
      margin: 0;
      display: grid;
      gap: 12px;
      position: fixed;
      top: 72px;
      right: 0;
      bottom: 8px;
      z-index: 30;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
      -webkit-overflow-scrolling: touch;
      box-sizing: border-box;
      padding: 10px 10px 10px 14px;
      background: #111;
      border-left: 1px solid #2a3f4d;
    }

    .upgrades-resizer {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 10px;
      cursor: col-resize;
      touch-action: none;
      z-index: 40;
      background: transparent;
    }

    .upgrades-resizer:hover {
      background: rgba(141, 196, 224, 0.12);
    }

    .upgrade-name {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .upgrade-desc {
      color: #ccc;
      font-size: 14px;
      min-height: 38px;
      margin-bottom: 8px;
    }

    .upgrade-count {
      color: #9ad;
      font-size: 14px;
      margin-top: 6px;
    }

    .upgrade-meta {
      color: #fff;
      font-size: 14px;
      margin-top: 4px;
    }

    .upgrade-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
    }

    .upgrade-left {
      flex: 1;
      min-width: 0;
    }

    .upgrade-right {
      font-size: 26px;
      font-weight: bold;
      color: #f7f0c4;
      min-width: 76px;
      text-align: right;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      width: 100%;
      max-width: 720px;
      margin: 16px auto 0;
      text-align: left;
    }

    .stat-box {
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 12px 14px;
      min-height: 82px;
      min-width: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .stat-label {
      color: #a6c3d5;
      font-size: 13px;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .stat-value {
      display: block;
      font-size: 18px;
      font-weight: bold;
      line-height: 1.2;
      width: 100%;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stat-subvalue {
      margin-top: 4px;
      font-size: 14px;
      color: #b8c8d4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .money-rate {
      margin: 6px 0 0;
      text-align: center;
      color: #c9d8e4;
      font-size: 22px;
      font-weight: bold;
    }

    .money-header {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .team-reminder {
      width: 100%;
      max-width: 720px;
      margin: 12px auto 0;
      padding: 10px 14px;
      border: 1px solid #2f4d5c;
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(24, 34, 42, 0.95) 0%, rgba(18, 25, 31, 0.95) 100%);
      text-align: left;
      box-sizing: border-box;
    }

    .team-reminder-slots {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
    }

    .team-reminder-slot {
      border: 1px solid #35505f;
      border-radius: 10px;
      padding: 8px 10px;
      background: rgba(15, 21, 25, 0.75);
      min-width: 0;
    }

    .team-reminder-slot.active {
      border-color: #8dc4e0;
      background: rgba(141, 196, 224, 0.12);
    }

    .team-reminder-slot.active.rarity-common {
      border-color: #d9d9d9;
      background: rgba(217, 217, 217, 0.12);
    }

    .team-reminder-slot.active.rarity-uncommon {
      border-color: #7ee787;
      background: rgba(126, 231, 135, 0.12);
    }

    .team-reminder-slot.active.rarity-rare {
      border-color: #58a6ff;
      background: rgba(88, 166, 255, 0.14);
    }

    .team-reminder-slot.active.rarity-epic {
      border-color: #d2a8ff;
      background: rgba(210, 168, 255, 0.14);
    }

    .team-reminder-slot.active.rarity-legendary {
      border-color: #ffa657;
      background: rgba(255, 166, 87, 0.16);
    }

    .team-reminder-slot-title {
      font-size: 11px;
      color: #8dc4e0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
      font-weight: bold;
    }

    .team-reminder-slot-name {
      font-size: 13px;
      color: #f7f0c4;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .team-reminder-slot-stats {
      font-size: 11px;
      color: #9fb3c1;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .team-reminder-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #8dc4e0;
      margin-bottom: 6px;
      font-weight: bold;
    }

    .team-reminder-body {
      font-size: 13px;
      color: #d9ecf8;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .team-reminder-sub {
      margin-top: 4px;
      font-size: 12px;
      color: #9fb3c1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #money {
      font-size: 44px;
      margin: 0;
      text-align: center;
    }

    .fish-button {
      width: 100%;
      border: 2px solid #8dc4e0;
      background: linear-gradient(180deg, #3e7390 0%, #294f63 100%);
      color: white;
      padding: 18px 20px;
      margin: 0;
      height: 138px;
      border-radius: 14px;
      cursor: pointer;
      box-sizing: border-box;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      box-shadow: 0 0 0 2px rgba(141, 196, 224, 0.15);
      transition: transform 0.08s ease, filter 0.14s ease;
    }

    .fish-button:hover {
      filter: brightness(1.08);
    }

    .fish-button:active {
      transform: translateY(1px) scale(0.995);
    }

    .fish-info {
      flex: 1;
      min-width: 0;
    }

    .fish-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .fish-subtitle {
      font-size: 14px;
      color: #d7e8f2;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .fish-price {
      min-width: 96px;
      text-align: right;
      font-size: 28px;
      font-weight: bold;
      color: #f7f0c4;
    }

    .legend {
      max-width: 720px;
      margin: 14px auto 0;
      color: #aab8c0;
      font-size: 14px;
    }

    .auto-sell-panel {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 14px;
      border: 1px solid #354854;
      border-radius: 12px;
      background: #171f25;
      text-align: left;
      box-sizing: border-box;
      overflow: hidden;
    }

    .auto-sell-title {
      font-size: 17px;
      color: #e6f4ff;
      margin-bottom: 4px;
      font-weight: bold;
    }

    .auto-sell-help {
      font-size: 13px;
      color: #a9c2d3;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .auto-sell-label {
      display: block;
      font-size: 12px;
      color: #bdd5e4;
      margin-bottom: 4px;
      font-weight: bold;
    }

    .auto-sell-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #d9ecf8;
      font-size: 14px;
      padding-top: 2px;
    }

    .auto-sell-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      align-items: start;
    }

    .auto-sell-dynamic {
      grid-column: 1 / -1;
    }

    .auto-sell-row > label {
      min-width: 0;
    }

    .auto-sell-hidden {
      display: none;
    }

    .auto-sell-row input,
    .auto-sell-row select {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #4f6978;
      background: #0f1519;
      color: #fff;
    }

    .auto-sell-row input:disabled,
    .auto-sell-row select:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .auto-sell-toggle input[type="checkbox"] {
      appearance: none;
      width: 46px;
      height: 24px;
      margin: 0;
      border-radius: 999px;
      border: 1px solid #5f7f91;
      background: #24343f;
      cursor: pointer;
      position: relative;
      transition: background 0.18s ease, border-color 0.18s ease;
    }

    .auto-sell-toggle input[type="checkbox"]::before {
      content: "";
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #d9eaf5;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .auto-sell-toggle input[type="checkbox"]:checked {
      background: #2f9f6a;
      border-color: #52c58d;
    }

    .auto-sell-toggle input[type="checkbox"]:checked::before {
      transform: translateX(22px);
      background: #ffffff;
    }

    .rarity-common { color: #d9d9d9; }
    .rarity-uncommon { color: #7ee787; }
    .rarity-rare { color: #58a6ff; }
    .rarity-epic { color: #d2a8ff; }
    .rarity-legendary { color: #ffa657; }

    @media (max-width: 980px) {
      body {
        overflow: hidden;
        padding: 24px 16px 36px;
      }

      .shell {
        min-height: auto;
      }

      .content-grid {
        grid-template-columns: 1fr;
      }

      .fish-panel,
      .auto-sell-panel {
        margin: 0 auto;
      }

      .upgrades {
        width: 100%;
        max-width: 720px;
        margin: 0 auto;
        position: static;
        height: auto;
        max-height: none;
        overflow-y: auto;
        padding: 0;
        background: transparent;
        border-left: 0;
      }

      .upgrades-resizer {
        display: none;
      }
    }

    .nav-button {
      display: inline-block;
      text-decoration: none;
      background: #555;
      color: white;
      border: 1px solid #aaa;
      padding: 15px;
      margin: 0;
      margin-right: 8px;
      font-size: 16px;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="top-bar">
    <div class="top-nav">
      <button class="nav-button" onclick="window.location.href='./'">Game</button>
      <button class="nav-button" onclick="window.location.href='inventaire/'">Inventory</button>
      <button class="nav-button" onclick="window.location.href='team/'">Team</button>
      <button class="nav-button" onclick="window.location.href='shop/'">Shop</button>
      <button class="nav-button" onclick="window.location.href='settings/'">Settings</button>
    </div>
  </div>

  <div class="shell">
    <div class="money-header">
      <h2 id="money">Money: 0</h2>
      <div class="money-rate" id="catchPerSecond">Catches per second: 0</div>
    </div>
    <div class="team-reminder" id="teamReminder">
      <div class="team-reminder-title">Active Team</div>
      <div class="team-reminder-body" id="teamReminderBody">No team selected.</div>
      <div class="team-reminder-sub" id="teamReminderSub">Open the Team menu to change your lineup.</div>
      <div class="team-reminder-slots" id="teamReminderSlots"></div>
    </div>
    <div class="stats">
      <div class="stat-box">
        <div class="stat-label">Fish caught</div>
        <div class="stat-value" id="caughtCount">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Fish in inventory</div>
        <div class="stat-value" id="inventoryCount">0</div>
        <div class="stat-subvalue">Total value: <span id="inventoryTotalValue">0</span></div>
      </div>
    </div>

    <div class="content-grid">
      <div class="main-column">
        <div class="fish-panel">
          <button id="clicker" class="fish-button">
            <div class="fish-info">
              <div class="fish-title" id="fishButtonLabel">Fish</div>
              <div class="fish-subtitle" id="fishDescription">Click to fish a random catch.</div>
            </div>
            <div class="fish-price" id="fishPrice">0</div>
          </button>

        </div>

        <div class="auto-sell-panel">
          <div class="auto-sell-title">Smart auto-sell</div>
          <div class="auto-sell-help">Choose one mode: sell by price (<= threshold) or sell by rarity (selected rarity and below).</div>
          <div class="auto-sell-row">
            <label>
              <span class="auto-sell-label">Status</span>
              <span class="auto-sell-toggle">
                <input type="checkbox" id="autoSellEnabled">
                Enabled
              </span>
            </label>
            <label>
              <span class="auto-sell-label">Mode</span>
              <select id="autoSellMode">
                <option value="price">Sell by price</option>
                <option value="rarity">Sell by rarity</option>
              </select>
            </label>
            <label id="autoSellPriceGroup" class="auto-sell-dynamic">
              <span class="auto-sell-label">Price limit (sell if &lt;=)</span>
              <input type="number" min="0" step="1" id="autoSellMaxPrice" value="25">
            </label>
            <label id="autoSellRarityGroup" class="auto-sell-dynamic">
              <span class="auto-sell-label">Max rarity sold</span>
              <select id="autoSellMaxRarity">
                <option value="common">Common</option>
                <option value="uncommon">Uncommon</option>
                <option value="rare">Rare</option>
                <option value="epic">Epic</option>
                <option value="legendary">Legendary</option>
              </select>
            </label>
          </div>
        </div>
      </div>

      <div class="upgrades">
        <div class="upgrades-resizer" aria-hidden="true"></div>
        <button id="tripleHookUpgrade" class="upgrade">
          <div class="upgrade-content">
            <div class="upgrade-left">
              <div class="upgrade-name">Triple hook</div>
              <div class="upgrade-desc">Each level adds +1 fish caught per click.</div>
              <div class="upgrade-meta">Cost: <span id="tripleHookUpgradeCost">0</span> | Per click: <span id="fishPerClickLabel">1</span></div>
            </div>
            <div class="upgrade-right">x<span id="tripleHookUpgradeCount">0</span></div>
          </div>
        </button>

        <button id="rodUpgrade" class="upgrade">
          <div class="upgrade-content">
            <div class="upgrade-left">
              <div class="upgrade-name">Rod upgrade</div>
              <div class="upgrade-desc" id="rodUpgradeDesc">Classic rod: mostly common fish.</div>
              <div class="upgrade-meta">Tier: <span id="rodTierLabel">Classic</span> | Cost: <span id="rodUpgradeCost">-</span></div>
            </div>
            <div class="upgrade-right">x<span id="rodUpgradeCount">0</span></div>
          </div>
        </button>

        <button id="sizeUpgrade" class="upgrade">
          <div class="upgrade-content">
            <div class="upgrade-left">
              <div class="upgrade-name">Precision rod</div>
              <div class="upgrade-desc">Slightly increases fish size (+1% per level).</div>
              <div class="upgrade-meta">Cost: <span id="sizeUpgradeCost">0</span></div>
            </div>
            <div class="upgrade-right">x<span id="sizeUpgradeCount">0</span></div>
          </div>
        </button>

        <button id="autoUpgrade" class="upgrade">
          <div class="upgrade-content">
            <div class="upgrade-left">
              <div class="upgrade-name">Hire a fisherman</div>
              <div class="upgrade-desc">A fisherman works for you and catches automatically every 10 seconds (+1 fish per level).</div>
              <div class="upgrade-meta">Cost: <span id="autoUpgradeCost">0</span></div>
            </div>
            <div class="upgrade-right">x<span id="autoUpgradeCount">0</span></div>
          </div>
        </button>

        <button id="weightUpgrade" class="upgrade">
          <div class="upgrade-content">
            <div class="upgrade-left">
              <div class="upgrade-name">Reinforced line</div>
              <div class="upgrade-desc">Slightly increases fish weight (+1% per level).</div>
              <div class="upgrade-meta">Cost: <span id="weightUpgradeCost">0</span></div>
            </div>
            <div class="upgrade-right">x<span id="weightUpgradeCount">0</span></div>
          </div>
        </button>

        <button id="waitUpgrade" class="upgrade">
          <div class="upgrade-content">
            <div class="upgrade-left">
              <div class="upgrade-name">Trawler engine</div>
              <div class="upgrade-desc">Reduces auto-fishing delay by 0.5s per level.</div>
              <div class="upgrade-meta">Cost: <span id="waitUpgradeCost">0</span> | Current delay: <span id="autoDelayLabel">10.0</span>s</div>
            </div>
            <div class="upgrade-right">x<span id="waitUpgradeCount">0</span></div>
          </div>
        </button>
      </div>
    </div>

    <script>
      const FISH_SPECIES = [
        { type: "Common carp", rarity: "common", sizeMin: 25, sizeMax: 55, weightMin: 0.8, weightMax: 2.8 },
        { type: "Swift roach", rarity: "common", sizeMin: 15, sizeMax: 28, weightMin: 0.2, weightMax: 0.9 },
        { type: "Striped perch", rarity: "common", sizeMin: 18, sizeMax: 35, weightMin: 0.3, weightMax: 1.4 },
        { type: "Lively bleak", rarity: "common", sizeMin: 10, sizeMax: 18, weightMin: 0.05, weightMax: 0.25 },
        { type: "Dark tench", rarity: "common", sizeMin: 20, sizeMax: 42, weightMin: 0.5, weightMax: 2.2 },
        { type: "Silver bream", rarity: "common", sizeMin: 22, sizeMax: 48, weightMin: 0.6, weightMax: 2.4 },
        { type: "Silver trout", rarity: "uncommon", sizeMin: 28, sizeMax: 58, weightMin: 0.7, weightMax: 3.5 },
        { type: "Rock bass", rarity: "uncommon", sizeMin: 22, sizeMax: 44, weightMin: 0.8, weightMax: 2.6 },
        { type: "Noble salmon", rarity: "uncommon", sizeMin: 40, sizeMax: 78, weightMin: 1.8, weightMax: 5.6 },
        { type: "River char", rarity: "uncommon", sizeMin: 24, sizeMax: 52, weightMin: 0.9, weightMax: 3.1 },
        { type: "Stealth zander", rarity: "uncommon", sizeMin: 30, sizeMax: 70, weightMin: 1.0, weightMax: 4.8 },
        { type: "Bright sea bream", rarity: "uncommon", sizeMin: 26, sizeMax: 60, weightMin: 1.2, weightMax: 4.2 },
        { type: "Bluefin tuna", rarity: "rare", sizeMin: 60, sizeMax: 130, weightMin: 8, weightMax: 35 },
        { type: "Wild pike", rarity: "rare", sizeMin: 45, sizeMax: 110, weightMin: 2.5, weightMax: 15 },
        { type: "Sunfish", rarity: "rare", sizeMin: 70, sizeMax: 180, weightMin: 3, weightMax: 45 },
        { type: "Giant bass", rarity: "rare", sizeMin: 50, sizeMax: 125, weightMin: 3.5, weightMax: 18 },
        { type: "Marine turbot", rarity: "rare", sizeMin: 40, sizeMax: 100, weightMin: 2.0, weightMax: 12 },
        { type: "Blue sturgeon", rarity: "rare", sizeMin: 65, sizeMax: 155, weightMin: 7, weightMax: 40 },
        { type: "Mahi-mahi", rarity: "epic", sizeMin: 70, sizeMax: 160, weightMin: 5, weightMax: 25 },

      function getSizeUpgradeCost(level) {
        return Math.floor(1050 * Math.pow(2.15, level));
      }

      function getTripleHookCost(level) {
        return Math.floor(1750 * Math.pow(2.2, level));
      }

      function getRodUpgradeCost(level) {
        if (level >= ROD_UPGRADE_COSTS.length) {
          return null;
        }

        return ROD_UPGRADE_COSTS[level];
      }

      function getAutoUpgradeCost(level) {
        return Math.floor(2100 * Math.pow(2.25, level));
      }

      function getWeightUpgradeCost(level) {
        return Math.floor(1400 * Math.pow(2.05, level));
      }

      function getWaitUpgradeCost(level) {

      function getAutoIntervalMs() {
        const baseInterval = Math.max(2000, 10000 - (autoWaitReductionLevel * 500));
        return Math.max(400, Math.floor(baseInterval / Math.max(1, teamBonuses.fishingSpeed)));
      }

      function randomBetween(min, max, decimals) {
        const value = min + Math.random() * (max - min);
        return Number(value.toFixed(decimals));
      }

      function pickWeighted(items) {
        const totalWeight = items.reduce((sum, item) => sum + item.weight, 0);
        let roll = Math.random() * totalWeight;

        for (const item of items) {
          roll -= item.weight;
          if (roll <= 0) {
            return item.rarity;
          }
        }

        return items[0].rarity;
      }

      function pickRandom(list) {
        return list[Math.floor(Math.random() * list.length)];
      }

      function pickTernaryProfile() {
        const roll = Math.random();

        if (roll < (1 / 3)) {
          return "low";
        }

        if (roll < (2 / 3)) {
          return "mid";
        }

        return "high";
      }

      function pickSegmentValue(min, max, decimals, profile) {
        const span = max - min;
        if (span <= 0) {
          return Number(min.toFixed(decimals));
        }

        const third = span / 3;
        let rangeMin = min;
        let rangeMax = max;

        if (profile === "low") {
          rangeMax = min + third;
        } else if (profile === "mid") {
          rangeMin = min + third;
          rangeMax = min + (2 * third);
        } else {
          rangeMin = min + (2 * third);
        }

        return randomBetween(rangeMin, rangeMax, decimals);
      }

      function deriveProfileFromValue(value, min, max) {
        const span = max - min;
        if (span <= 0) {
          return "mid";
        }

        const third = span / 3;
        if (value <= min + third) {
          return "low";
        }

        if (value <= min + (2 * third)) {
          return "mid";
        }

        return "high";
      }

      function getSpeciesByType(type) {
        return FISH_SPECIES.find((fish) => fish.type === type) || null;
      }

      function normalizeFishProfiles(fish) {
        if (fish.sizeProfile && fish.weightProfile) {
          return fish;
        }

        const species = getSpeciesByType(fish.type);
        if (!species) {
          return {
            ...fish,
            sizeProfile: fish.sizeProfile || "mid",
            weightProfile: fish.weightProfile || "mid"
          };
        }

        return {
          ...fish,
          sizeProfile: fish.sizeProfile || deriveProfileFromValue(fish.size, species.sizeMin, species.sizeMax),
          weightProfile: fish.weightProfile || deriveProfileFromValue(fish.weight, species.weightMin, species.weightMax)
        };
      }

      function normalizeTeamBonuses(rawTotals) {
        return {
          incomeMultiplier: Number(rawTotals?.incomeMultiplier) || 1,
          clickMultiplier: Number(rawTotals?.clickMultiplier) || 1,
          sizeBonus: Number(rawTotals?.sizeBonus) || 0,
          weightBonus: Number(rawTotals?.weightBonus) || 0,
          chanceBonus: Number(rawTotals?.chanceBonus) || 0,
          resaleBonus: Number(rawTotals?.resaleBonus) || 0,
          fishingSpeed: Number(rawTotals?.fishingSpeed) || 1
        };
      }

      function computeTeamBonusesFromChars(teamChars) {
        let incomeMultiplier = 1;
        let clickMultiplier = 1;
        let sizeBonus = 0;
        let weightBonus = 0;
        let chanceBonus = 0;
        let resaleBonus = 0;
        let fishingSpeed = 1;

        teamChars.forEach((char) => {
          incomeMultiplier *= Number(char.incomeMultiplier) || 1;
          clickMultiplier *= Number(char.clickMultiplier) || 1;
          sizeBonus = (sizeBonus + (Number(char.sizeAdd) || 0)) * (Number(char.sizeMult) || 1);
          weightBonus = (weightBonus + (Number(char.weightAdd) || 0)) * (Number(char.weightMult) || 1);
          chanceBonus = (chanceBonus + (Number(char.chanceAdd) || 0)) * (Number(char.chanceMult) || 1);
          resaleBonus = (resaleBonus + (Number(char.resaleAdd) || 0)) * (Number(char.resaleMult) || 1);
          fishingSpeed *= Number(char.fishingSpeed) || 1;
        });

        return normalizeTeamBonuses({
          incomeMultiplier,
          clickMultiplier,
          sizeBonus,
          weightBonus,
          chanceBonus,
          resaleBonus,
          fishingSpeed
        });
      }

      function loadTeamBonuses() {
        try {
          const stored = localStorage.getItem(TEAM_STATE_STORAGE_KEY);
          if (!stored) {
            return { ...defaultTeamBonuses };
          }

          const parsed = JSON.parse(stored);
          if (parsed && parsed.totals) {
            return normalizeTeamBonuses(parsed.totals);
          }

          if (parsed && Array.isArray(parsed.teamChars)) {
            return computeTeamBonusesFromChars(parsed.teamChars);
          }
        } catch (error) {
          return { ...defaultTeamBonuses };
        }

        return { ...defaultTeamBonuses };
      }

      function loadTeamReminder() {
        try {
          const storedState = localStorage.getItem(TEAM_STATE_STORAGE_KEY);
          const storedRoster = localStorage.getItem("clicker_teamRoster");

          if (!storedState && !storedRoster) {
            return { teamChars: [], totals: { ...defaultTeamBonuses } };
          }

          const parsedState = storedState ? JSON.parse(storedState) : null;
          const parsedRoster = storedRoster ? JSON.parse(storedRoster) : null;
          const teamChars = Array.isArray(parsedState?.teamChars)
            ? parsedState.teamChars
            : (Array.isArray(parsedRoster?.slots)
              ? parsedRoster.slots
                .slice()
                .sort((left, right) => Number(left.slot) - Number(right.slot))
                .map((entry) => ({
                  id: entry.id,
                  name: entry.name,
                  stars: entry.stars,
                  incomeMultiplier: 1,
                  clickMultiplier: 1,
                  sizeAdd: 0,
                  sizeMult: 1,
                  weightAdd: 0,
                  weightMult: 1,
                  chanceAdd: 0,
                  chanceMult: 1,
                  resaleAdd: 0,
                  resaleMult: 1,
                  fishingSpeed: 1,
                  teamSlot: Number(entry.slot)
                }))
              : []);
          const totals = parsedState?.totals
            ? normalizeTeamBonuses(parsedState.totals)
            : (parsedRoster?.totals ? normalizeTeamBonuses(parsedRoster.totals) : computeTeamBonusesFromChars(teamChars));
          return { teamChars, totals };
        } catch (error) {
          return { teamChars: [], totals: { ...defaultTeamBonuses } };
        }
      }

          function getCharacterRarityFromStars(stars) {
            const starCount = Number(stars) || 1;
            if (starCount >= 5) {
              return "legendary";
            }
            if (starCount === 4) {
              return "epic";
            }
            if (starCount === 3) {
              return "rare";
            }
            if (starCount === 2) {
              return "uncommon";
            }
            return "common";
          }

      function formatTeamReminder(teamChars, totals) {
        if (!teamChars.length) {
          teamReminderBody.textContent = "No team selected.";

        const names = teamChars.map((char) => `${char.name} (${char.stars}★)`).join(" • ");

        teamReminderSub.textContent = `Income x${totals.incomeMultiplier.toFixed(1)} | Click x${totals.clickMultiplier.toFixed(1)} | Size +${totals.sizeBonus.toFixed(1)}% | Weight +${totals.weightBonus.toFixed(1)}% | Chance +${totals.chanceBonus.toFixed(1)}% | Resale +${totals.resaleBonus.toFixed(1)}% | Speed x${totals.fishingSpeed.toFixed(1)}`;
        teamReminderSlots.innerHTML = [0, 1, 2].map((slotIndex) => {
          const char = teamChars.find((entry) => Number(entry.teamSlot) === slotIndex);
          if (!char) {
            return `

                <div class="team-reminder-slot-name">Empty</div>
                <div class="team-reminder-slot-stats">No character</div>
              </div>

          const rarityClass = `rarity-${getCharacterRarityFromStars(char.stars)}`;

          return `
            <div class="team-reminder-slot active ${rarityClass}">
              <div class="team-reminder-slot-name">${char.name} ${"★".repeat(char.stars)}</div>
              <div class="team-reminder-slot-stats">${char.incomeMultiplier.toFixed(1)}x income | ${char.fishingSpeed.toFixed(1)}x speed</div>

      }

      function refreshTeamBonuses() {
        const reminderState = loadTeamReminder();
        teamBonuses = reminderState.totals;
        formatTeamReminder(reminderState.teamChars, reminderState.totals);
        applyTeamBonusesToCurrentFish();

      function applyTeamBonusesToCurrentFish() {
        if (!currentFish) {
          return;
        }

        const baseSize = Number(currentFish.baseSize) || Number(currentFish.size) || 0;
        const baseWeight = Number(currentFish.baseWeight) || Number(currentFish.weight) || 0;
        const basePrice = Number(currentFish.basePrice) || Number(currentFish.price) || 0;
        const sizeMultiplier = (1 + (sizeBoostLevel * 0.01)) * (1 + (teamBonuses.sizeBonus * 0.01));
        const weightMultiplier = (1 + (weightBoostLevel * 0.01)) * (1 + (teamBonuses.weightBonus * 0.01));
        const valueMultiplier = Math.max(0.1, teamBonuses.incomeMultiplier * (1 + (teamBonuses.resaleBonus * 0.01)));

        currentFish = {
          ...currentFish,
          baseSize: baseSize,
          baseWeight: baseWeight,
          basePrice: basePrice,
          size: Number((baseSize * sizeMultiplier).toFixed(1)),
          weight: Number((baseWeight * weightMultiplier).toFixed(2)),
          price: Math.max(1, Math.round(basePrice * valueMultiplier)),
          currentValue: Math.max(1, Math.round(basePrice * valueMultiplier))
        };
      }

      function formatRarityLabel(rarity) {
        const labels = {
          common: "Common",
          uncommon: "Uncommon",
          rare: "Rare",
          epic: "Epic",
          legendary: "Legendary"
        };

        return labels[rarity] || rarity;
      }

      function rarityRank(rarity) {
        const ranks = {
          common: 1,
          uncommon: 2,
          rare: 3,
          epic: 4,
          legendary: 5
        };

        return ranks[rarity] || 1;
      }

      function getRarityClass(rarity) {
        const classes = {
          common: "rarity-common",
          uncommon: "rarity-uncommon",
          rare: "rarity-rare",
          epic: "rarity-epic",
          legendary: "rarity-legendary"
        };

        return classes[rarity] || "rarity-common";
      }

      function getAdjustedRarityWeights() {
        const tier = ROD_TIERS[Math.min(rodTierLevel, ROD_TIERS.length - 1)];

        return RARITY_WEIGHTS.map((entry) => {
          const multiplier = tier.multipliers[entry.rarity] || 1;
          const rank = rarityRank(entry.rarity);
          const chanceBoost = 1 + ((rank - 1) * (teamBonuses.chanceBonus * 0.0125));
          return {
            rarity: entry.rarity,
            weight: entry.weight * multiplier * chanceBoost
          };
        });
      }

      function getFishDescriptors(fish) {
        const normalizedFish = normalizeFishProfiles(fish);
        const tags = [];

        if (normalizedFish.sizeProfile === "high") {
          tags.push("big");
        } else if (normalizedFish.sizeProfile === "low") {
          tags.push("small");
        }

        if (normalizedFish.weightProfile === "high") {
          tags.push("heavy");
        } else if (normalizedFish.weightProfile === "low") {
          tags.push("light");
        }

        if (tags.length === 0) {
          return "(average)";
        }

        return "(" + tags.join(", ") + ")";
      }

      function shouldAutoSell(fish) {
        if (!autoSellEnabled) {
          return false;
        }

        if (autoSellMode === "rarity") {
          return rarityRank(fish.rarity) <= rarityRank(autoSellMaxRarity);
        }

        return fish.price <= autoSellMaxPrice;
      }

      function createFish() {
        const rarity = pickWeighted(getAdjustedRarityWeights());
        const pool = FISH_SPECIES.filter((fish) => fish.rarity === rarity);
        const species = pickRandom(pool);
        const sizeProfile = pickTernaryProfile();
        const weightProfile = pickTernaryProfile();
        const baseSize = pickSegmentValue(species.sizeMin, species.sizeMax, 1, sizeProfile);
        const baseWeight = pickSegmentValue(species.weightMin, species.weightMax, 2, weightProfile);
        const sizeMultiplier = (1 + (sizeBoostLevel * 0.01)) * (1 + (teamBonuses.sizeBonus * 0.01));
        const weightMultiplier = (1 + (weightBoostLevel * 0.01)) * (1 + (teamBonuses.weightBonus * 0.01));
        const size = Number((baseSize * sizeMultiplier).toFixed(1));
        const weight = Number((baseWeight * weightMultiplier).toFixed(2));
        const basePrice = Math.max(1, Math.round((size * 0.315 + weight * 9) * RARITY_MULTIPLIERS[rarity]));
        const price = Math.max(1, Math.round(basePrice * teamBonuses.incomeMultiplier * (1 + (teamBonuses.resaleBonus * 0.01))));

        return {
          type: species.type,
          rarity: rarity,
          size: size,
          weight: weight,
          price: price,
          baseSize: baseSize,
          baseWeight: baseWeight,
          basePrice: basePrice,
          currentValue: price,
          sizeProfile: sizeProfile,
          weightProfile: weightProfile
        };
      }

      function loadCurrentFish() {
        const stored = localStorage.getItem("clicker_currentFish");
        if (!stored) {
          return createFish();
        }

        try {
          const parsed = JSON.parse(stored);
          if (!parsed || typeof parsed.type !== "string") {
            return createFish();
          }

          return normalizeFishProfiles(parsed);
        } catch (error) {
          return createFish();
        }
      }

        localStorage.setItem("clicker_sizeBoostLevel", String(sizeBoostLevel));
        localStorage.setItem("clicker_autoFisherLevel", String(autoFisherLevel));
        localStorage.setItem("clicker_weightBoostLevel", String(weightBoostLevel));
        localStorage.setItem("clicker_autoWaitReductionLevel", String(autoWaitReductionLevel));
        localStorage.setItem("clicker_autoSellEnabled", String(autoSellEnabled));
        localStorage.setItem("clicker_autoSellMode", autoSellMode);
        localStorage.setItem("clicker_autoSellMaxPrice", String(autoSellMaxPrice));
        localStorage.setItem("clicker_autoSellMaxRarity", autoSellMaxRarity);
      }

      function catchCurrentFish(source) {
        const fishToStore = {
          type: currentFish.type,
          rarity: currentFish.rarity,
          size: currentFish.size,
          weight: currentFish.weight,
          price: Math.max(1, Math.round(currentFish.price)),
          basePrice: Math.max(1, Math.round(currentFish.basePrice || currentFish.price)),
          currentValue: Math.max(1, Math.round(currentFish.currentValue || currentFish.price)),
          sizeProfile: currentFish.sizeProfile,
          weightProfile: currentFish.weightProfile,
          caughtAt: new Date().toISOString()
        };

        if (shouldAutoSell(fishToStore)) {
          money += fishToStore.price;
        } else {
          inventory.push(fishToStore);
        }

        caughtCount++;
        currentFish = createFish();
        return true;
      }

      function render() {
        refreshTeamBonuses();
        const nextTripleHookCost = getTripleHookCost(tripleHookLevel);
        const nextRodUpgradeCost = getRodUpgradeCost(rodTierLevel);
        const nextSizeCost = getSizeUpgradeCost(sizeBoostLevel);
        const nextAutoCost = getAutoUpgradeCost(autoFisherLevel);
        const nextWeightCost = getWeightUpgradeCost(weightBoostLevel);
        const nextWaitCost = getWaitUpgradeCost(autoWaitReductionLevel);
        const autoDelaySeconds = (getAutoIntervalMs() / 1000).toFixed(1);
        const rarityClass = getRarityClass(currentFish.rarity);
        const fishDescriptors = getFishDescriptors(currentFish);
        const fishPerClick = 1 + tripleHookLevel;
        const rodTier = ROD_TIERS[Math.min(rodTierLevel, ROD_TIERS.length - 1)];
        const inventoryTotalValue = inventory.reduce((sum, fish) => {
          const fishValue = Number(fish.currentValue) || Number(fish.basePrice) || Number(fish.price) || 0;
          return sum + fishValue;
        }, 0);
        const catchesPerSecond = autoFisherLevel <= 0 ? 0 : Number((autoFisherLevel / (getAutoIntervalMs() / 1000)).toFixed(2));

        moneyDisplay.textContent = "Money: " + money;
        catchPerSecondDisplay.textContent = "Catches per second: " + catchesPerSecond;
        caughtCountDisplay.textContent = String(caughtCount);
        inventoryCountDisplay.textContent = String(inventory.length);
        inventoryTotalValueDisplay.textContent = String(inventoryTotalValue);
        fishButtonLabel.textContent = currentFish.type + " " + fishDescriptors;
        fishButtonLabel.className = "fish-title " + rarityClass;
        fishDescription.textContent = currentFish.type + " " + fishDescriptors + " | Rarity: " + formatRarityLabel(currentFish.rarity) + " | Size: " + currentFish.size + " cm | Weight: " + currentFish.weight + " kg | Price: " + currentFish.price;
        fishPrice.textContent = String(currentFish.price);
        tripleHookUpgradeCount.textContent = String(tripleHookLevel);
        rodUpgradeCount.textContent = String(rodTierLevel);
        fishPerClickLabel.textContent = String(fishPerClick);
        rodTierLabel.textContent = rodTier.name;
        rodUpgradeDesc.textContent = rodTier.desc;
        tripleHookUpgradeCost.textContent = String(nextTripleHookCost);
        rodUpgradeCost.textContent = nextRodUpgradeCost === null ? "MAX" : String(nextRodUpgradeCost);
        sizeUpgradeCount.textContent = String(sizeBoostLevel);
        autoUpgradeCount.textContent = String(autoFisherLevel);
        weightUpgradeCount.textContent = String(weightBoostLevel);
        waitUpgradeCount.textContent = String(autoWaitReductionLevel);
        sizeUpgradeCost.textContent = String(nextSizeCost);
        autoUpgradeCost.textContent = String(nextAutoCost);
        weightUpgradeCost.textContent = String(nextWeightCost);
        waitUpgradeCost.textContent = String(nextWaitCost);
        autoDelayLabel.textContent = autoDelaySeconds;

        tripleHookUpgrade.disabled = money < nextTripleHookCost;
        rodUpgrade.disabled = nextRodUpgradeCost === null || money < nextRodUpgradeCost;
        sizeUpgrade.disabled = money < nextSizeCost;
        autoUpgrade.disabled = money < nextAutoCost;
        weightUpgrade.disabled = money < nextWeightCost;
        waitUpgrade.disabled = money < nextWaitCost;

        autoSellEnabledInput.checked = autoSellEnabled;
        autoSellModeSelect.value = autoSellMode;
        autoSellMaxPriceInput.value = String(autoSellMaxPrice);
        autoSellMaxRaritySelect.value = autoSellMaxRarity;
        autoSellModeSelect.disabled = !autoSellEnabled;
        const isPriceMode = autoSellMode === "price";
        autoSellPriceGroup.classList.toggle("auto-sell-hidden", !isPriceMode);
        autoSellRarityGroup.classList.toggle("auto-sell-hidden", isPriceMode);
        autoSellMaxPriceInput.disabled = !autoSellEnabled || !isPriceMode;
        autoSellMaxRaritySelect.disabled = !autoSellEnabled || isPriceMode;
        saveGameState();
      }

      clicker.addEventListener("click", () => {
        const now = Date.now();
        if (now - lastManualCatchMs < 200) {
          return;
        }

        lastManualCatchMs = now;
        const fishPerClick = Math.max(1, Math.round((1 + tripleHookLevel) * Math.max(1, teamBonuses.clickMultiplier)));
        for (let i = 0; i < fishPerClick; i++) {
          catchCurrentFish("manual");
        }
        render();
      });

      tripleHookUpgrade.addEventListener("click", () => {
        const cost = getTripleHookCost(tripleHookLevel);
        if (money >= cost) {
          money -= cost;
          tripleHookLevel++;
          render();
        }
      });

      rodUpgrade.addEventListener("click", () => {
        const cost = getRodUpgradeCost(rodTierLevel);
        if (cost !== null && money >= cost) {
          money -= cost;
          rodTierLevel++;
          render();
        }
      });

      sizeUpgrade.addEventListener("click", () => {
        const cost = getSizeUpgradeCost(sizeBoostLevel);
        if (money >= cost) {
          money -= cost;
          sizeBoostLevel++;
          render();
        }
      });

      autoUpgrade.addEventListener("click", () => {
        const cost = getAutoUpgradeCost(autoFisherLevel);
        if (money >= cost) {
          money -= cost;
          autoFisherLevel++;
          render();
        }
      });

      weightUpgrade.addEventListener("click", () => {
        const cost = getWeightUpgradeCost(weightBoostLevel);
        if (money >= cost) {
          money -= cost;
          weightBoostLevel++;
          render();
        }
      });

      waitUpgrade.addEventListener("click", () => {
        const cost = getWaitUpgradeCost(autoWaitReductionLevel);
        if (money >= cost) {
          money -= cost;
          autoWaitReductionLevel++;
          render();
        }
      });

      autoSellEnabledInput.addEventListener("change", () => {
        autoSellEnabled = autoSellEnabledInput.checked;
        render();
      });

      autoSellModeSelect.addEventListener("change", () => {
        autoSellMode = autoSellModeSelect.value === "rarity" ? "rarity" : "price";
        render();
      });

      autoSellMaxPriceInput.addEventListener("input", () => {
        const value = Number(autoSellMaxPriceInput.value);
        autoSellMaxPrice = Number.isNaN(value) ? 0 : Math.max(0, Math.floor(value));
        render();
      });

      autoSellMaxRaritySelect.addEventListener("change", () => {
        autoSellMaxRarity = autoSellMaxRaritySelect.value;
        render();
      });

      setInterval(() => {
        if (autoFisherLevel <= 0) {
          lastAutoCatchMs = Date.now();
          return;
        }

        const interval = getAutoIntervalMs();
        const now = Date.now();

        while (now - lastAutoCatchMs >= interval) {
          for (let i = 0; i < autoFisherLevel; i++) {
            catchCurrentFish("auto");
          }
          lastAutoCatchMs += interval;
        }

        render();
      }, 500);

      render();
    </script>
</body>
</html>
