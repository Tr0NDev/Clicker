<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Guild - Clicker</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── TOP BAR ── */
    .top-bar {
      position: sticky; top: 0; z-index: 20;
      background: #0c1217;
      border-bottom: 1px solid #22313b;
      box-shadow: 0 10px 20px rgba(0,0,0,.35);
      padding: 10px 0;
      flex-shrink: 0;
    }
    .top-nav {
      display: flex; justify-content: flex-start; gap: 10px;
      flex-wrap: wrap; width: 100%; padding: 0 0 0 16px;
    }
    .nav-button {
      display: inline-flex; align-items: center; justify-content: center;
      text-decoration: none; background: #31414d; color: #eef5f9;
      border: 1px solid #667a86; padding: 12px 16px; margin-right: 8px;
      font-size: 15px; cursor: pointer; border-radius: 10px;
      transition: background-color .15s, border-color .15s, color .15s;
    }
    .nav-button:hover { background: #3a4c59; border-color: #7f95a3; }
    .nav-button.active-nav-button { background: #dbe3e8; color: #1d2a33; border-color: #dbe3e8; font-weight: bold; }
    .settings-nav-button { margin-left: auto; margin-right: 16px; }
    body.limited-nav-mode .locked-nav-button { display: none; }

    /* ── LAYOUT ── */
    .shell { max-width: 1600px; margin: 0 auto; padding: 16px; flex: 1; }
    .page-grid {
      display: grid;
      grid-template-columns: minmax(280px, 340px) 1fr minmax(320px, 380px);
      gap: 16px;
      align-items: start;
    }

    /* ── SHARED SECTION STYLE ── */
    .section {
      border: 1px solid #2f4d5c; border-radius: 14px;
      background: #142028; padding: 14px;
    }
    .section-title {
      font-size: 18px; font-weight: bold; color: #8dc4e0; margin-bottom: 10px;
    }
    .section-header-row {
      display: flex; justify-content: space-between; align-items: center;
      gap: 10px; flex-wrap: wrap; margin-bottom: 12px;
    }
    .section-header-row .section-title { margin-bottom: 0; }

    /* ── BTN ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      border: 1px solid #8ea3b1; background: #263541; color: #fff;
      border-radius: 10px; padding: 8px 14px; cursor: pointer; font-size: 13px;
    }
    .btn:hover { background: #324555; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-cyan { border-color: #4a9eff; color: #4a9eff; background: rgba(74,158,255,.08); }
    .btn-cyan:hover { background: rgba(74,158,255,.18); }
    .btn-danger { border-color: #9a5a68; background: #4a2730; color: #ff9999; }
    .btn-danger:hover { background: #5b3140; }
    .btn-gold { border-color: #c9a227; color: #e8c060; background: rgba(201,162,39,.08); }
    .btn-gold:hover { background: rgba(201,162,39,.18); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn.active-sort { background: #3a5f7a; border-color: #5a8faa; color: #fff; }

    /* ── LEFT COLUMN ── */
    .left-col { display: grid; gap: 12px; align-content: start; }

    .hooks-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(201,162,39,.1); border: 1px solid #7a5f18;
      border-radius: 999px; padding: 5px 14px;
      font-size: 13px; color: #e8c060; font-weight: bold; margin-bottom: 8px;
    }

    /* search */
    .search-input {
      width: 100%; background: #0f1519; border: 1px solid #365563;
      border-radius: 10px; color: #e9f6ff;
      font-family: Arial, sans-serif; font-size: 13px;
      padding: 8px 12px; outline: none;
      transition: border-color .15s;
    }
    .search-input:focus { border-color: #5a8faa; }
    .search-input::placeholder { color: #4a6878; }

    /* guild list */
    .guild-list { display: grid; gap: 8px; max-height: 420px; overflow-y: auto; padding-right: 4px; margin-top: 10px; }
    .guild-list::-webkit-scrollbar { width: 4px; }
    .guild-list::-webkit-scrollbar-thumb { background: #365563; border-radius: 2px; }

    .guild-card {
      border: 1px solid #2f4d5c; border-radius: 12px; background: #0f1519;
      padding: 10px 12px; cursor: pointer; transition: all .15s; position: relative;
    }
    .guild-card::before {
      content:''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; border-radius: 12px 0 0 12px; background: transparent; transition: background .15s;
    }
    .guild-card:hover { border-color: #3a5f7a; }
    .guild-card:hover::before { background: #3a5f7a; }
    .guild-card.active { border-color: #c9a227; background: rgba(201,162,39,.06); }
    .guild-card.active::before { background: #c9a227; }
    .guild-card.is-mine { border-color: #3a6a8a; background: rgba(74,158,255,.05); }
    .guild-card.is-mine::before { background: #4a9eff; }
    .guild-card.is-mine.active { border-color: #4a9eff; background: rgba(74,158,255,.1); }

    .gc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .gc-name { font-size: 14px; font-weight: bold; color: #e9f6ff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
    .gc-rank { font-size: 11px; color: #6a8a9a; }
    .gc-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .gc-members { font-size: 12px; color: #8dc4e0; }
    .gc-score { font-size: 12px; color: #e8c060; font-weight: bold; }
    .gc-points { font-size: 12px; color: #7ee787; font-weight: bold; }
    .gc-mine-badge {
      font-size: 9px; font-weight: bold; padding: 1px 5px; border-radius: 4px;
      background: rgba(74,158,255,.15); color: #4a9eff; border: 1px solid #2a4a6a; text-transform: uppercase;
    }

    /* create form */
    .create-inner {
      background: #0f1519; border: 1px solid #365563; border-radius: 12px; padding: 16px;
    }
    .field-label { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: #88a8b9; margin-bottom: 6px; }
    .field-input {
      width: 100%; background: #0c1217; border: 1px solid #365563;
      border-radius: 8px; color: #e9f6ff; font-family: Arial, sans-serif;
      font-size: 14px; padding: 10px 12px; outline: none;
      transition: border-color .15s; margin-bottom: 12px;
    }
    .field-input:focus { border-color: #5a8faa; }
    .cost-note { font-size: 12px; color: #6a8a9a; margin-top: 8px; text-align: center; }
    .status-line { min-height: 18px; font-size: 13px; margin-top: 8px; color: #f5db9b; text-align: center; }
    .status-line.err { color: #ff7070; }
    .status-line.ok { color: #7ee787; }

    /* shimmer */
    .shimmer {
      height: 56px; border-radius: 12px;
      background: linear-gradient(90deg, #0f1519 25%, #162028 50%, #0f1519 75%);
      background-size: 200% 100%; animation: shimmer 1.2s infinite;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── CENTER COLUMN ── */
    .center-col { display: grid; gap: 12px; align-content: start; }

    /* ── RIGHT COLUMN (PROFILE) ── */
    .right-col { display: grid; gap: 12px; align-content: start; }

    .empty-state {
      border: 1px dashed #4b6878; border-radius: 12px;
      padding: 40px 16px; color: #93aab8;
      background: rgba(15,21,25,.8); text-align: center; font-size: 14px;
    }

    /* guild hero */
    .guild-hero {
      display: flex; align-items: center; gap: 16px;
      padding-bottom: 14px; margin-bottom: 14px;
      border-bottom: 1px solid #1e3040;
    }
    .guild-crest {
      width: 64px; height: 64px; border-radius: 50%;
      border: 2px solid #7a5f18; background: rgba(201,162,39,.07);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; flex-shrink: 0;
    }
    .guild-info { flex: 1; min-width: 0; }
    .guild-name { font-size: 22px; font-weight: bold; color: #e8c060; margin-bottom: 6px; }
    .guild-stats { display: flex; gap: 16px; flex-wrap: wrap; font-size: 13px; color: #8dc4e0; }
    .guild-stats b { color: #e9f6ff; }

    /* ── GUILD SCORE BANNER ── */
    .guild-score-banner {
      display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap;
    }
    .score-banner-card {
      flex: 1; min-width: 140px;
      border: 1px solid #2f4d5c; border-radius: 12px; background: #0f1519;
      padding: 12px 16px; text-align: center;
    }
    .score-banner-card.score-card { border-color: #7a5f18; background: rgba(201,162,39,.06); }
    .score-banner-card.points-card { border-color: #1a5a2a; background: rgba(126,231,135,.05); }
    .sbc-label { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: #6a8a9a; margin-bottom: 6px; }
    .sbc-value { font-size: 26px; font-weight: bold; line-height: 1; }
    .sbc-value.gold { color: #e8c060; }
    .sbc-value.green { color: #7ee787; }
    .sbc-sub { font-size: 11px; color: #4a6878; margin-top: 4px; }

    /* sort bar */
    .sort-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
    .sort-label { font-size: 13px; color: #8dc4e0; font-weight: bold; margin-right: 4px; }

    /* member rows */
    .members-list { display: grid; gap: 8px; }

    .member-row {
      border: 1px solid #2f4d5c; border-radius: 12px; background: #0f1519;
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 36px 1fr auto;
      align-items: start; gap: 12px;
      transition: border-color .15s;
    }
    .member-row:hover { border-color: #3a5f7a; }
    .member-row.is-me { border-color: #3a6a8a; background: rgba(74,158,255,.04); }

    .member-rank-num {
      font-size: 15px; font-weight: bold; color: #e8c060;
      text-align: center; line-height: 1; padding-top: 2px;
    }

    .member-body { display: grid; gap: 8px; min-width: 0; }
    .member-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .member-name { font-size: 15px; font-weight: bold; color: #e9f6ff; }
    .me-tag {
      font-size: 10px; font-weight: bold; padding: 1px 6px; border-radius: 4px;
      background: rgba(74,158,255,.15); color: #4a9eff; border: 1px solid #2a4a6a;
    }
    .owner-tag {
      font-size: 10px; font-weight: bold; padding: 1px 6px; border-radius: 4px;
      background: rgba(201,162,39,.15); color: #e8c060; border: 1px solid #7a5f18;
    }
    .member-id { font-size: 10px; color: #4a6878; font-family: monospace; }
    .member-guild-rank { font-size: 11px; color: #8dc4e0; }

    /* team section inside member */
    .member-teams { display: flex; gap: 16px; flex-wrap: wrap; }
    .team-block { flex-shrink: 0; }
    .team-block-label { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: #6a8a9a; margin-bottom: 6px; }
    .team-slots { display: flex; gap: 6px; flex-wrap: wrap; }

    /* ── FISH SLOTS (avec couleur par rareté + taille/poids) ── */
    .fish-slot {
      border: 1px solid #2f4d5c; border-radius: 8px; background: #0c1217;
      padding: 5px 8px; font-size: 11px;
      display: flex; flex-direction: column; gap: 2px;
      min-width: 80px; max-width: 110px;
    }
    .fish-slot-name {
      font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .fish-slot-stats {
      font-size: 10px; color: #6a8a9a; display: flex; gap: 6px; flex-wrap: wrap;
    }
    .fish-slot-stat { white-space: nowrap; }

    /* Couleurs par rareté */
    .fish-slot.rarity-common    { border-color: #4a5a5a; }
    .fish-slot.rarity-uncommon  { border-color: #2a5a2a; background: rgba(126,231,135,.04); }
    .fish-slot.rarity-rare      { border-color: #1a3a7a; background: rgba(88,166,255,.05); }
    .fish-slot.rarity-epic      { border-color: #4a2a7a; background: rgba(210,168,255,.05); }
    .fish-slot.rarity-legendary { border-color: #7a4a10; background: rgba(255,166,87,.06); }

    .fish-name-common    { color: #c0c0c0; }
    .fish-name-uncommon  { color: #7ee787; }
    .fish-name-rare      { color: #58a6ff; }
    .fish-name-epic      { color: #d2a8ff; }
    .fish-name-legendary { color: #ffa657; }

    /* ── CHAR SLOTS (couleur par étoiles) ── */
    .char-slot {
      border: 1px solid #2f4d5c; border-radius: 8px; background: #0c1217;
      padding: 5px 8px; font-size: 11px;
      display: flex; flex-direction: column; gap: 2px;
      min-width: 80px; max-width: 110px;
    }
    .char-slot-name {
      font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .char-slot-stars { font-size: 10px; }

    .char-slot.stars-1 { border-color: #4a5a5a; }
    .char-slot.stars-2 { border-color: #2a5a2a; background: rgba(126,231,135,.04); }
    .char-slot.stars-3 { border-color: #1a3a7a; background: rgba(88,166,255,.05); }
    .char-slot.stars-4 { border-color: #4a2a7a; background: rgba(210,168,255,.05); }
    .char-slot.stars-5 { border-color: #7a4a10; background: rgba(255,166,87,.06); }

    .char-name-1 { color: #c0c0c0; }
    .char-name-2 { color: #7ee787; }
    .char-name-3 { color: #58a6ff; }
    .char-name-4 { color: #d2a8ff; }
    .char-name-5 { color: #ffa657; }

    .char-stars-1 { color: #6a8a9a; }
    .char-stars-2 { color: #7ee787; }
    .char-stars-3 { color: #58a6ff; }
    .char-stars-4 { color: #d2a8ff; }
    .char-stars-5 { color: #ffa657; }

    /* empty slot */
    .team-slot-empty {
      border: 1px dashed #2f4d5c; border-radius: 8px; background: #0c1217;
      padding: 5px 8px; font-size: 11px; color: #4a6878;
    }

    .member-score-col { text-align: right; flex-shrink: 0; }
    .score-big { font-size: 20px; font-weight: bold; color: #e8c060; line-height: 1; }
    .score-sub { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: #6a8a9a; margin-top: 2px; }
    .points-line { font-size: 12px; color: #7ee787; margin-top: 6px; font-weight: bold; }
    .points-sub { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: #4a6878; margin-top: 1px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .anim-in { animation: fadeIn .18s ease forwards; }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="top-nav">
      <button class="nav-button" onclick="location.href='../'">Game</button>
      <button class="nav-button" onclick="location.href='../inventory/'">Inventory</button>
      <button class="nav-button locked-nav-button" onclick="location.href='../team/'">Team</button>
      <button class="nav-button locked-nav-button" onclick="location.href='../shop/'">Shop</button>
      <button class="nav-button locked-nav-button" onclick="location.href='../battle/'">Battle</button>
      <button class="nav-button locked-nav-button" onclick="location.href='../reproduction/'">Reproduction</button>
      <button class="nav-button locked-nav-button" onclick="location.href='../missions/'">Missions</button>
      <button class="nav-button locked-nav-button active-nav-button">Guild</button>
      <button class="nav-button settings-nav-button" onclick="location.href='../settings/'">Settings</button>
    </div>
  </div>

  <div class="shell">
    <div class="page-grid">

      <!-- LEFT -->
      <div class="left-col">

        <div class="section">
          <div class="section-header-row">
            <div class="section-title">All Guilds</div>
            <button class="btn btn-sm" id="refreshBtn" onclick="refreshGuilds()">↻ Refresh</button>
          </div>
          <input class="search-input" id="searchInput" type="text" placeholder="Search guilds…" oninput="filterGuilds()">
          <div class="guild-list" id="guildList">
            <div class="shimmer"></div>
            <div class="shimmer" style="opacity:.6"></div>
            <div class="shimmer" style="opacity:.3"></div>
          </div>
        </div>

        <!-- Create / membership status -->
        <div class="section" id="createSection">
          <div class="section-title">Found a Guild</div>
          <div class="hooks-pill" id="hooksPill">🪝 0 Hooks</div>
          <div class="create-inner">
            <div class="field-label">Guild Name</div>
            <input class="field-input" id="guildNameInput" type="text" maxlength="40" placeholder="Min 3 characters">
            <button class="btn btn-gold" id="createGuildBtn" onclick="createGuild()" style="width:100%;padding:10px;font-size:14px;font-weight:bold;">
              ⚔️ Create Guild — 100 🪝
            </button>
            <div class="cost-note" id="costNote"></div>
            <div class="status-line" id="createStatus"></div>
          </div>
        </div>

      </div>

      <!-- CENTER -->
      <div class="center-col" id="centerCol">
        <div class="section">
          <div class="empty-state">Select a guild from the list to view details.</div>
        </div>
      </div>

      <!-- RIGHT (PLAYER PROFILE) -->
      <div class="right-col" id="rightCol">
        <div class="section">
          <div class="empty-state">Your Guild Profile</div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // ── CONFIG ──────────────────────────────────────────────────────────────────
    const SUPABASE_URL       = "https://vrozpjdyqerpcrwlcdfo.supabase.co";
    const SUPABASE_ANON_KEY  = "sb_publishable_moV-dfu5sVohSbQOR6z0zw_BSpcVCHg";
    const GUILDS_TABLE       = "guilds";
    const GUILD_CREATE_COST  = 100;

    const HOOKS_KEY            = "clicker_hooks";
    const GUILD_MEMBERSHIP_KEY = "clicker_guildMembership";
    const GUILD_PLAYER_ID_KEY  = "clicker_guildPlayerId";
    const INVENTORY_KEY        = "clicker_inventory";
    const BATTLE_SELECTION_KEY = "clicker_battleSelection";
    const TEAM_STATE_KEY       = "clicker_teamState";

    let db = null;
    if (window.supabase && SUPABASE_URL !== "YOUR_SUPABASE_URL") {
      db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    let allGuilds = [];
    let selectedGuildId = null;
    let currentMemberSort = "score";
    let playerProfile = null;
    let viewingProfileId = null; // Track whose profile we're viewing

    async function getMemberDisplayNames(memberIds) {
      if (!db || !Array.isArray(memberIds) || memberIds.length === 0) return {};
      const uniqueIds = Array.from(new Set(memberIds.filter(id => !!id)));
      if (!uniqueIds.length) return {};

      const { data: profileRows } = await db.from("profiles").select("player_id, display_name").in("player_id", uniqueIds);
      const { data: accountRows } = await db.from("accounts").select("user_id, username").in("user_id", uniqueIds);
      const map = {};

      if (Array.isArray(profileRows)) {
        profileRows.forEach(row => {
          map[row.player_id] = row.display_name || "Player";
        });
      }
      if (Array.isArray(accountRows)) {
        accountRows.forEach(row => {
          if (!map[row.user_id]) {
            map[row.user_id] = row.username || "Player";
          }
        });
      }

      return map;
    }

    // ── LOCAL DATA HELPERS ────────────────────────────────────────────────────
    function getHooks()  { return Math.max(0, Number(localStorage.getItem(HOOKS_KEY)) || 0); }
    function setHooks(v) { localStorage.setItem(HOOKS_KEY, String(Math.max(0, Math.floor(v)))); }

    function getPlayerId() {
      // Check if user is logged in
      const userId = localStorage.getItem('clicker_userId');
      if (!userId) {
        window.location.href = '../login/';
        return null;
      }
      return userId;
    }

    function getMembership() {
      try { return JSON.parse(localStorage.getItem(GUILD_MEMBERSHIP_KEY) || "null"); }
      catch { return null; }
    }
    function saveMembership(v) {
      if (v) localStorage.setItem(GUILD_MEMBERSHIP_KEY, JSON.stringify(v));
      else localStorage.removeItem(GUILD_MEMBERSHIP_KEY);
    }

    function getPlayerFishTeam() {
      try {
        const inv = JSON.parse(localStorage.getItem(INVENTORY_KEY) || "[]");
        const sel = JSON.parse(localStorage.getItem(BATTLE_SELECTION_KEY) || "[]");
        const fishMap = new Map(inv.map(f => [f.uid, f]));
        return sel.slice(0, 3).map(uid => fishMap.get(uid)).filter(Boolean);
      } catch { return []; }
    }

    function getPlayerCharTeam() {
      try {
        const stateRaw = localStorage.getItem(TEAM_STATE_KEY);
        if (stateRaw) {
          const state = JSON.parse(stateRaw);
          if (state && Array.isArray(state.teamChars)) {
            return state.teamChars.filter(c => c && c.teamSlot != null)
              .sort((a,b) => Number(a.teamSlot) - Number(b.teamSlot))
              .slice(0, 3);
          }
        }
        return [];
      } catch { return []; }
    }

    // ── SCORE / RANK ─────────────────────────────────────────────────────────
    const RARITY_RANK = { common:1, uncommon:2, rare:3, epic:4, legendary:5 };

    function computePlayerScore(fish, chars) {
      let score = 0;
      fish.forEach(f => {
        score += (Number(f.size)   || 0) * 2;
        score += (Number(f.weight) || 0) * 5;
        score += (RARITY_RANK[f.rarity] || 1) * 800;
      });
      chars.forEach(c => {
        score += (c.stars || c.level || 1) * 600;
      });
      return Math.round(score);
    }

    // Score total de la guilde = somme des scores membres + bonus de taille de guilde
    function computeGuildTotalScore(members) {
      const memberCount = members.length || 1;
      // Bonus de base : plus la guilde est grande, plus le bonus est important
      const sizeBonus = memberCount * 1200;
      // Somme des scores des membres (fallback déterministe)
      const pid = getPlayerId();
      let membersScore = 0;
      members.forEach((mem, idx) => {
        if (mem.pid === pid) {
          const myScore = computePlayerScore(getPlayerFishTeam(), getPlayerCharTeam());
          membersScore += myScore;
        } else {
          membersScore += computeMemberFallbackScore(mem.pid, idx);
        }
      });
      return Math.round(membersScore + sizeBonus);
    }

    // Points de guilde : toujours 0 (système à implémenter / progression en jeu)
    function getGuildPoints(guildId) {
      try {
        const key = "clicker_guildPoints_" + guildId;
        return Number(localStorage.getItem(key)) || 0;
      } catch { return 0; }
    }

    function safeParseMembers(raw) {
      try {
        const arr = Array.isArray(raw) ? raw : JSON.parse(raw || "[]");
        return Array.isArray(arr) ? arr : [];
      } catch { return []; }
    }

    function fmtNum(n) {
      return n >= 1000000 ? (n/1000000).toFixed(1)+"M" : n >= 1000 ? (n/1000).toFixed(1)+"k" : String(Math.round(n));
    }
    function escHtml(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
    function rarityLabel(r) {
      return {common:"Common",uncommon:"Uncommon",rare:"Rare",epic:"Epic",legendary:"Legendary"}[r] || r;
    }

    function getGuildRankLabel(role, posInRoster) {
      if (role === "owner") return "Guild Master";
      if (posInRoster <= 2) return "Officer";
      return "Member";
    }

    // ── RENDU FISH SLOT (couleur + taille/poids) ──────────────────────────────
    function renderFishSlot(f) {
      const r = f.rarity || "common";
      const name = escHtml((f.type || "Fish").slice(0, 14));
      const size   = f.size   != null ? `${Number(f.size).toFixed(1)} cm`  : null;
      const weight = f.weight != null ? `${Number(f.weight).toFixed(2)} kg` : null;
      const statsHtml = (size || weight)
        ? `<div class="fish-slot-stats">
            ${size   ? `<span class="fish-slot-stat">${size}</span>` : ""}
            ${weight ? `<span class="fish-slot-stat">${weight}</span>` : ""}
           </div>`
        : "";
      return `<div class="fish-slot rarity-${r}" title="${name} — ${rarityLabel(r)}">
        <span class="fish-slot-name fish-name-${r}">${name}</span>
        ${statsHtml}
      </div>`;
    }

    // ── RENDU CHAR SLOT (couleur par étoiles) ─────────────────────────────────
    function renderCharSlot(c) {
      const stars = Math.min(5, Math.max(1, c.stars || c.level || 1));
      const name = escHtml((c.name || "?").slice(0, 14));
      const starsStr = "★".repeat(stars) + "☆".repeat(5 - stars);
      return `<div class="char-slot stars-${stars}" title="${name} ★${stars}">
        <span class="char-slot-name char-name-${stars}">${name}</span>
        <span class="char-slot-stars char-stars-${stars}">${starsStr}</span>
      </div>`;
    }

    async function loadGuilds() {
      const list = document.getElementById("guildList");
      list.innerHTML = '<div class="shimmer"></div><div class="shimmer" style="opacity:.6"></div><div class="shimmer" style="opacity:.3"></div>';

      updateCreateSection();
      await loadPlayerProfile();

      if (!db) {
        list.innerHTML = '<div style="color:#6a8a9a;font-size:13px;padding:16px">Configure Supabase to load guilds.</div>';
        return;
      }

      const { data, error } = await db.from(GUILDS_TABLE).select("*").order("member_count", { ascending: false }).limit(100);
      if (error) {
        list.innerHTML = `<div style="color:#ff7070;font-size:13px;padding:16px">Error: ${escHtml(error.message)}</div>`;
        return;
      }

      allGuilds = (data || []).map(g => {
        const members = safeParseMembers(g.members);
        return { ...g, score: computeGuildTotalScore(members), guildPoints: getGuildPoints(g.id) };
      });
      allGuilds.sort((a,b) => b.score - a.score);
      renderSidebar();

      const m = getMembership();
      if (m) {
        const mine = allGuilds.find(g => g.id === m.guildId);
        if (mine) { selectedGuildId = mine.id; renderSidebar(); renderGuildView(mine, true).catch(console.error); }
      }
    }

    function renderSidebar() {
      const q = (document.getElementById("searchInput")?.value || "").toLowerCase();
      const list = document.getElementById("guildList");
      const m = getMembership();
      const filtered = allGuilds.filter(g => g.name.toLowerCase().includes(q));

      if (!filtered.length) {
        list.innerHTML = '<div style="color:#6a8a9a;font-size:13px;padding:16px">No guilds found.</div>';
        return;
      }

      list.innerHTML = filtered.map((g, i) => {
        const isMine  = m?.guildId === g.id;
        const isActive = selectedGuildId === g.id;
        const rank = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : `#${i+1}`;
        return `<div class="guild-card ${isMine?"is-mine":""} ${isActive?"active":""}" onclick="selectGuild('${g.id}')">

            <span class="gc-rank">${rank}</span>

      const m = getMembership();

      currentMemberSort = mode;

      if (guild) renderGuildView(guild, getMembership()?.guildId === guild.id).catch(console.error);

      const pid = getPlayerId();
      const m = getMembership();

      const guildPoints = guild.guildPoints || 0;

        ? new Date(guild.created_at).toLocaleDateString("en-GB", {day:"numeric",month:"short",year:"numeric"})
        : "—";

      const myFish  = getPlayerFishTeam();
      const myChars = getPlayerCharTeam();
      const myScore = computePlayerScore(myFish, myChars);

      const membersData = members.map((mem, rawIdx) => {
        const isMe = mem.pid === pid;

          </div>

          <div class="guild-score-banner">
            <div class="score-banner-card score-card">
              <div class="sbc-label">Guild Score</div>
              <div class="sbc-value gold">${fmtNum(totalScore)}</div>
              <div class="sbc-sub">Sum of members + size bonus</div>
            </div>
            <div class="score-banner-card points-card">
              <div class="sbc-label">Guild Points</div>
              <div class="sbc-value green">${fmtNum(guildPoints)}</div>
              <div class="sbc-sub">Earned in wars & missions</div>
            </div>
          </div>

          <div class="sort-bar">${sortBtns}</div>

          <div class="members-list">
            ${rows || '<div style="color:#6a8a9a;font-size:13px;padding:8px">No member data.</div>'}
          </div>
          <div class="status-line" id="actionStatus"></div>
        </div>`;
    }

    function computeMemberFallbackScore(pid, idx) {
      const hash = [...(pid||"x")].reduce((a,c,i) => a + c.charCodeAt(0)*(i+1), 0);
      return 1000 + (Math.abs(hash) % 15000) + idx * 50;
    }

    // ── SUPABASE OPS ──────────────────────────────────────────────────────────
    async function createGuild() {
      const statusEl = document.getElementById("createStatus");
      const name = (document.getElementById("guildNameInput")?.value || "").trim();
      if (name.length < 3) { setStatus(statusEl, "Name must be at least 3 characters.", "err"); return; }
      if (getMembership()) { setStatus(statusEl, "Already in a guild.", "err"); return; }
      if (getHooks() < GUILD_CREATE_COST) { setStatus(statusEl, "Not enough Hooks.", "err"); return; }
      if (!db) { setStatus(statusEl, "Supabase not configured.", "err"); return; }

      const pid = getPlayerId();
      document.getElementById("createGuildBtn").disabled = true;
      setStatus(statusEl, "Creating…", "");

      const payload = {
        name, owner_id: pid, member_count: 1,
        members: JSON.stringify([{ pid, role: "owner", joined: new Date().toISOString() }])
      };
      const { data, error } = await db.from(GUILDS_TABLE).insert(payload).select("*").single();

      if (error) {
        setStatus(statusEl, "Error: " + error.message, "err");
        document.getElementById("createGuildBtn").disabled = false;
        return;
      }

      setHooks(getHooks() - GUILD_CREATE_COST);
      saveMembership({ guildId: data.id, guildName: data.name, role: "owner", playerId: pid, joinedAt: new Date().toISOString() });
      setStatus(statusEl, "Guild created!", "ok");
      await loadGuilds();
    }

    async function joinGuild(guildId, guildName) {
      const statusEl = document.getElementById("actionStatus");
      if (!db) return;
      const pid = getPlayerId();
      setStatus(statusEl, "Joining…", "");

      const { data: guild, error: fetchErr } = await db.from(GUILDS_TABLE).select("*").eq("id", guildId).single();
      if (fetchErr || !guild) { setStatus(statusEl, "Could not fetch guild.", "err"); return; }

      let members = safeParseMembers(guild.members);
      if (members.some(m => m.pid === pid)) { setStatus(statusEl, "Already in this guild.", "err"); return; }

      members.push({ pid, role: "member", joined: new Date().toISOString() });
      const { error: updateErr } = await db.from(GUILDS_TABLE).update({
        member_count: members.length, members: JSON.stringify(members)
      }).eq("id", guildId);

      if (updateErr) { setStatus(statusEl, "Error: " + updateErr.message, "err"); return; }
      saveMembership({ guildId, guildName, role: "member", playerId: pid, joinedAt: new Date().toISOString() });
      await loadGuilds();
    }

    async function leaveGuild() {
      const m = getMembership();
      if (!m || !db) return;
      const pid = getPlayerId();

      const { data: guild, error: fetchErr } = await db.from(GUILDS_TABLE).select("*").eq("id", m.guildId).single();
      if (fetchErr || !guild) { saveMembership(null); await loadGuilds(); return; }

      let members = safeParseMembers(guild.members);
      members = members.filter(x => x.pid !== pid);

      if (members.length === 0) {
        await db.from(GUILDS_TABLE).delete().eq("id", m.guildId);
      } else if (m.role === "owner") {
        const newOwner = members[0];
        newOwner.role = "owner";
        await db.from(GUILDS_TABLE).update({
          member_count: members.length,
          members: JSON.stringify(members),
          owner_id: newOwner.pid
        }).eq("id", m.guildId);
      } else {
        await db.from(GUILDS_TABLE).update({
          member_count: members.length, members: JSON.stringify(members)
        }).eq("id", m.guildId);
      }

      saveMembership(null);
      selectedGuildId = null;
      await loadGuilds();
      document.getElementById("centerCol").innerHTML = `
        <div class="section"><div class="empty-state">You left the guild. Select a guild or create one.</div></div>`;
      updateCreateSection();
    }

    function setStatus(el, text, type) {
      if (!el) return;
      el.textContent = text;
      el.className = "status-line" + (type ? " "+type : "");
    }

    // ── KICK MEMBER ───────────────────────────────────────────────────────────
    async function kickMember(guildId, memberId) {
      if (!db) return;
      const m = getMembership();
      if (!m || m.role !== "owner") {
        alert("Only the guild leader can kick members.");
        return;
      }

      if (!confirm("Are you sure you want to kick this member?")) return;

      const { data: guild, error: fetchErr } = await db.from(GUILDS_TABLE).select("*").eq("id", guildId).single();
      if (fetchErr || !guild) { alert("Error fetching guild."); return; }

      let members = safeParseMembers(guild.members);
      members = members.filter(x => x.pid !== memberId);

      const { error: updateErr } = await db.from(GUILDS_TABLE).update({
        member_count: members.length,
        members: JSON.stringify(members)
      }).eq("id", guildId);

      if (updateErr) { alert("Error: " + updateErr.message); return; }
      await loadGuilds();
    }

    // ── SAVE PLAYER TEAM TO SUPABASE ──────────────────────────────────────────
    async function savePlayerTeamToSupabase() {
      const statusEl = document.getElementById("saveProfileStatus");
      if (!db) { setStatus(statusEl, "Supabase not configured.", "err"); return; }

      const pid = getPlayerId();
      const myFish = getPlayerFishTeam();
      const myChars = getPlayerCharTeam();

      const teamData = {
        fish_team: myFish.map(f => ({ uid: f.uid, type: f.type, rarity: f.rarity, size: f.size, weight: f.weight })),
        char_team: myChars.map(c => ({ id: c.id, name: c.name, stars: c.stars, templateId: c.templateId, talents: c.talents })),
        updated_at: new Date().toISOString()
      };

      setStatus(statusEl, "Saving…", "");

      // Update in profiles table
      const { error: updateErr } = await db.from("profiles").update({
        fish_team: teamData.fish_team,
        char_team: teamData.char_team,
        updated_at: teamData.updated_at
      }).eq("player_id", pid);

      if (updateErr) {
        setStatus(statusEl, "Error: " + updateErr.message, "err");
        return;
      }

      setStatus(statusEl, "Team saved to Supabase!", "ok");
      await loadPlayerProfile();
    }

    // ── BOOT ──────────────────────────────────────────────────────────────────
    if (!localStorage.getItem('clicker_userId')) {
      window.location.href = '../login/';
    }
    if (localStorage.getItem("clicker_upgradesUnlocked") !== "true") {
      document.body.classList.add("limited-nav-mode");
    }
    loadGuilds();
  </script>
</body>
