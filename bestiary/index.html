<!DOCTYPE html>
<html>
<head>
  <title>Bestiary - Clicker</title>
  <style>
    body { font-family: Arial; text-align: center; background: #111; color: white; margin: 0; padding: 24px 20px 36px 16px; min-height: 100vh; overflow-y: auto; overflow-x: hidden; }
    .top-bar { position: sticky; top: 0; z-index: 20; background: #0c1217; border-bottom: 1px solid #22313b; box-shadow: 0 10px 20px rgba(0,0,0,0.35); margin: -24px -20px -18px -24px; padding: 10px 0; margin-bottom: 18px; }
    .top-nav { display: flex; justify-content: flex-start; gap: 10px; flex-wrap: wrap; width: 100%; max-width: none; margin: 0; padding: 0 0 0 16px; }
    .nav-button { display: inline-flex; align-items: center; justify-content: center; text-decoration: none; background: #31414d; color: #eef5f9; border: 1px solid #667a86; padding: 12px 16px; margin: 0; margin-right: 8px; font-size: 15px; border-radius: 10px; cursor: pointer; transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease; }
    .nav-button:hover { background: #3a4c59; border-color: #7f95a3; }
    .nav-button.active-nav-button { background: #dbe3e8; color: #1d2a33; border-color: #dbe3e8; font-weight: bold; }
    .settings-nav-button { margin-left: auto; margin-right: 16px; }
    .shell { max-width: 1080px; margin: 0 auto; min-height: calc(100vh - 24px - 36px); display: flex; flex-direction: column; gap: 16px; }
    .section { background: linear-gradient(180deg, #18222a 0%, #12191f 100%); border: 1px solid #2f4d5c; border-radius: 16px; padding: 24px; max-width: 100%; margin: 0 auto; width: 100%; box-sizing: border-box; }
    .section-title { font-size: 24px; font-weight: bold; color: #f2fbff; margin-bottom: 16px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .card { background: #0c1217; border: 1px solid #3f6075; border-radius: 12px; padding: 16px; text-align: left; cursor: pointer; transition: background-color 0.15s ease; }
    .card:hover { background: #1a2330; }
    .card-title { font-size: 18px; font-weight: bold; color: #f4fbff; margin-bottom: 8px; }
    .card-details { font-size: 14px; color: #cde3ef; line-height: 1.4; }
    .rarity-common { color: #d9d9d9; }
    .rarity-uncommon { color: #7ee787; }
    .rarity-rare { color: #58a6ff; }
    .rarity-epic { color: #d2a8ff; }
    .rarity-legendary { color: #ffa657; }
    .rarity-mythic { color: #ff5e5e; }
    .stars-1 { color: #d9d9d9; }
    .stars-2 { color: #7ee787; }
    .stars-3 { color: #58a6ff; }
    .stars-4 { color: #d2a8ff; }
    .stars-5 { color: #ffa657; }
    .talent-inline { display: inline-flex; align-items: center; gap: 8px; vertical-align: middle; min-width: 0; }
    .talent-name-text { min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .talent-help { position: relative; width: 16px; height: 16px; border-radius: 999px; border: 1px solid #84a9be; color: #d9ecf8; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; background: #203240; cursor: help; line-height: 1; flex: 0 0 auto; }
    .talent-help::after { content: attr(data-tooltip); position: absolute; left: 50%; bottom: calc(100% + 8px); transform: translateX(-50%) translateY(4px); background: #0f1519; color: #d9ecf8; border: 1px solid #4b6878; border-radius: 8px; padding: 8px 10px; font-size: 12px; line-height: 1.35; min-width: 220px; max-width: 320px; white-space: normal; box-shadow: 0 10px 24px rgba(0,0,0,0.45); pointer-events: none; opacity: 0; visibility: hidden; z-index: 120; transition: opacity 0.06s ease, transform 0.06s ease, visibility 0.06s ease; }
    .talent-help:hover::after, .talent-help:focus-visible::after { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
    body.limited-nav-mode .locked-nav-button { display: none; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.72); z-index: 100; padding: 20px; box-sizing: border-box; align-items: center; justify-content: center; }
    .modal.visible { display: flex; }
    .modal-card { width: min(600px, 100%); background: #18222a; border: 1px solid #3f6075; border-radius: 14px; padding: 16px; box-sizing: border-box; max-height: 80vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 12px; }
    .modal-title { margin: 0; font-size: 22px; }
    .close-btn { border: 1px solid #8eb9d0; background: #2f5368; color: #fff; border-radius: 10px; cursor: pointer; padding: 8px 12px; font-size: 18px; font-weight: bold; }
    .modal-content { color: #d9ecf8; line-height: 1.5; }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="top-nav">
      <button class="nav-button" onclick="window.location.href='../'">Game</button>
      <button class="nav-button" onclick="window.location.href='../inventory/'">Inventory</button>
      <button class="nav-button locked-nav-button" onclick="window.location.href='../team/'">Team</button>
      <button class="nav-button locked-nav-button" onclick="window.location.href='../shop/'">Shop</button>
      <button class="nav-button locked-nav-button active-nav-button" onclick="window.location.href='./'">Bestiary</button>
      <button class="nav-button locked-nav-button" onclick="window.location.href='../battle/'">Battle</button>
      <button class="nav-button locked-nav-button" onclick="window.location.href='../reproduction/'">Reproduction</button>
      <button class="nav-button locked-nav-button" onclick="window.location.href='../missions/'">Missions</button>
      <button class="nav-button locked-nav-button" onclick="window.location.href='../guild/'">Guild</button>
      <button class="nav-button settings-nav-button" onclick="window.location.href='../settings/'">Settings</button>
    </div>
  </div>

  <div class="shell">
    <div class="section">
      <div class="section-title">Fish Bestiary</div>
      <div class="grid" id="fishGrid"></div>
    </div>

    <div class="section">
      <div class="section-title">Character Bestiary</div>
      <div class="grid" id="characterGrid"></div>
    </div>

    <div class="section">
      <div class="section-title">Talent List</div>
      <div class="grid" id="talentGrid"></div>
    </div>
  </div>

  <!-- DETAIL MODAL -->
  <div class="modal" id="detailModal">
    <div class="modal-card">
      <div class="modal-header">
        <h3 class="modal-title" id="detailTitle"></h3>
        <button class="close-btn" id="closeDetailBtn">×</button>
      </div>
      <div class="modal-content" id="detailContent"></div>
    </div>
  </div>

  <script>
    // Load data from files
    let fishPool = [];
    let characterPool = [];
    let allCharacters = [];

    async function loadDataFiles() {
      return new Promise((resolve, reject) => {
        // Load fish
        const fishScript = document.createElement('script');
        fishScript.src = '../data/fish.txt';
        fishScript.onload = () => {
          fishPool = window.allFish;

          // Load characters
          const charScript = document.createElement('script');
          charScript.src = '../data/characters.txt';
          charScript.onload = () => {
            allCharacters = window.allCharacters;
            characterPool = allCharacters.map(c => ({ id: c.id, name: c.name, stars: c.stars }));
            resolve();
          };
          charScript.onerror = reject;
          document.head.appendChild(charScript);
        };
        fishScript.onerror = reject;
        document.head.appendChild(fishScript);
      });
    }

    // Talent data (from shop/index.html)
    const TALENT_POOL = [
      { id: "avant-garde",          name: "Avant-Garde" },
      { id: "relais",               name: "Relais" },
      { id: "capitaine",            name: "Capitaine" },
      { id: "finisseur",            name: "Finisseur" },
      { id: "ancre",                name: "Ancre" },
      { id: "duo-parfait",          name: "Duo Parfait" },
      { id: "escalier",             name: "Escalier" },
      { id: "miroir",               name: "Miroir" },
      { id: "specialiste-income",   name: "Specialiste Income" },
      { id: "specialiste-chance",   name: "Specialiste Chance" },
      { id: "specialiste-resale",   name: "Specialiste Resale" },
      { id: "pecheur-equipe",       name: "Pecheur d'Equipe" },
      { id: "combo-additif",        name: "Combo Additif" },
      { id: "combo-multiplicatif",  name: "Combo Multiplicatif" },
      { id: "solitaire-tactique",   name: "Solitaire Tactique" },
      { id: "duo-tactique",         name: "Duo Tactique" },
      { id: "trio-tactique",        name: "Trio Tactique" },
      { id: "swap-ready",           name: "Swap Ready" },
      { id: "anti-synergie",        name: "Anti-Synergie" }
    ];

    const TALENT_DESCRIPTION_BY_ID = {
      "avant-garde":        "Slot 1 only: this character income and click are multiplied by x1.25.",
      "relais":             "Gives +8% chance to the teammate directly on the right.",
      "capitaine":          "Slot 2 only: applies x1.15 fishing speed to the two other teammates.",
      "finisseur":          "Slot 3 only: this character click multiplier is multiplied by x1.35.",
      "ancre":              "Gives +20% weight to slot 2 and +10% resale to slot 3.",
      "duo-parfait":        "Adjacent teammates with same stars gain x1.2 income.",
      "escalier":           "If stars strictly increase left to right, team gains +15% chance.",
      "miroir":             "If slot 1 and slot 3 have same stars, slot 2 gains x1.3 click.",
      "specialiste-income": "If base income is at least x1.3, gains an extra x1.15 income.",
      "specialiste-chance": "Converts up to +10% own weight bonus into +10% own chance bonus.",
      "specialiste-resale": "Own resale is multiplied by x1.2, but own click is multiplied by x0.95.",
      "pecheur-equipe":     "For each teammate with fishing speed >= x1.2, gains +0.05x fishing speed.",
      "combo-additif":      "If at least two additive bonuses are non-zero, lowest additive bonus gets +12%.",
      "combo-multiplicatif":"Each existing stat multiplier above x1 gets +0.05.",
      "solitaire-tactique": "If alone in team, own income/click/fishing are multiplied by x1.8.",
      "duo-tactique":       "If exactly 2 teammates, gains +12% chance and +12% resale.",
      "trio-tactique":      "If team is full: slot1 x1.1 income, slot2 +10% weight, slot3 x1.1 click.",
      "swap-ready":         "If this copy changed slot since last save, gains +20% size.",
      "anti-synergie":      "Risk/reward: own income x1.35 and own chance -12%."
    };

    function getRarityClass(rarity) {
      return `rarity-${rarity}`;
    }

    function getStarsString(stars) {
      return "★".repeat(stars);
    }

    function escapeHtml(v) {
      return String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
    }

    function renderTalentWithHelp(name, id) {
      return `<span class="talent-inline"><span class="talent-name-text">${escapeHtml(name)}</span><span class="talent-help" tabindex="0" data-tooltip="${escapeHtml(TALENT_DESCRIPTION_BY_ID[id] || 'No description available.')}" aria-label="Talent description">?</span></span>`;
    }

    function renderFishGrid() {
      const grid = document.getElementById("fishGrid");
      grid.innerHTML = fishPool.map(fish => `
        <div class="card" onclick="showFishDetail('${fish.name}', '${fish.rarity}')">
          <div class="card-title ${getRarityClass(fish.rarity)}">${fish.name}</div>
          <div class="card-details">
            Rarity: ${fish.rarity}<br>
          </div>
        </div>
      `).join("");
    }

    function renderCharacterGrid() {
      const grid = document.getElementById("characterGrid");
      grid.innerHTML = characterPool.map(char => `
        <div class="card" onclick="showCharacterDetail(${char.id}, '${char.name}', ${char.stars})">
          <div class="card-title stars-${char.stars}">${char.name}</div>
          <div class="card-details">
            Stars: ${getStarsString(char.stars)}<br>
            ID: ${char.id}
          </div>
        </div>
      `).join("");
    }

    function renderTalentGrid() {
      const grid = document.getElementById("talentGrid");
      grid.innerHTML = TALENT_POOL.map(talent => `
        <div class="card">
          <div class="card-title">${renderTalentWithHelp(talent.name, talent.id)}</div>
          <div class="card-details">
            ${TALENT_DESCRIPTION_BY_ID[talent.id] || 'No description available.'}
          </div>
        </div>
      `).join("");
    }

    function showFishDetail(type, rarity, size, weight) {
      const modal = document.getElementById("detailModal");
      const title = document.getElementById("detailTitle");
      const content = document.getElementById("detailContent");

      title.textContent = type;
      title.className = `modal-title ${getRarityClass(rarity)}`;

      content.innerHTML = `
        <strong>Rarity:</strong> ${rarity}<br>
        <strong>Size:</strong> ${size} cm<br>
        <strong>Weight:</strong> ${weight} kg<br>
        <strong>Description:</strong> A ${rarity} fish with impressive size and weight.
      `;

      modal.classList.add("visible");
    }

    function showCharacterDetail(id, name, stars) {
      const modal = document.getElementById("detailModal");
      const title = document.getElementById("detailTitle");
      const content = document.getElementById("detailContent");

      title.textContent = name;
      title.className = `modal-title stars-${stars}`;

      const possibleTalents = TALENT_POOL.filter(t => true); // All talents are possible

      content.innerHTML = `
        <strong>Stars:</strong> ${getStarsString(stars)}<br>
        <strong>ID:</strong> ${id}<br>
        <strong>Base Stats:</strong> Characters gain talents and bonuses when drawn.<br>
        <strong>Possible Talents:</strong><br>
        <ul>
          ${possibleTalents.slice(0, 5).map(t => `<li>${renderTalentWithHelp(t.name, t.id)}</li>`).join('')}
        </ul>
        ${possibleTalents.length > 5 ? '<em>... and more</em>' : ''}
      `;

      modal.classList.add("visible");
    }

    function closeDetailModal() {
      document.getElementById("detailModal").classList.remove("visible");
    }

    // Load data and initialize
    loadDataFiles().then(() => {
      renderFishGrid();
      renderCharacterGrid();
      renderTalentGrid();
    });

    // Modal event listeners
    document.getElementById("closeDetailBtn").addEventListener("click", closeDetailModal);
    document.getElementById("detailModal").addEventListener("click", (e) => {
      if (e.target === document.getElementById("detailModal")) closeDetailModal();
    });

    if (localStorage.getItem("clicker_upgradesUnlocked") !== "true") {
      document.body.classList.add("limited-nav-mode");
    }
  </script>
</body>
</html>
